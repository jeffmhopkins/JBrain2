<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>JPet — Soft Neon</title>
<style>
  :root{
    --line:#b79bff; --line2:#87e6ff; --accent:#ff9ecb; --glow:#a07bff; --ink:#e9e4ff;
    --panel:rgba(18,16,34,.55); --good:#8fe6c6; --warn:#ffd79a; --bad:#ff9eb6;
    --font:"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#0a0816;color:var(--ink);font-family:var(--font);overflow:hidden}
  #stage{position:fixed;inset:0;width:100%;height:100%;display:block}
  .frame{position:fixed;inset:20px;border:1px solid rgba(183,155,255,.28);border-radius:24px;
    box-shadow:0 0 60px rgba(160,123,255,.12) inset;pointer-events:none;z-index:5}
  .hud{position:fixed;top:34px;left:42px;z-index:6}
  .name{font-size:22px;font-weight:600;letter-spacing:5px;color:var(--ink);opacity:.95;text-shadow:0 0 18px var(--glow)}
  .mood{font-size:12px;opacity:.6;letter-spacing:2px;margin-top:6px;font-weight:300}
  .bars{position:fixed;top:34px;right:42px;z-index:6;width:168px;display:flex;flex-direction:column;gap:12px}
  .bar label{display:flex;justify-content:space-between;font-size:11px;letter-spacing:1px;opacity:.65;margin-bottom:5px;font-weight:300}
  .track{height:5px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden}
  .fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1),background .5s;box-shadow:0 0 10px currentColor}
  .controls{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);z-index:6;
    display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button{font-family:var(--font);font-size:13px;font-weight:500;letter-spacing:.5px;color:var(--ink);
    background:var(--panel);border:1px solid rgba(183,155,255,.35);border-radius:999px;padding:11px 18px;cursor:pointer;
    backdrop-filter:blur(10px);transition:transform .18s,box-shadow .25s,border-color .25s}
  button:hover{transform:translateY(-2px);box-shadow:0 0 24px rgba(160,123,255,.35);border-color:var(--line)}
  button:active{transform:translateY(0)}
  .tag{position:fixed;bottom:30px;left:30px;z-index:6;font-size:11px;letter-spacing:2px;opacity:.4;font-weight:300}
  .tag a{color:var(--line);text-decoration:none}
  .speech{position:fixed;z-index:7;max-width:240px;padding:12px 18px;border-radius:20px;
    background:var(--panel);border:1px solid rgba(135,230,255,.4);color:var(--ink);font-size:17px;font-weight:500;
    letter-spacing:.5px;text-shadow:0 0 14px var(--line2);box-shadow:0 0 30px rgba(160,123,255,.28);backdrop-filter:blur(10px);
    opacity:0;transform:translate(-50%,10px) scale(.96);transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
  .speech.show{opacity:1;transform:translate(-50%,0) scale(1)}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="frame"></div>
<div class="hud"><div class="name" id="petname">LUMEN</div><div class="mood" id="moodlbl">content</div></div>
<div class="bars" id="bars"></div>
<div class="speech" id="speech"></div>
<div class="controls">
  <button data-act="feed">🍔 Feed</button>
  <button data-act="play">🎮 Play</button>
  <button data-act="pet">✋ Pet</button>
  <button data-act="sleep">💤 Sleep</button>
  <button data-act="talk">💬 Talk</button>
  <button data-act="sound">🔊 Sound</button>
</div>
<div class="tag">05 · SOFT NEON &nbsp;·&nbsp; <a href="index.html">← all mockups</a></div>
<script>
const cv=document.getElementById('stage'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);
const S={food:78,energy:82,fun:70,love:74,asleep:false,poke:0,blink:0,nextBlink:2,
  mouseX:.5,mouseY:.4,emotion:'happy',emoT:0};
const DRIVES=[['food','Food'],['energy','Energy'],['fun','Fun'],['love','Love']];
const barsEl=document.getElementById('bars');
DRIVES.forEach(([k,lbl])=>{barsEl.insertAdjacentHTML('beforeend',
  `<div class="bar"><label><span>${lbl}</span><span id="v_${k}"></span></label>
   <div class="track"><div class="fill" id="f_${k}"></div></div></div>`);});
function mood(){const m=(S.food+S.energy+S.fun+S.love)/4;
  if(S.asleep)return['sleepy','resting'];
  if(S.food<25)return['hungry','peckish'];
  if(m>70)return['happy','content'];
  if(m>45)return['neutral','calm'];
  return['sad','a little low'];}
function colFor(v){return v>55?'#8fe6c6':v>28?'#ffd79a':'#ff9eb6';}
function syncBars(){DRIVES.forEach(([k])=>{const v=Math.round(S[k]);
  document.getElementById('v_'+k).textContent=v;
  const f=document.getElementById('f_'+k);f.style.width=v+'%';f.style.background=colFor(v);f.style.color=colFor(v);});
  const[e,l]=mood();S.emotion=(S.poke>0?'excited':e);document.getElementById('moodlbl').textContent=l;}
const SYL=['dah','boo','bah','kah','mee','wee','doo','loo','nah','tay','kee','boh','dan','nye',
  'way','loh','toh','day','dee','noo','mah','soo','lee','oo','wah','myu','noo'];
const CANNED={feed:['Mmm~ num','Thank oo','Nom-nom…'],play:['Wheee~','So fun!','Boo-play!'],
  pet:['Aww… <3','Purr~','Mee love oo'],sleep:['Resting… zzz','Nini~','Soo sleepy…'],
  hungry:['Peckish…','Num soon?','Boo… hungee'],};
function phrase(){const n=2+(Math.random()*3|0);let w=[];for(let i=0;i<n;i++)w.push(SYL[Math.random()*SYL.length|0]);
  let s=w.join('-');return s[0].toUpperCase()+s.slice(1)+(Math.random()<.35?'!':'?');}
let soundOn=false,actx=null;const OSC='sine';
function babble(base){if(!soundOn)return;try{actx=actx||new(AudioContext||webkitAudioContext)();
  let t=actx.currentTime;const n=2+(Math.random()*3|0);
  for(let i=0;i<n;i++){const o=actx.createOscillator(),g=actx.createGain();o.type=OSC;
    const f=base*(.8+Math.random()*.6);o.frequency.setValueAtTime(f,t);
    o.frequency.linearRampToValueAtTime(f*(.85+Math.random()*.4),t+.14);
    g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.1,t+.03);
    g.gain.exponentialRampToValueAtTime(.0001,t+.2);o.connect(g).connect(actx.destination);
    o.start(t);o.stop(t+.22);t+=.16;}}catch(e){}}
const speechEl=document.getElementById('speech');let speechT=0;
function say(txt,base=340){speechEl.textContent=txt;speechEl.classList.add('show');speechT=2.8;babble(base);}
function robotHead(){return{x:W*0.5,y:H*0.46+Math.sin(clock*1.3)*7};}
function positionSpeech(){const h=robotHead();speechEl.style.left=h.x+'px';speechEl.style.top=(h.y-150)+'px';}
function act(a){
  if(a==='sound'){soundOn=!soundOn;try{actx=actx||new(AudioContext||webkitAudioContext)();}catch(e){}
    say(soundOn?'Boo~ (sound on)':'…(muted)',320);return;}
  if(S.asleep&&a!=='sleep')S.asleep=false;
  if(a==='feed'){S.food=Math.min(100,S.food+26);S.love=Math.min(100,S.love+4);pop('excited');say(rand(CANNED.feed),360);}
  if(a==='play'){S.fun=Math.min(100,S.fun+24);S.energy=Math.max(0,S.energy-10);pop('excited');say(rand(CANNED.play),380);}
  if(a==='pet'){S.love=Math.min(100,S.love+22);S.fun=Math.min(100,S.fun+6);pop('happy');say(rand(CANNED.pet),330);}
  if(a==='sleep'){S.asleep=!S.asleep;if(S.asleep)say(rand(CANNED.sleep),220);else say('Mm~ morning',340);}
  if(a==='talk'){pop('excited');say(phrase(),320+Math.random()*140);}
  syncBars();}
function rand(a){return a[Math.random()*a.length|0];}
function pop(e){S.emotion=e;S.emoT=1.2;S.poke=.6;}
document.querySelectorAll('button').forEach(b=>b.onclick=()=>act(b.dataset.act));
cv.addEventListener('pointermove',e=>{S.mouseX=e.clientX/W;S.mouseY=e.clientY/H;});
cv.addEventListener('pointerdown',e=>{const h=robotHead();const d=Math.hypot(e.clientX-h.x,e.clientY-h.y);
  if(d<170){if(S.asleep)S.asleep=false;S.poke=1;pop('excited');S.fun=Math.min(100,S.fun+8);
    say(Math.random()<.5?phrase():'Hee~!',440);}});

let clock=0;
function drawBackground(t){
  const g=ctx.createRadialGradient(W/2,H*.4,10,W/2,H*.4,Math.max(W,H)*.7);
  g.addColorStop(0,'#150f2e');g.addColorStop(1,'#080614');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // floating soft particles
  ctx.save();for(let i=0;i<28;i++){const x=(i*137.5+clock*8*(i%3+1))%W;const y=(i*89.3+clock*4*((i%2)+1))%H;
    const r=1+ (i%3);ctx.globalAlpha=.10+.06*Math.sin(clock+i);ctx.fillStyle=i%2?'#87e6ff':'#b79bff';
    ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();}ctx.restore();
  // soft floor arc
  ctx.save();ctx.strokeStyle='rgba(183,155,255,.18)';ctx.lineWidth=1.2;ctx.shadowColor='#a07bff';ctx.shadowBlur=20;
  const cy=H*.72;ctx.beginPath();ctx.ellipse(W/2,cy,W*.34,40,0,Math.PI,0);ctx.stroke();ctx.restore();
  // halo behind pet
  const hg=ctx.createRadialGradient(W/2,H*.44,20,W/2,H*.44,220);
  hg.addColorStop(0,'rgba(160,123,255,.16)');hg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=hg;ctx.fillRect(0,0,W,H);
}
function drawOverlay(t){
  const v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.4,W/2,H/2,Math.max(W,H)*.75);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,.4)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
}
const T={line:'#b79bff',line2:'#87e6ff',accent:'#ff9ecb',glow:'#a07bff',lw:1.6};
function rr(x,y,w,h,r){ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,w,h,r);else{
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);}ctx.closePath();}
function drawRobot(t){
  const bob=Math.sin(clock*1.3)*7, breathe=Math.sin(clock*1.3)*.5;
  const cx=W/2, cy=H*0.46+bob;
  const look={x:(S.mouseX-.5)*12,y:(S.mouseY-.5)*9};
  ctx.save();ctx.translate(cx,cy);
  ctx.lineWidth=T.lw;ctx.lineJoin='round';ctx.lineCap='round';
  const glow=(c,b)=>{ctx.shadowColor=c;ctx.shadowBlur=b;};
  // soft shadow disc
  glow(T.glow,18);ctx.strokeStyle='rgba(183,155,255,.5)';
  ctx.globalAlpha=.6;ctx.beginPath();ctx.ellipse(0,152,50,12,0,0,7);ctx.stroke();ctx.globalAlpha=1;
  // rounded capsule body
  glow(T.glow,16);ctx.strokeStyle=T.line;
  rr(-42,36,84,104,42);ctx.stroke();
  // soft belly light
  const mc=S.emotion==='sad'?'#ff9eb6':S.emotion==='hungry'?'#ffd79a':S.asleep?'#87e6ff':T.accent;
  glow(mc,22);ctx.strokeStyle=mc;ctx.beginPath();ctx.arc(0,92,17,0,7);ctx.stroke();
  ctx.fillStyle=mc;ctx.globalAlpha=.16+Math.abs(breathe)*.3;ctx.beginPath();ctx.arc(0,92,17,0,7);ctx.fill();ctx.globalAlpha=1;
  // gentle arms
  glow(T.glow,12);ctx.strokeStyle=T.line;const asw=Math.sin(clock*1.3+1)*7;
  ctx.beginPath();ctx.moveTo(-40,66);ctx.quadraticCurveTo(-64,86+asw,-58,110+asw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(40,66);ctx.quadraticCurveTo(64,86-asw,58,110-asw);ctx.stroke();
  ctx.beginPath();ctx.arc(-58,110+asw,6,0,7);ctx.stroke();ctx.beginPath();ctx.arc(58,110-asw,6,0,7);ctx.stroke();
  // antenna with soft dot
  const ax=Math.sin(clock*1.8)*6;ctx.beginPath();ctx.moveTo(0,-64);ctx.lineTo(ax,-96);ctx.stroke();
  glow(T.line2,24);ctx.fillStyle=T.line2;ctx.beginPath();ctx.arc(ax,-96,4.5,0,7);ctx.fill();
  glow(T.line2,10);ctx.globalAlpha=.4;ctx.beginPath();ctx.arc(ax,-96,9,0,7);ctx.stroke();ctx.globalAlpha=1;
  // rounded head
  glow(T.glow,18);ctx.strokeStyle=T.line;
  ctx.beginPath();ctx.ellipse(0,-38,44,34,0,0,7);ctx.stroke();
  // little ears
  ctx.beginPath();ctx.arc(-44,-40,6,0,7);ctx.stroke();ctx.beginPath();ctx.arc(44,-40,6,0,7);ctx.stroke();
  // face
  drawFace(look.x,look.y-38,T.line2);
  ctx.restore();
}
function drawFace(ox,oy,col){
  ctx.save();ctx.translate(ox,oy);ctx.shadowColor=col;ctx.shadowBlur=20;ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1.8;
  const blink=S.blink,e=S.emotion,asleep=S.asleep;const ex=15;
  for(const s of[-1,1]){ctx.save();ctx.translate(s*ex,0);
    if(asleep||blink>.6||e==='sleepy'){ctx.beginPath();ctx.moveTo(-7,0);ctx.quadraticCurveTo(0,4,7,0);ctx.stroke();}
    else if(e==='happy'||e==='excited'){ctx.beginPath();ctx.arc(0,0,6.5,0,7);ctx.stroke();
      ctx.beginPath();ctx.arc((S.mouseX-.5)*4,(S.mouseY-.5)*3,3,0,7);ctx.fill();}
    else if(e==='hungry'){ctx.beginPath();ctx.arc(0,0,6.5,0,7);ctx.stroke();ctx.beginPath();ctx.arc(0,2,2.2,0,7);ctx.fill();}
    else{ctx.beginPath();ctx.arc(0,0,6.5,0,7);ctx.stroke();ctx.beginPath();ctx.arc(0,0,2.8,0,7);ctx.fill();}
    ctx.restore();}
  // rosy cheeks when happy
  if(e==='happy'||e==='excited'){ctx.save();ctx.globalAlpha=.5;ctx.fillStyle='#ff9ecb';ctx.shadowColor='#ff9ecb';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(-24,8,4,0,7);ctx.fill();ctx.beginPath();ctx.arc(24,8,4,0,7);ctx.fill();ctx.restore();
    ctx.strokeStyle=col;}
  ctx.beginPath();
  if(asleep){ctx.arc(0,15,3.5,0,7);}
  else if(e==='excited'){ctx.moveTo(-8,11);ctx.quadraticCurveTo(0,22,8,11);ctx.quadraticCurveTo(0,16,-8,11);}
  else if(e==='happy'){ctx.moveTo(-8,12);ctx.quadraticCurveTo(0,19,8,12);}
  else if(e==='sad'||e==='hungry'){ctx.moveTo(-7,16);ctx.quadraticCurveTo(0,10,7,16);}
  else{ctx.moveTo(-6,13);ctx.lineTo(6,13);}
  ctx.stroke();ctx.restore();
}
let last=0;
function frame(ts){
  const dt=Math.min(.05,(ts-last)/1000||0);last=ts;clock+=dt;
  const rate=S.asleep?0.15:1;
  S.food=Math.max(0,S.food-dt*0.9*rate);
  S.energy=S.asleep?Math.min(100,S.energy+dt*3.2):Math.max(0,S.energy-dt*0.7);
  S.fun=Math.max(0,S.fun-dt*1.0*rate);
  S.love=Math.max(0,S.love-dt*0.6*rate);
  if(S.poke>0)S.poke=Math.max(0,S.poke-dt*1.6);
  if(S.emoT>0){S.emoT-=dt;if(S.emoT<=0&&!S.asleep){const[e]=mood();S.emotion=e;}}
  S.nextBlink-=dt;if(S.nextBlink<=0){S.blink=1;S.nextBlink=1.8+Math.random()*3.2;}
  if(S.blink>0)S.blink=Math.max(0,S.blink-dt*7);
  if(S.food<22&&!S.asleep&&speechT<=0&&Math.random()<dt*0.4){pop('hungry');say(rand(CANNED.hungry),300);}
  if(speechT>0){speechT-=dt;if(speechT<=0)speechEl.classList.remove('show');}
  syncBars();
  ctx.clearRect(0,0,W,H);drawBackground(clock);drawRobot(clock);drawOverlay(clock);positionSpeech();
  requestAnimationFrame(frame);
}
resize();syncBars();requestAnimationFrame(frame);
setTimeout(()=>say('Boo~ hallo!',330),700);
</script>
</body>
</html>
