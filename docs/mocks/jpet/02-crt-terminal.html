<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>JPet — CRT Terminal</title>
<style>
  :root{
    --line:#33ff9c; --line2:#ffcf3f; --accent:#ffcf3f; --glow:#33ff9c; --ink:#b6ffdd;
    --panel:rgba(0,24,14,.7); --good:#33ff9c; --warn:#ffcf3f; --bad:#ff6b6b;
    --font:"Courier New",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;color:var(--ink);font-family:var(--font);overflow:hidden}
  #stage{position:fixed;inset:0;width:100%;height:100%;display:block}
  .frame{position:fixed;inset:12px;border:2px solid rgba(51,255,156,.4);border-radius:10px;
    box-shadow:0 0 60px rgba(51,255,156,.25) inset;pointer-events:none;z-index:5}
  .hud{position:fixed;top:24px;left:32px;z-index:6}
  .name{font-size:22px;font-weight:700;letter-spacing:3px;color:var(--line);text-shadow:0 0 10px var(--line)}
  .name::after{content:"_";animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .mood{font-size:12px;opacity:.8;letter-spacing:2px;margin-top:4px}
  .mood::before{content:"> "}
  .bars{position:fixed;top:24px;right:32px;z-index:6;width:190px}
  .bar{margin-bottom:8px}
  .bar label{display:flex;justify-content:space-between;font-size:11px;letter-spacing:1px;opacity:.9;margin-bottom:2px}
  .track{height:12px;border:1px solid rgba(51,255,156,.5);background:transparent;
    display:flex;align-items:center;padding:2px;gap:2px;overflow:hidden}
  .fill{height:100%;display:flex;gap:2px}
  .seg{width:6px;height:100%;background:var(--good);box-shadow:0 0 6px var(--good)}
  .controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:6;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  button{font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:1px;color:var(--line);
    background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:10px 14px;cursor:pointer;
    text-transform:uppercase;transition:background .15s,box-shadow .2s}
  button:hover{background:rgba(51,255,156,.15);box-shadow:0 0 16px rgba(51,255,156,.4)}
  button:active{transform:translateY(1px)}
  .tag{position:fixed;bottom:22px;left:22px;z-index:6;font-size:11px;letter-spacing:2px;opacity:.5}
  .tag a{color:var(--accent);text-decoration:none}
  .speech{position:fixed;z-index:7;max-width:260px;padding:8px 12px;border:1px solid var(--line);
    background:#001b0f;color:var(--line);font-size:16px;font-weight:700;letter-spacing:1px;
    text-shadow:0 0 8px var(--line);box-shadow:0 0 20px rgba(51,255,156,.35);
    opacity:0;transform:translate(-50%,6px);transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
  .speech::before{content:"◤ "}
  .speech.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="frame"></div>
<div class="hud"><div class="name" id="petname">UNIT-7</div><div class="mood" id="moodlbl">system nominal</div></div>
<div class="bars" id="bars"></div>
<div class="speech" id="speech"></div>
<div class="controls">
  <button data-act="feed">🍔 Feed</button>
  <button data-act="play">🎮 Play</button>
  <button data-act="pet">✋ Pet</button>
  <button data-act="sleep">💤 Sleep</button>
  <button data-act="talk">💬 Talk</button>
  <button data-act="sound">🔊 Sound</button>
</div>
<div class="tag">02 · CRT TERMINAL &nbsp;·&nbsp; <a href="index.html">← all mockups</a></div>
<script>
const cv=document.getElementById('stage'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);
const S={food:78,energy:82,fun:70,love:74,asleep:false,poke:0,blink:0,nextBlink:2,
  mouseX:.5,mouseY:.4,emotion:'happy',emoT:0};
const DRIVES=[['food','🍔 FUEL'],['energy','⚡ PWR'],['fun','🎮 FUN'],['love','💗 BOND']];
const barsEl=document.getElementById('bars');
DRIVES.forEach(([k,lbl])=>{barsEl.insertAdjacentHTML('beforeend',
  `<div class="bar"><label><span>${lbl}</span><span id="v_${k}"></span></label>
   <div class="track"><div class="fill" id="f_${k}"></div></div></div>`);});
function mood(){const m=(S.food+S.energy+S.fun+S.love)/4;
  if(S.asleep)return['sleepy','low-power mode'];
  if(S.food<25)return['hungry','FUEL CRITICAL'];
  if(m>70)return['happy','system nominal'];
  if(m>45)return['neutral','running ok'];
  return['sad','morale degraded'];}
function colFor(v){return v>55?'var(--good)':v>28?'var(--warn)':'var(--bad)';}
function syncBars(){DRIVES.forEach(([k])=>{const v=Math.round(S[k]);
  document.getElementById('v_'+k).textContent=v;
  const n=Math.round(v/100*14);let h='';for(let i=0;i<n;i++)h+=`<span class="seg" style="background:${colFor(v)};box-shadow:0 0 6px ${colFor(v)}"></span>`;
  document.getElementById('f_'+k).innerHTML=h;});
  const[e,l]=mood();S.emotion=(S.poke>0?'excited':e);document.getElementById('moodlbl').textContent=l;}
const SYL=['dah','boo','bah','kah','mee','wee','doo','loo','nah','tay','kee','boh','dan','nye',
  'way','loh','toh','day','dee','noo','mah','guh','tee','oo','wah','bok','lah','bip','vrr'];
const CANNED={feed:['NUM NUM NUM','FUEL: YUM','MEE-TAY FOOD'],play:['WHEEE','PLAY PLAY','FUN=TRUE'],
  pet:['PURR~','AWW-LOH','MEE LOVE OO'],sleep:['ZZZ…','NINI-NOO','LOWPWR: OK'],
  hungry:['FEED ME','FUEL? FUEL??','BOO-HUNGRY'],};
function phrase(){const n=2+(Math.random()*4|0);let w=[];for(let i=0;i<n;i++)w.push(SYL[Math.random()*SYL.length|0]);
  return w.join('-').toUpperCase()+(Math.random()<.4?'!':'?');}
let soundOn=false,actx=null;const OSC='triangle';
function babble(base){if(!soundOn)return;try{actx=actx||new(AudioContext||webkitAudioContext)();
  let t=actx.currentTime;const n=2+(Math.random()*3|0);
  for(let i=0;i<n;i++){const o=actx.createOscillator(),g=actx.createGain();o.type=OSC;
    const f=base*(.7+Math.random()*.9);o.frequency.setValueAtTime(f,t);
    o.frequency.linearRampToValueAtTime(f*(.75+Math.random()*.7),t+.11);
    g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.11,t+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+.15);o.connect(g).connect(actx.destination);
    o.start(t);o.stop(t+.17);t+=.13;}}catch(e){}}
const speechEl=document.getElementById('speech');let speechT=0;
function say(txt,base=200){speechEl.textContent=txt;speechEl.classList.add('show');speechT=2.6;babble(base);}
function robotHead(){return{x:W*0.5,y:H*0.46+Math.sin(clock*1.6)*5};}
function positionSpeech(){const h=robotHead();speechEl.style.left=h.x+'px';speechEl.style.top=(h.y-150)+'px';}
function act(a){
  if(a==='sound'){soundOn=!soundOn;try{actx=actx||new(AudioContext||webkitAudioContext)();}catch(e){}
    say(soundOn?'AUDIO: ON':'AUDIO: OFF',200);return;}
  if(S.asleep&&a!=='sleep')S.asleep=false;
  if(a==='feed'){S.food=Math.min(100,S.food+26);S.love=Math.min(100,S.love+4);pop('excited');say(rand(CANNED.feed),240);}
  if(a==='play'){S.fun=Math.min(100,S.fun+24);S.energy=Math.max(0,S.energy-10);pop('excited');say(rand(CANNED.play),260);}
  if(a==='pet'){S.love=Math.min(100,S.love+22);S.fun=Math.min(100,S.fun+6);pop('happy');say(rand(CANNED.pet),220);}
  if(a==='sleep'){S.asleep=!S.asleep;if(S.asleep)say(rand(CANNED.sleep),140);else say('REBOOT: HI',230);}
  if(a==='talk'){pop('excited');say(phrase(),190+Math.random()*130);}
  syncBars();}
function rand(a){return a[Math.random()*a.length|0];}
function pop(e){S.emotion=e;S.emoT=1.1;S.poke=.6;}
document.querySelectorAll('button').forEach(b=>b.onclick=()=>act(b.dataset.act));
cv.addEventListener('pointermove',e=>{S.mouseX=e.clientX/W;S.mouseY=e.clientY/H;});
cv.addEventListener('pointerdown',e=>{const h=robotHead();const d=Math.hypot(e.clientX-h.x,e.clientY-h.y);
  if(d<160){if(S.asleep)S.asleep=false;S.poke=1;pop('excited');S.fun=Math.min(100,S.fun+8);
    say(Math.random()<.5?phrase():'HEE-HEE',300);}});

let clock=0;
function drawBackground(t){
  ctx.fillStyle='#000600';ctx.fillRect(0,0,W,H);
  // faint phosphor grid
  ctx.save();ctx.strokeStyle='rgba(51,255,156,.09)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=34){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=34){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  // floor line
  ctx.save();ctx.strokeStyle='rgba(51,255,156,.4)';ctx.lineWidth=1.5;ctx.shadowColor='#33ff9c';ctx.shadowBlur=10;
  const hz=H*.66;ctx.beginPath();ctx.moveTo(0,hz);ctx.lineTo(W,hz);ctx.stroke();ctx.restore();
  // center phosphor glow
  const g=ctx.createRadialGradient(W/2,H*.45,20,W/2,H*.45,Math.max(W,H)*.5);
  g.addColorStop(0,'rgba(51,255,156,.10)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function drawOverlay(t){
  // scanlines
  ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#000';
  for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1.4);
  // rolling brightness bar
  const by=(t*90)%(H+140)-70;const bg=ctx.createLinearGradient(0,by-60,0,by+60);
  bg.addColorStop(0,'rgba(51,255,156,0)');bg.addColorStop(.5,'rgba(51,255,156,.06)');bg.addColorStop(1,'rgba(51,255,156,0)');
  ctx.globalAlpha=1;ctx.fillStyle=bg;ctx.fillRect(0,by-60,W,120);
  ctx.restore();
  // vignette
  const v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.3,W/2,H/2,Math.max(W,H)*.7);
  v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,.55)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
}
const T={line:'#33ff9c',line2:'#ffcf3f',accent:'#ffcf3f',glow:'#33ff9c',lw:2.6};
function drawRobot(t){
  const bob=Math.sin(clock*1.6)*5, breathe=Math.sin(clock*1.6)*.5;
  const cx=W/2, cy=H*0.46+bob;
  const look={x:(S.mouseX-.5)*10,y:(S.mouseY-.5)*7};
  ctx.save();ctx.translate(cx,cy);
  ctx.lineWidth=T.lw;ctx.lineJoin='miter';ctx.lineCap='square';
  const glow=(c,b)=>{ctx.shadowColor=c;ctx.shadowBlur=b;};
  glow(T.glow,10);ctx.strokeStyle=T.line;
  // hover base (tread box)
  ctx.strokeRect(-58,140,116,20);
  ctx.beginPath();for(let i=-4;i<=4;i++){ctx.moveTo(i*13,140);ctx.lineTo(i*13,160);}ctx.stroke();
  // body (boxy)
  glow(T.glow,14);ctx.strokeRect(-50,40,100,96);
  // chest readout
  const mc=S.emotion==='sad'?'#ff6b6b':S.emotion==='hungry'?'#ffcf3f':S.asleep?'#5fd0ff':T.line;
  glow(mc,14);ctx.strokeStyle=mc;ctx.strokeRect(-30,58,60,40);
  ctx.fillStyle=mc;ctx.globalAlpha=.12+Math.abs(breathe)*.25;ctx.fillRect(-30,58,60,40);ctx.globalAlpha=1;
  // waveform in chest
  ctx.beginPath();for(let i=0;i<=24;i++){const x=-28+i*(56/24);
    const y=78+Math.sin(clock*6+i*.6)*(S.asleep?2:8)*(0.4+Math.abs(breathe));i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();
  // arms (segmented, blocky)
  glow(T.glow,10);ctx.strokeStyle=T.line;const asw=Math.sin(clock*1.6+1)*5;
  ctx.strokeRect(-72,60+asw,16,40);ctx.strokeRect(56,60-asw,16,40);
  // neck
  ctx.beginPath();ctx.moveTo(-16,40);ctx.lineTo(-16,28);ctx.moveTo(16,40);ctx.lineTo(16,28);ctx.stroke();
  // antenna
  const ax=Math.sin(clock*2.1)*6;ctx.beginPath();ctx.moveTo(0,-70);ctx.lineTo(ax,-102);ctx.stroke();
  glow(T.accent,20);ctx.fillStyle=T.accent;ctx.fillRect(ax-4,-108,8,8);
  // head (square)
  glow(T.glow,16);ctx.strokeStyle=T.line;ctx.strokeRect(-50,-70,100,64);
  // side vents
  ctx.beginPath();ctx.moveTo(-50,-56);ctx.lineTo(-58,-56);ctx.moveTo(-50,-44);ctx.lineTo(-58,-44);
  ctx.moveTo(50,-56);ctx.lineTo(58,-56);ctx.moveTo(50,-44);ctx.lineTo(58,-44);ctx.stroke();
  // face (pixel eyes)
  drawFace(look.x,look.y-38,T.line);
  ctx.restore();
}
function drawFace(ox,oy,col){
  ctx.save();ctx.translate(ox,oy);ctx.shadowColor=col;ctx.shadowBlur=16;ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2.6;
  const blink=S.blink,e=S.emotion,asleep=S.asleep;const ex=20;
  for(const s of[-1,1]){ctx.save();ctx.translate(s*ex,0);
    if(asleep||blink>.6||e==='sleepy'){ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.stroke();}
    else if(e==='happy'||e==='excited'){ctx.strokeRect(-8,-8,16,16);
      ctx.fillRect(-3+(S.mouseX-.5)*4,-3+(S.mouseY-.5)*3,6,6);}
    else if(e==='hungry'){ctx.strokeRect(-8,-8,16,16);ctx.fillRect(-2,2,4,4);}
    else{ctx.strokeRect(-8,-8,16,16);ctx.fillRect(-3,-3,6,6);}
    ctx.restore();}
  ctx.beginPath();
  if(asleep){ctx.fillRect(-3,14,6,4);}
  else if(e==='excited'){ctx.strokeRect(-10,12,20,10);}
  else if(e==='happy'){ctx.moveTo(-10,14);ctx.lineTo(-6,20);ctx.lineTo(6,20);ctx.lineTo(10,14);ctx.stroke();}
  else if(e==='sad'||e==='hungry'){ctx.moveTo(-9,20);ctx.lineTo(-5,15);ctx.lineTo(5,15);ctx.lineTo(9,20);ctx.stroke();}
  else{ctx.moveTo(-8,16);ctx.lineTo(8,16);ctx.stroke();}
  ctx.restore();
}
let last=0;
function frame(ts){
  const dt=Math.min(.05,(ts-last)/1000||0);last=ts;clock+=dt;
  const rate=S.asleep?0.15:1;
  S.food=Math.max(0,S.food-dt*0.9*rate);
  S.energy=S.asleep?Math.min(100,S.energy+dt*3.2):Math.max(0,S.energy-dt*0.7);
  S.fun=Math.max(0,S.fun-dt*1.0*rate);
  S.love=Math.max(0,S.love-dt*0.6*rate);
  if(S.poke>0)S.poke=Math.max(0,S.poke-dt*1.6);
  if(S.emoT>0){S.emoT-=dt;if(S.emoT<=0&&!S.asleep){const[e]=mood();S.emotion=e;}}
  S.nextBlink-=dt;if(S.nextBlink<=0){S.blink=1;S.nextBlink=1.6+Math.random()*3;}
  if(S.blink>0)S.blink=Math.max(0,S.blink-dt*7);
  if(S.food<22&&!S.asleep&&speechT<=0&&Math.random()<dt*0.4){pop('hungry');say(rand(CANNED.hungry),180);}
  if(speechT>0){speechT-=dt;if(speechT<=0)speechEl.classList.remove('show');}
  syncBars();
  ctx.clearRect(0,0,W,H);drawBackground(clock);drawRobot(clock);drawOverlay(clock);positionSpeech();
  requestAnimationFrame(frame);
}
resize();syncBars();requestAnimationFrame(frame);
setTimeout(()=>say('BIP-BOO. HALLO!',210),700);
</script>
</body>
</html>
