<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Entity view — former relationships · 3 approaches (interactive mock)</title>
    <style>
      /* Design tokens — copied from frontend/src/styles/tokens.css. */
      :root {
        --steel: #7fa7c9; --steel-tint: rgba(127, 167, 201, 0.13);
        --green: #8fbc9a; --green-tint: rgba(143, 188, 154, 0.13);
        --amber: #c9a36a; --amber-tint: rgba(201, 163, 106, 0.13);
        --rose: #cf8a8f; --rose-tint: rgba(207, 138, 143, 0.13);
        --violet: #a493c9; --violet-tint: rgba(164, 147, 201, 0.14);
        --slate: #9aa0a8; --slate-tint: rgba(154, 160, 168, 0.16);
        --accent: var(--steel);
        --font-scale: 1;
        --fs-micro: calc(12px * var(--font-scale));
        --fs-head: calc(13px * var(--font-scale));
        --fs-secondary: calc(14px * var(--font-scale));
        --fs-note: calc(15px * var(--font-scale));
        --fs-body: calc(16px * var(--font-scale));
        --fs-title: calc(18px * var(--font-scale));
        --fs-screen: calc(22px * var(--font-scale));
        --r-input: 12px; --r-card: 16px; --r-pill: 999px;
        --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      }
      [data-theme="light"] {
        color-scheme: light;
        --page: #ecece9; --bg: #f7f7f5; --surface: #ffffff; --surface-2: #f0f0ee;
        --border: #e2e2df; --text: #1a1b1e; --text-2: #5c5f66; --text-3: #9a9da3;
        --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.06); --scrim: rgba(20, 20, 18, 0.45);
      }
      [data-theme="dark"] {
        color-scheme: dark;
        --page: #060708; --bg: #0e0f11; --surface: #17181b; --surface-2: #1e2024;
        --border: #26282c; --text: #e6e7e9; --text-2: #9a9da3; --text-3: #5c5f66;
        --shadow-card: none; --slate-tint: rgba(154, 160, 168, 0.13); --scrim: rgba(0, 0, 0, 0.6);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--page); color: var(--text);
        font: 400 var(--fs-body) / 1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex; flex-direction: column; align-items: center; gap: 14px;
        padding: 22px 14px 60px; min-height: 100vh;
      }

      /* ---- demo chrome ---- */
      .demo-bar { width: 100%; max-width: 460px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .demo-title { font-size: var(--fs-secondary); color: var(--text-2); margin-right: auto; }
      .demo-title b { color: var(--text); font-weight: 600; }
      .seg { display: inline-flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-pill); padding: 3px; }
      .seg button { appearance: none; border: none; background: none; color: var(--text-2); font: inherit; font-size: var(--fs-secondary); padding: 5px 13px; border-radius: var(--r-pill); cursor: pointer; }
      .seg button[aria-pressed="true"] { background: var(--steel-tint); color: var(--steel); font-weight: 600; }
      .approach-seg { width: 100%; max-width: 460px; display: flex; gap: 6px; }
      .approach-seg button { flex: 1; appearance: none; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); font: inherit; font-size: var(--fs-secondary); padding: 9px 8px; border-radius: var(--r-input); cursor: pointer; text-align: left; line-height: 1.25; }
      .approach-seg button .ttl { font-weight: 600; color: var(--text); display: block; }
      .approach-seg button .sub { font-size: 11px; color: var(--text-3); }
      .approach-seg button[aria-pressed="true"] { border-color: var(--steel); background: var(--steel-tint); }
      .approach-seg button[aria-pressed="true"] .ttl { color: var(--steel); }
      .demo-note { width: 100%; max-width: 460px; font-size: var(--fs-head); color: var(--text-3); line-height: 1.55; }
      .demo-note b { color: var(--text-2); font-weight: 600; }
      .demo-note code { font-family: var(--font-mono); color: var(--text-2); }

      /* ---- phone ---- */
      .phone { width: 100%; max-width: 460px; height: 880px; background: var(--bg); border: 1px solid var(--border); border-radius: 30px; overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25); }
      .statusbar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 4px; font-size: var(--fs-secondary); font-weight: 600; color: var(--text); }
      .statusbar .right { display: flex; gap: 7px; align-items: center; color: var(--text-2); font-weight: 500; }
      .batt { background: var(--green); color: #06250f; border-radius: 5px; padding: 1px 5px; font-size: 11px; font-weight: 700; }
      .screenhead { display: flex; align-items: center; gap: 12px; padding: 8px 18px 2px; }
      .screenhead .back { font-size: var(--fs-screen); color: var(--text-2); }
      .screenhead h1 { margin: 0; font-size: var(--fs-screen); font-weight: 600; }
      .screenhead .spacer { margin-left: auto; }
      .live-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
      .bolt { color: var(--text-2); font-size: var(--fs-title); }

      .body { flex: 1; overflow-y: auto; padding: 8px 16px 28px; display: flex; flex-direction: column; gap: 18px; position: relative; }

      /* entity hub */
      .entity-hub { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 14px 0 2px; text-align: center; }
      .avatar { width: 72px; height: 72px; border-radius: 50%; display: grid; place-items: center; background: var(--surface-2); color: var(--steel); margin-bottom: 6px; }
      .entity-name { margin: 0; font-size: var(--fs-screen); font-weight: 600; }
      .entity-kind { margin: 2px 0 0; font-size: var(--fs-note); color: var(--text-2); }
      .entity-aliases { margin: 2px 0 0; font-size: var(--fs-secondary); color: var(--text-3); }
      .entity-domain { display: flex; align-items: center; gap: 7px; margin: 6px 0 0; font-size: var(--fs-secondary); color: var(--text-2); }
      .domain-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

      .section-header { font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin: 0 2px 8px; }

      /* fact card */
      .fact-card { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card); box-shadow: var(--shadow-card); overflow: hidden; }
      .entity-pred { display: flex; flex-direction: column; gap: 6px; padding: 13px 14px; }
      .entity-pred + .entity-pred, .prev-group, .fact-card > .entity-pred + .prev-group { border-top: 1px solid var(--border); }
      .pred-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .fact-edge { font-size: var(--fs-note); display: inline-flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
      .edge-path { font-family: var(--font-mono); font-size: var(--fs-secondary); color: var(--text-2); }
      .edge-arrow { color: var(--text-3); }
      .edge-value { font-weight: 600; }
      .edge-object { font-weight: 600; color: var(--accent); }
      .is-former .edge-object, .is-former .edge-value { color: var(--text-2); font-weight: 500; }

      .chip { display: inline-flex; align-items: center; gap: 4px; font-size: var(--fs-micro); padding: 1px 9px; border-radius: var(--r-pill); }
      .chip-pending { background: var(--amber-tint); color: var(--amber); }
      .chip-former { background: var(--slate-tint); color: var(--text-2); }
      .chip-now { background: var(--green-tint); color: var(--green); }

      .pred-history-toggle, .prev-head { appearance: none; background: none; border: none; font: inherit; cursor: pointer; }
      .pred-history-toggle { align-self: flex-start; font-size: var(--fs-secondary); color: var(--steel); padding: 2px 0; }

      /* Approach C — interval tenure track under a row */
      .tenure { display: flex; align-items: center; gap: 8px; font-size: var(--fs-micro); color: var(--text-3); margin-top: 1px; }
      .tenure-bar { position: relative; flex: 1; max-width: 150px; height: 6px; border-radius: var(--r-pill); background: var(--surface-2); overflow: hidden; }
      .tenure-fill { position: absolute; top: 0; bottom: 0; border-radius: var(--r-pill); }
      .tenure-bar.former .tenure-fill { left: 8%; width: 50%; opacity: 0.85; background: repeating-linear-gradient(90deg, var(--slate) 0 6px, transparent 6px 10px); }
      .tenure-bar.current .tenure-fill { left: 36%; right: 0; background: var(--green); }
      .tenure-label.now { color: var(--green); }
      .tenure-label.former { color: var(--text-2); }

      /* Approach B — previously group */
      .prev-head { display: flex; align-items: center; gap: 8px; width: 100%; padding: 11px 14px; background: var(--surface-2); font-size: var(--fs-micro); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }
      .prev-head .count { margin-left: auto; text-transform: none; letter-spacing: 0; color: var(--text-2); }
      .prev-head .caret { transition: transform 0.15s ease; color: var(--text-3); }
      .prev-group.collapsed .prev-head .caret { transform: rotate(-90deg); }
      .prev-group.collapsed .prev-body { display: none; }
      .prev-body .entity-pred { padding-top: 10px; padding-bottom: 10px; }
      .prev-empty { padding: 13px 14px; font-size: var(--fs-secondary); color: var(--text-3); }

      /* mentions */
      .mention { padding: 12px 14px; }
      .mention + .mention { border-top: 1px solid var(--border); }
      .mention-text { font-size: var(--fs-note); }
      .mention-text mark { background: var(--steel-tint); color: var(--steel); border-radius: 3px; padding: 0 2px; }
      .mention-date { font-size: var(--fs-micro); color: var(--text-3); margin-top: 4px; }

      /* history sheet */
      .sheet-scrim { position: absolute; inset: 0; z-index: 20; background: var(--scrim); display: flex; flex-direction: column; justify-content: flex-end; animation: fade 140ms ease-out; }
      .sheet-scrim[hidden] { display: none; }
      .sheet { background: var(--surface); border: 1px solid var(--border); border-bottom: none; border-radius: var(--r-card) var(--r-card) 0 0; padding: 0 16px 22px; animation: rise 170ms ease-out; }
      .sheet-handle { width: 34px; height: 4px; border-radius: var(--r-pill); background: var(--border); margin: 12px auto 10px; }
      .sheet-title { font-size: var(--fs-title); font-weight: 600; margin: 0 0 4px; }
      .sheet-sub { font-size: var(--fs-secondary); color: var(--text-3); margin: 0 0 14px; }
      .timeline-rail { list-style: none; margin: 0; padding: 0 0 0 6px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
      .rail-fact { position: relative; padding: 7px 0 7px 16px; }
      .rail-dot { position: absolute; left: -10px; top: 13px; width: 8px; height: 8px; border-radius: var(--r-pill); background: var(--steel); }
      .rail-fact.former .rail-dot { background: var(--slate); }
      .rail-value { font-size: var(--fs-note); font-weight: 600; color: var(--accent); }
      .rail-span { display: flex; align-items: center; gap: 7px; font-size: var(--fs-micro); color: var(--text-3); margin-top: 2px; }
      .rail-cite { font-size: var(--fs-micro); color: var(--text-3); margin-top: 3px; font-style: italic; }
      @keyframes rise { from { transform: translateY(16px); } to { transform: none; } }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div class="demo-bar">
      <div class="demo-title"><b>Entity view — former relationships.</b> marking employers you've left</div>
      <div class="seg" role="group" aria-label="theme">
        <button id="t-dark" aria-pressed="true">dark</button>
        <button id="t-light" aria-pressed="false">light</button>
      </div>
    </div>

    <div class="approach-seg" role="group" aria-label="approach">
      <button data-app="A" aria-pressed="true"><span class="ttl">A · inline former</span><span class="sub">a quiet chip + dimmed value</span></button>
      <button data-app="B" aria-pressed="false"><span class="ttl">B · previously</span><span class="sub">split current vs. past</span></button>
      <button data-app="C" aria-pressed="false"><span class="ttl">C · tenure track</span><span class="sub">an interval bar per edge</span></button>
    </div>

    <div class="phone">
      <div class="statusbar"><span>15:29</span><span class="right">JBrain&nbsp;· <span class="batt">42</span></span></div>
      <div class="screenhead"><span class="back">‹</span><h1>Entity</h1><span class="spacer"></span><span class="live-dot"></span><span class="bolt">⚡</span></div>
      <div class="body" id="screen"></div>
    </div>

    <div class="demo-note" id="note"></div>

    <script>
      // The entity + its worksFor history. Both employers are FORMER ("I used to
      // work…") — valid_to set, valid_from unknown — so this is the hard case:
      // the head value is itself former, with no current employer.
      const ME = {
        name: "Me", kind: "person", aliases: ["Jeff Hopkins", "Me"], domain: "general",
        nameFull: { value: "Jeff Hopkins", status: "pending review" },
        worksFor: [
          { value: "US Army", from: null, to: "2026", note: "I used to work for the US Army", former: true },
          { value: "Oregon Lithoprint", from: null, to: "2026", note: "I used to work at Oregon Lithoprint", former: true },
        ],
        mentions: [
          { text: "I used to work for the US Army", date: "Jun 16, 2026" },
          { text: "I used to work at Oregon Lithoprint", date: "Jun 16, 2026" },
          { text: "My na<mark>me</mark> is Jeff Hopkins", date: "Jun 16, 2026" },
        ],
      };

      let state = { theme: "dark", app: "A", expanded: false, prevOpen: false, sheet: false };

      const span = (f) => `${f.from ?? "—"} → ${f.to}`;

      // ----- the name.full row (shared, unchanged across approaches) -----
      function nameRow() {
        return `<div class="entity-pred"><div class="pred-head">
          <span class="fact-edge"><span class="edge-path">name.full</span><span class="edge-arrow">→</span>
          <span class="edge-value">${ME.nameFull.value}</span></span>
          <span class="chip chip-pending">${ME.nameFull.status}</span></div></div>`;
      }

      // ----- Approach A — inline "former" chip + dimmed value -----
      function worksForA() {
        const head = ME.worksFor[0];
        const earlier = ME.worksFor.slice(1);
        let out = `<div class="entity-pred is-former"><div class="pred-head">
          <span class="fact-edge"><span class="edge-path">worksFor</span><span class="edge-arrow">→</span>
          <button class="edge-object" data-sheet style="background:none;border:none;cursor:pointer;font:inherit;padding:0">${head.value}</button></span>
          <span class="chip chip-former">former · ended ${head.to}</span></div>`;
        if (earlier.length) {
          out += `<button class="pred-history-toggle" data-expand>${state.expanded ? "hide" : `${earlier.length} earlier`} →</button>`;
          if (state.expanded) {
            out += earlier.map(f => `<div class="pred-head" style="margin-top:2px">
              <span class="fact-edge is-former"><span class="edge-object" style="color:var(--text-2);font-weight:500">${f.value}</span></span>
              <span class="chip chip-former">former · ended ${f.to}</span></div>`).join("");
          }
        }
        out += `</div>`;
        return out;
      }

      // ----- Approach B — Current / Previously split -----
      function worksForB() {
        // No open employer, so worksFor has nothing "current" — it lives entirely
        // under a Previously group, which states the absence plainly.
        let body = ME.worksFor.map(f => `<div class="entity-pred is-former"><div class="pred-head">
          <span class="fact-edge"><span class="edge-path">worksFor</span><span class="edge-arrow">→</span>
          <button class="edge-object" data-sheet style="background:none;border:none;cursor:pointer;font:inherit;padding:0;color:var(--text-2);font-weight:500">${f.value}</button></span>
          <span class="tenure-label former">${span(f)}</span></div></div>`).join("");
        return `<div class="prev-group${state.prevOpen ? "" : " collapsed"}">
          <button class="prev-head" data-prev><span class="caret">⌄</span> previously<span class="count">${ME.worksFor.length} former · no current employer</span></button>
          <div class="prev-body">${body}</div></div>`;
      }

      // ----- Approach C — interval tenure track under each edge -----
      function worksForC() {
        const head = ME.worksFor[0];
        const earlier = ME.worksFor.slice(1);
        const row = (f) => `<div class="pred-head">
            <span class="fact-edge"><span class="edge-path">worksFor</span><span class="edge-arrow">→</span>
            <button class="edge-object" data-sheet style="background:none;border:none;cursor:pointer;font:inherit;padding:0;color:var(--text-2);font-weight:500">${f.value}</button></span>
          </div>
          <div class="tenure"><span class="tenure-bar former"><span class="tenure-fill"></span></span><span class="tenure-label former">${span(f)}</span></div>`;
        let out = `<div class="entity-pred is-former">${row(head)}`;
        if (earlier.length) {
          out += `<button class="pred-history-toggle" data-expand>${state.expanded ? "hide" : `${earlier.length} earlier`} →</button>`;
          if (state.expanded) out += earlier.map(f => `<div style="margin-top:6px">${row(f)}</div>`).join("");
        }
        out += `</div>`;
        return out;
      }

      function worksForBlock() {
        return state.app === "A" ? worksForA() : state.app === "B" ? worksForB() : worksForC();
      }

      function sheet() {
        if (!state.sheet) return "";
        return `<div class="sheet-scrim" data-scrim><div class="sheet">
          <div class="sheet-handle"></div>
          <h3 class="sheet-title">worksFor</h3>
          <p class="sheet-sub">two former employers · no current one</p>
          <ul class="timeline-rail">${ME.worksFor.map(f => `<li class="rail-fact former">
            <span class="rail-dot"></span>
            <div class="rail-value">${f.value}</div>
            <div class="rail-span">${span(f)} <span class="chip chip-former">former</span></div>
            <div class="rail-cite">“${f.note.replace(/<[^>]+>/g, "")}”</div></li>`).join("")}</ul>
        </div></div>`;
      }

      function render() {
        document.getElementById("screen").innerHTML = `
          <header class="entity-hub">
            <span class="avatar">${personGlyph()}</span>
            <h2 class="entity-name">${ME.name}</h2>
            <p class="entity-kind">${ME.kind}</p>
            <p class="entity-aliases">also ${ME.aliases.map(a => `“${a}”`).join(", ")}</p>
            <p class="entity-domain"><span class="domain-dot"></span>${ME.domain}</p>
          </header>

          <section>
            <h3 class="section-header">current</h3>
            <div class="fact-card">${nameRow()}${worksForBlock()}</div>
          </section>

          <section>
            <h3 class="section-header">mentions</h3>
            <div class="fact-card">${ME.mentions.map(m => `<div class="mention">
              <div class="mention-text">${m.text}</div><div class="mention-date">${m.date}</div></div>`).join("")}</div>
          </section>
          ${sheet()}`;
        wire();
        document.getElementById("note").innerHTML = noteFor();
      }

      function personGlyph() {
        return `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg>`;
      }

      function noteFor() {
        const common = "Both employers are <b>former</b> (“I used to work…”): <code>valid_to</code> is set, so neither is current.";
        if (state.app === "A") return `${common} <b>A · inline former</b> keeps the edges in place and tags each with a quiet <code>former · ended 2026</code> chip, dimming the value. Lowest friction; current and past share one list.`;
        if (state.app === "B") return `${common} <b>B · previously</b> splits the card: live edges sit up top, former ones collapse under a <code>previously</code> header that states “no current employer”. Clearest separation of now vs. then.`;
        return `${common} <b>C · tenure track</b> draws a faded, dashed interval bar with its <code>— → 2026</code> span under each edge — a finished span reads as ended without hiding it. (This is the direction DESIGN.md settled on.) Tap a value for the full history rail.`;
      }

      function wire() {
        document.querySelectorAll("[data-expand]").forEach(b => b.onclick = () => { state.expanded = !state.expanded; render(); });
        const prev = document.querySelector("[data-prev]"); if (prev) prev.onclick = () => { state.prevOpen = !state.prevOpen; render(); };
        document.querySelectorAll("[data-sheet]").forEach(b => b.onclick = () => { state.sheet = true; render(); });
        const scrim = document.querySelector("[data-scrim]"); if (scrim) scrim.onclick = (e) => { if (e.target === scrim) { state.sheet = false; render(); } };
      }

      document.querySelectorAll("[data-app]").forEach(b => b.onclick = () => {
        state.app = b.dataset.app; state.expanded = false; state.prevOpen = state.app === "B"; state.sheet = false;
        document.querySelectorAll("[data-app]").forEach(x => x.setAttribute("aria-pressed", x === b));
        render();
      });
      document.getElementById("t-dark").onclick = () => setTheme("dark");
      document.getElementById("t-light").onclick = () => setTheme("light");
      function setTheme(t) { state.theme = t; document.documentElement.dataset.theme = t;
        document.getElementById("t-dark").setAttribute("aria-pressed", t === "dark");
        document.getElementById("t-light").setAttribute("aria-pressed", t === "light"); }

      render();
    </script>
  </body>
</html>
