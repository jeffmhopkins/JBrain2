<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JBrain — Omnibox (v1-faithful)</title>
<style>
:root{
  --bg:#0E0F11; --surface:#17181B; --surface-2:#1E2024; --border:#26282C;
  --text:#E6E7E9; --text-2:#9A9DA3; --text-3:#5C5F66;
  --steel:#7FA7C9; --amber:#C9A36A; --rose:#CF8A8F; --green:#8FBC9A; --violet:#A493C9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:400 16px/1.4 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 16px}
.wordmark{font-weight:700;font-size:22px}.wordmark i{color:var(--steel);font-style:normal}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:16px;color:var(--text-2)}
.dot{width:8px;height:8px;border-radius:999px;background:var(--green);display:inline-block}
svg{fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

main{flex:1;overflow-y:auto;padding:0 16px;display:flex;flex-direction:column;justify-content:flex-end;gap:12px}
.sect{font-size:12px;letter-spacing:.08em;color:var(--text-3);text-transform:uppercase;margin:8px 2px 0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px}
.note{padding:13px 16px;display:flex;flex-direction:column;gap:5px}
.note + .note{border-top:1px solid var(--border)}
.note .head{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-3)}
.ddot{width:7px;height:7px;border-radius:99px;flex:none}
.note .body{font-size:15px}
.chip{font-size:12px;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--text-2);display:inline-flex;align-items:center;gap:5px;width:fit-content}
.pend{background:rgba(201,163,106,.14);color:var(--amber)}

/* ===== the box (v1-faithful) ===== */
.dock{padding:8px 12px calc(10px + env(safe-area-inset-bottom));background:var(--bg)}
.box{background:#141518;border:1px solid var(--border);border-radius:24px;padding:14px;display:flex;flex-direction:column;height:300px}
.seg{display:flex;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.seg button{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:14px 0;font:500 16px system-ui;color:var(--text-2);background:transparent;border:none}
.seg button + button{border-left:1px solid var(--border)}
.seg button.on{color:var(--text);font-weight:600}
.seg button.on .ic{color:var(--mode)}
.seg button.on{background:var(--mode-bg)}
.destrow{display:flex;align-items:center;gap:10px;padding:14px 4px 0;font-size:16px;color:var(--text-2)}
.destrow .ic{color:var(--mode)}
.destrow select{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:16px;flex:1;min-width:0}
.destrow .new{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 16px;font-size:16px;white-space:nowrap}
textarea{flex:1;width:100%;background:none;border:none;outline:none;resize:none;color:var(--text);font:400 22px/1.4 system-ui;padding:16px 6px 0}
textarea::placeholder{color:var(--text-3)}
.foot{display:flex;align-items:center;gap:10px;padding:6px 6px 0;color:var(--text-2);font-size:16px}
.foot .mdot{width:11px;height:11px;border-radius:99px;background:var(--mode);flex:none}
.foot .icons{margin-left:auto;display:flex;gap:22px;align-items:center;color:var(--text-2)}
.foot .icons svg{width:26px;height:26px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:120px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:14px;color:var(--text-2);opacity:0;transition:opacity .15s;z-index:60;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="wordmark">JBrain<i>.</i></div>
    <div class="right">
      <span class="dot"></span>
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
  </div>

  <main id="scroller">
    <div class="sect">Yesterday</div>
    <div class="card" id="stream-yest"></div>
    <div class="sect" style="margin-top:12px">Today</div>
    <div class="card" id="stream-today"></div>
  </main>

  <div class="dock">
    <div class="box" id="box-el">
      <div class="seg" id="seg"></div>
      <div class="destrow" id="destrow" style="display:none">
        <span class="ic" id="dest-ic"></span>
        <span id="dest-path" style="color:var(--text-2)"></span>
        <select id="dest-sel"></select>
        <button class="new">+ New</button>
      </div>
      <textarea id="ta" placeholder="Write an entry…"></textarea>
      <div class="foot">
        <span class="mdot"></span><span id="foot-txt">Saved to your wiki · no AI.</span>
        <div class="icons">
          <span id="tool-ic"></span>
          <svg viewBox="0 0 24 24" onclick="send()"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const IC={
 plus:'<svg width="19" height="19" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',
 search:'<svg width="19" height="19" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>',
 bot:'<svg width="19" height="19" viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4M8 4h8"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/></svg>',
 med:'<svg width="19" height="19" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 9v6M9 12h6"/></svg>',
 fin:'<svg width="19" height="19" viewBox="0 0 24 24"><path d="M3 6h2m3 0h13M3 12h2m3 0h13M3 18h2m3 0h13"/></svg>',
 clip:'<svg width="26" height="26" viewBox="0 0 24 24"><path d="m21.4 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>',
 bolt:'<svg width="26" height="26" viewBox="0 0 24 24"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>'
};
const MODES={
 entry:    {label:"Entry",     ic:IC.plus,  color:"var(--green)",  bg:"rgba(143,188,154,.13)", ph:"Write an entry…",                       foot:"Saved to your wiki · no AI.",          tool:IC.clip, dest:null},
 research: {label:"Research",  ic:IC.search,color:"var(--amber)",  bg:"rgba(201,163,106,.13)", ph:"Ask your brain… (read-only)",            foot:"Read-only — nothing gets written.",    tool:IC.bolt, dest:null},
 fullbrain:{label:"Full Brain",ic:IC.bot,   color:"var(--steel)",  bg:"rgba(127,167,201,.13)", ph:"Talk it out — full tool access…",        foot:"Full tool access.",                    tool:IC.clip, dest:null},
 medical:  {label:"Medical",   ic:IC.med,   color:"var(--rose)",   bg:"rgba(207,138,143,.13)", ph:"Log a lab, note, procedure…",            foot:"Files to notes/medical/ · PDFs staged.",tool:IC.clip, dest:{path:"notes/medical/",opts:["Records","Labs","Medications","Appointments"]}},
 financial:{label:"Financial", ic:IC.fin,   color:"var(--violet)", bg:"rgba(164,147,201,.13)", ph:"Log a statement, receipt, transaction…", foot:"Files to notes/financial/.",           tool:IC.clip, dest:{path:"notes/financial/",opts:["(add a destination)","Receipts","Statements","Accounts"]}}
};
const MAIN=["entry","research","fullbrain"], SUB=["entry","medical","financial"];
let row=MAIN, cur="entry";

function renderSeg(){
  document.getElementById("seg").innerHTML=row.map(m=>{
    const M=MODES[m],on=m===cur;
    return `<button class="${on?"on":""}" style="${on?`--mode:${M.color};--mode-bg:${M.bg}`:""}" onclick="tap('${m}')"><span class="ic">${M.ic}</span>${M.label}</button>`;
  }).join("");
}
function apply(){
  const M=MODES[cur], box=document.getElementById("box-el");
  box.style.setProperty("--mode",M.color);
  document.getElementById("ta").placeholder=M.ph;
  document.getElementById("foot-txt").textContent=M.foot;
  document.getElementById("tool-ic").innerHTML=M.tool;
  const d=document.getElementById("destrow");
  if(M.dest){d.style.display="flex";
    document.getElementById("dest-ic").innerHTML=M.ic;
    document.getElementById("dest-path").textContent=M.dest.path;
    document.getElementById("dest-sel").innerHTML=M.dest.opts.map(o=>`<option>${o}</option>`).join("");
  } else d.style.display="none";
  renderSeg();
}
function tap(m){
  if(m==="entry"&&cur==="entry"){ row=(row===MAIN)?SUB:MAIN; }   // tap-again toggles entry sub-types
  else if(m==="entry"){ cur="entry"; }
  else { cur=m; }
  if(!row.includes(cur)) cur="entry";
  apply();
}
const today=[
 {c:"var(--green)",t:"3h",b:"Groceries: eggs, coffee, olive oil, that bread Mom liked"},
 {c:"var(--rose)",t:"1h · Medical → Labs",b:"Annual physical — BP 118/76. Lab orders attached.",chip:"lab-orders.pdf"},
 {c:"var(--green)",t:"2m · pending",b:"Idea: wiki articles should show freshness based on newest cited note",pend:true}
];
const yest=[
 {c:"var(--violet)",t:"Yesterday · Financial → Receipts",b:"Roof repair quote — $4,200 incl. flashing. Get second opinion?",chip:"roof-quote.jpg"},
 {c:"var(--green)",t:"Yesterday",b:"Dad: grandpa worked at the mill in Ohio before the war — family history follow-up"}
];
function rowHtml(n){return `<div class="note"><div class="head"><span class="ddot" style="background:${n.c}"></span>${n.t}</div><div class="body">${n.b}</div>${n.chip?`<span class="chip">📎 ${n.chip}</span>`:n.pend?`<span class="chip pend">pending sync</span>`:""}</div>`}
function paint(){
  document.getElementById("stream-today").innerHTML=today.map(rowHtml).join("");
  document.getElementById("stream-yest").innerHTML=yest.map(rowHtml).join("");
}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800)}
function send(){
  const ta=document.getElementById("ta"),text=ta.value.trim();if(!text)return;
  const M=MODES[cur];
  if(cur==="research"||cur==="fullbrain"){toast(cur==="research"?"Opens a read-only conversation":"Opens a full-access conversation");ta.value="";return}
  const dest=M.dest?` · ${M.label} → ${document.getElementById("dest-sel").value}`:"";
  today.push({c:M.color,t:"now · pending"+dest,b:text,pend:true});
  ta.value="";paint();
  const sc=document.getElementById("scroller");sc.scrollTop=sc.scrollHeight;
  toast("Saved — queued for sync");
}
apply();paint();
const sc=document.getElementById("scroller");sc.scrollTop=sc.scrollHeight;
</script>
</body>
</html>
