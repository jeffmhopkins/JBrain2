<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Agent picker C — Segmented hero, adaptive body</title>
<style>
  :root {
    --bg:#0E0F11; --surface:#17181B; --surface-2:#1E2024; --border:#26282C;
    --text:#E6E7E9; --text-2:#9A9DA3; --text-3:#5C5F66;
    --steel:#7FA7C9; --green:#8FBC9A; --amber:#C9A36A; --rose:#CF8A8F; --violet:#A493C9;
    --steel-tint:rgba(127,167,201,.13); --amber-tint:rgba(201,163,106,.13); --violet-tint:rgba(164,147,201,.13);
    --accent:var(--steel); --accent-tint:var(--steel-tint);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:#000; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--text); display:flex; gap:28px; flex-wrap:wrap; justify-content:center; padding:28px; }
  .label { text-align:center; color:var(--text-2); font-size:12px; margin:8px 0 0; }
  .phone { width:390px; height:800px; background:var(--bg); border-radius:34px; overflow:hidden;
    border:1px solid #2a2c30; position:relative; display:flex; flex-direction:column; }
  .topbar { padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border); }
  .topbar .t { font-size:18px; font-weight:500; }
  .topbar .x { color:var(--text-3); font-size:22px; }
  .body { padding:16px; overflow-y:auto; flex:1; }

  /* segmented control */
  .seg { display:flex; background:var(--surface-2); border:1px solid var(--border); border-radius:12px;
    padding:4px; gap:4px; }
  .seg button { flex:1; border:none; background:transparent; color:var(--text-2); font-size:13px;
    font-weight:500; padding:9px 6px; border-radius:9px; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:3px; }
  .seg button .ic { font-size:16px; }
  .seg button[data-on="1"] { background:var(--accent-tint); color:var(--text); }

  .hero { margin-top:16px; padding:16px; border:1px solid var(--border); border-radius:16px;
    background:var(--surface); }
  .hero .h-ico { width:40px; height:40px; border-radius:11px; background:var(--accent-tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:20px; }
  .hero .h-t { font-size:18px; font-weight:600; margin-top:10px; }
  .hero .h-d { font-size:13px; color:var(--text-2); line-height:1.45; margin-top:6px; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:11px; }
  .chip { font-size:11px; padding:4px 9px; border-radius:999px; background:var(--surface-2);
    border:1px solid var(--border); color:var(--text-2); }
  .chip.good { color:var(--accent); border-color:color-mix(in srgb, var(--accent) 45%, var(--border)); }

  .eyebrow { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3);
    margin:18px 2px 8px; }
  .presets { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
  .presets::-webkit-scrollbar { display:none; }
  .preset { flex:none; font-size:13px; padding:9px 15px; border-radius:999px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text-2); cursor:pointer; white-space:nowrap; }
  .preset[data-on="1"] { border-color:var(--accent); color:var(--text); background:var(--accent-tint); }
  .reads { font-size:13px; color:var(--text-2); margin:10px 2px 0; } .reads b { color:var(--text); }

  .title-in { width:100%; margin-top:16px; padding:13px; border-radius:12px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--text); font-size:15px; }
  .title-in::placeholder { color:var(--text-3); }

  .footer { padding:12px 16px 16px; border-top:1px solid var(--border); background:var(--bg); }
  .start { width:100%; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:600;
    background:var(--accent); color:#10141a; cursor:pointer; display:flex; flex-direction:column;
    align-items:center; gap:3px; }
  .start .hint { font-weight:400; font-size:12px; opacity:.85; }
</style>
</head>
<body>
<div>
  <div class="phone">
    <div class="topbar"><div class="t">New chat</div><div class="x">&times;</div></div>
    <div class="body">
      <div class="seg" id="seg">
        <button data-agent="curator" data-on="1" onclick="pick('curator')"><span class="ic">🧠</span>Curator</button>
        <button data-agent="teacher" onclick="pick('teacher')"><span class="ic">🎓</span>Teacher</button>
        <button data-agent="jerv" onclick="pick('jerv')"><span class="ic">🌐</span>Jerv</button>
      </div>

      <div class="hero">
        <div class="h-ico" id="h-ico">🧠</div>
        <div class="h-t" id="h-t">Curator</div>
        <div class="h-d" id="h-d">Your Full Brain. Searches and connects your own notes, facts, lists and appointments — and only ever stages changes for your approval.</div>
        <div class="chips" id="chips"></div>
      </div>

      <div id="scope-section">
        <div class="eyebrow">Reads</div>
        <div class="presets" id="presets">
          <button class="preset" data-scope="everything" data-on="1" onclick="pickScope('everything')">Everything</button>
          <button class="preset" data-scope="general" onclick="pickScope('general')">General</button>
          <button class="preset" data-scope="medical" onclick="pickScope('medical')">Medical</button>
          <button class="preset" data-scope="financial" onclick="pickScope('financial')">Financial</button>
          <button class="preset" data-scope="custom" onclick="pickScope('custom')">Custom…</button>
        </div>
        <p class="reads" id="reads">Reads <b>everything</b> — all your notes.</p>
      </div>

      <input class="title-in" placeholder="Title (optional — auto-titled later)" />
    </div>
    <div class="footer">
      <button class="start" onclick="go()">
        <span id="start-main">Start with Curator</span>
        <span class="hint" id="start-hint">reads everything</span>
      </button>
    </div>
  </div>
  <p class="label">C · Segmented hero — the whole sheet re-themes & adapts per agent</p>
</div>

<script>
  const A = {
    curator:{ accent:'--steel', tint:'--steel-tint', ico:'🧠', t:'Curator',
      d:'Your Full Brain. Searches and connects your own notes, facts, lists and appointments — and only ever stages changes for your approval.',
      chips:[['Your notes','good'],['Lists & calendar','good'],['Writes staged','']], kb:true },
    teacher:{ accent:'--amber', tint:'--amber-tint', ico:'🎓', t:'Teacher',
      d:'A Socratic homework tutor. It guides you to the answer with questions instead of handing it over — and won’t do graded work for you.',
      chips:[['No tools',''],['Reads no data','good'],['Just this chat','']], kb:false },
    jerv:{ accent:'--violet', tint:'--violet-tint', ico:'🌐', t:'Jerv',
      d:'An open web chatbot. It can search the internet and read pages to answer you — but has no access to your notes or any of your data.',
      chips:[['Web search','good'],['Reads pages','good'],['No access to your data','']], kb:false }
  };
  let agent='curator', scope='everything';
  function pick(a){
    agent=a; const o=A[a];
    document.documentElement.style.setProperty('--accent','var('+o.accent+')');
    document.documentElement.style.setProperty('--accent-tint','var('+o.tint+')');
    document.querySelectorAll('#seg button').forEach(b=>b.dataset.on=b.dataset.agent===a?'1':'0');
    document.getElementById('h-ico').textContent=o.ico;
    document.getElementById('h-t').textContent=o.t;
    document.getElementById('h-d').textContent=o.d;
    document.getElementById('chips').innerHTML=o.chips.map(c=>'<span class="chip '+c[1]+'">'+c[0]+'</span>').join('');
    document.getElementById('start-main').textContent='Start with '+o.t;
    document.getElementById('scope-section').style.display=o.kb?'block':'none';
    document.getElementById('start-hint').textContent=o.kb?('reads '+scopeLabel()):(a==='teacher'?'no data — a study tutor':'reads the web, not your notes');
  }
  function scopeLabel(){ return ({everything:'everything',general:'general notes',medical:'general + medical',financial:'general + financial',custom:'a custom set'})[scope]; }
  function pickScope(s){
    scope=s;
    document.querySelectorAll('#presets .preset').forEach(b=>b.dataset.on=b.dataset.scope===s?'1':'0');
    document.getElementById('reads').innerHTML='Reads <b>'+scopeLabel()+(s==='everything'?' — all your notes':'')+'</b>.';
    document.getElementById('start-hint').textContent='reads '+scopeLabel();
  }
  pick('curator');
  function go(){ alert('POST /api/sessions\n{ agent: "'+agent+'", domain_scopes: '+(A[agent].kb?'[…]':'[]')+' }'); }
</script>
</body>
</html>
