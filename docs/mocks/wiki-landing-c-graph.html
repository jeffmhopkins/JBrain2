<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wiki landing — C — graph / map</title>
<style>
  :root{
    --bg:#0E0F11;--surface:#17181B;--surface-2:#1E2024;--border:#26282C;
    --text:#E6E7E9;--text-2:#9A9DA3;--text-3:#5C5F66;
    --steel:#7FA7C9;--green:#8FBC9A;--amber:#C9A36A;--rose:#CF8A8F;--violet:#A493C9;--shadow:rgba(0,0,0,.45);
  }
  [data-theme="light"]{
    --bg:#F7F7F5;--surface:#FFFFFF;--surface-2:#F0F0EE;--border:#E2E2DF;
    --text:#1A1B1E;--text-2:#5C5F66;--text-3:#9A9DA3;
    --steel:#7FA7C9;--green:#8FBC9A;--amber:#C9A36A;--rose:#CF8A8F;--violet:#A493C9;--shadow:rgba(20,30,50,.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#05070a;font:15px/1.5 -apple-system,system-ui,sans-serif;display:grid;place-items:center;min-height:100vh;color:var(--text)}
  .phone{width:390px;height:800px;background:var(--bg);border-radius:30px;overflow:hidden;position:relative;box-shadow:0 20px 60px var(--shadow);display:flex;flex-direction:column}
  .topbar{height:56px;flex:0 0 56px;display:flex;align-items:center;gap:9px;padding:0 14px;border-bottom:1px solid var(--border);background:var(--surface)}
  .brand{display:flex;align-items:center;gap:7px;flex:1;font-weight:700;font-size:16px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--steel)}
  .icon-btn{width:36px;height:36px;display:grid;place-items:center;border-radius:9px;color:var(--text-2);background:transparent;border:0;cursor:pointer}
  .icon-btn:hover{background:var(--surface-2);color:var(--text)}
  svg.i{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .scroll{overflow-y:auto;flex:1;padding:12px 16px 30px}
  .search{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 13px;color:var(--text-3);font-size:14px}
  .search svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
  .cap{font-size:11px;color:var(--text-3);margin:11px 2px 4px;display:flex;align-items:center;gap:6px}
  .cap svg{width:13px;height:13px;stroke:var(--amber);fill:none;stroke-width:1.8}
  .graph{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:4px}
  .graph svg{width:100%;display:block}
  .edge{stroke:var(--border);stroke-width:1.5}
  .node circle{stroke:var(--bg);stroke-width:2;cursor:pointer}
  .node text{font-size:9px;fill:var(--text-2);text-anchor:middle;font-family:system-ui}
  .node.sel circle{stroke:var(--text);stroke-width:2.5}
  .feedhead{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-2);margin:18px 0 8px;display:flex;align-items:center;gap:7px}
  .feedhead svg{width:14px;height:14px;stroke:var(--text-3);fill:none;stroke-width:1.8}
  .frow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .frow:last-child{border-bottom:0}
  .fdot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
  .frow .t{flex:1;font-size:13.5px}
  .frow .t b{font-weight:600}
  .frow .when{font-size:10.5px;color:var(--text-3)}
  /* node card */
  .card{position:absolute;left:14px;right:14px;bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px;box-shadow:0 -8px 30px var(--shadow);transform:translateY(140%);transition:transform .2s cubic-bezier(.2,.8,.2,1)}
  .card.on{transform:translateY(0)}
  .card .ch{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .card .cd{width:30px;height:30px;border-radius:50%;display:grid;place-items:center}
  .card .cd svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
  .card .t{font-weight:700;font-size:15px;flex:1}
  .card .links{font-size:11px;color:var(--text-3)}
  .card .blurb{font-size:13px;color:var(--text-2);line-height:1.4}
  .card .open{margin-top:11px;width:100%;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-weight:600;font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>Wiki</div>
    <button class="icon-btn" title="List view"><svg class="i" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <button class="icon-btn" id="theme"><svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg></button>
  </div>

  <div class="scroll">
    <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search the wiki…</div>
    <div class="cap"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>Your knowledge graph — tap a node to open its article</div>

    <div class="graph">
      <svg viewBox="0 0 358 280">
        <g stroke-linecap="round">
          <line class="edge" x1="179" y1="140" x2="95" y2="80"/>
          <line class="edge" x1="179" y1="140" x2="95" y2="205"/>
          <line class="edge" x1="95" y1="80" x2="270" y2="70"/>
          <line class="edge" x1="95" y1="80" x2="300" y2="150"/>
          <line class="edge" x1="95" y1="205" x2="215" y2="225"/>
          <line class="edge" x1="95" y1="205" x2="245" y2="195"/>
          <line class="edge" x1="245" y1="195" x2="215" y2="225"/>
        </g>
        <g class="node" onclick="pick(this,'me')"><circle cx="179" cy="140" r="22" fill="color-mix(in srgb,var(--steel) 30%,var(--surface))"/><text x="179" y="173">You</text></g>
        <g class="node" onclick="pick(this,'celine')"><circle cx="95" cy="80" r="19" fill="color-mix(in srgb,var(--steel) 22%,var(--surface))"/><text x="95" y="109">Celine</text></g>
        <g class="node" onclick="pick(this,'priya')"><circle cx="95" cy="205" r="19" fill="color-mix(in srgb,var(--steel) 22%,var(--surface))"/><text x="95" y="234">Priya</text></g>
        <g class="node" onclick="pick(this,'globex')"><circle cx="270" cy="70" r="16" fill="color-mix(in srgb,var(--violet) 24%,var(--surface))"/><text x="270" y="96">Globex</text></g>
        <g class="node" onclick="pick(this,'denver')"><circle cx="300" cy="150" r="14" fill="color-mix(in srgb,var(--green) 24%,var(--surface))"/><text x="300" y="174">Denver</text></g>
        <g class="node" onclick="pick(this,'nair')"><circle cx="245" cy="195" r="16" fill="color-mix(in srgb,var(--violet) 24%,var(--surface))"/><text x="245" y="221">Nair Peds</text></g>
        <g class="node" onclick="pick(this,'brookline')"><circle cx="215" cy="225" r="15" fill="color-mix(in srgb,var(--green) 24%,var(--surface))"/><text x="215" y="251">Brookline</text></g>
      </svg>
    </div>

    <div class="feedhead"><svg viewBox="0 0 24 24"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>Recently updated</div>
    <div class="frow"><span class="fdot" style="background:var(--steel)"></span><span class="t"><b>Priya Nair</b> — split off Finances</span><span class="when">2h</span></div>
    <div class="frow"><span class="fdot" style="background:var(--violet)"></span><span class="t"><b>Globex Corporation</b> — +1 reference</span><span class="when">1d</span></div>
    <div class="frow"><span class="fdot" style="background:var(--green)"></span><span class="t"><b>Brookline</b> — created</span><span class="when">3d</span></div>
  </div>

  <div class="card" id="card">
    <div class="ch"><div class="cd" id="cd"></div><div class="t" id="ct"></div><div class="links" id="cl"></div></div>
    <div class="blurb" id="cb"></div>
    <button class="open">Open article</button>
  </div>
</div>
<script>
  document.getElementById('theme').onclick=()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark'};
  const D={
    me:{t:'You (owner)',c:'var(--steel)',l:'15 links',b:'Your own article — the hub everything connects through.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--steel)"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>'},
    celine:{t:'Celine Hopkins',c:'var(--steel)',l:'12 links',b:'Software engineer at Globex; the owner’s spouse, based in Denver.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--steel)"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>'},
    priya:{t:'Priya Nair',c:'var(--steel)',l:'10 links',b:'Pediatrician; the owner’s younger sister; founder of Nair Pediatrics.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--steel)"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>'},
    globex:{t:'Globex Corporation',c:'var(--violet)',l:'9 links',b:'Tech company; Celine’s employer since 2019.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--violet)"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-5h6v5"/></svg>'},
    denver:{t:'Denver',c:'var(--green)',l:'4 links',b:'Colorado city; Celine’s home.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--green)"><path d="M12 21s-7-5.5-7-11a7 7 0 0114 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>'},
    nair:{t:'Nair Pediatrics',c:'var(--violet)',l:'6 links',b:'Priya’s pediatric practice in Brookline, opened 2024.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--violet)"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-5h6v5"/></svg>'},
    brookline:{t:'Brookline',c:'var(--green)',l:'7 links',b:'Massachusetts town; where Priya lives and practices.',
        ic:'<svg viewBox="0 0 24 24" stroke="var(--green)"><path d="M12 21s-7-5.5-7-11a7 7 0 0114 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>'}
  };
  function pick(el,k){
    document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));el.classList.add('sel');
    const d=D[k];document.getElementById('ct').textContent=d.t;document.getElementById('cl').textContent=d.l;
    document.getElementById('cb').textContent=d.b;
    const cd=document.getElementById('cd');cd.style.background='color-mix(in srgb,'+d.c+' 16%,transparent)';cd.innerHTML=d.ic;
    document.getElementById('card').classList.add('on');
  }
</script>
</body>
</html>
