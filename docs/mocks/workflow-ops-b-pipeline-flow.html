<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Workflow · Ops — pipeline / dataflow flows</title>
<style>
  :root{
    --bg:#0E0F11; --surface:#17181B; --surface-2:#1E2024; --border:#26282C;
    --text:#E6E7E9; --text-2:#9A9DA3; --text-3:#5C5F66;
    --steel:#7FA7C9; --green:#8FBC9A; --amber:#C9A36A; --rose:#CF8A8F; --violet:#A493C9;
    --steel-tint:rgba(127,167,201,.13); --green-tint:rgba(143,188,154,.13);
    --amber-tint:rgba(201,163,106,.13); --rose-tint:rgba(207,138,143,.13); --violet-tint:rgba(164,147,201,.13);
    --ok:var(--green); --warn:var(--amber); --danger:var(--rose); --info:var(--steel);
    --font-mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  [data-theme="light"]{
    color-scheme:light;
    --bg:#F7F7F5; --surface:#FFFFFF; --surface-2:#F0F0EE; --border:#E2E2DF;
    --text:#1A1B1E; --text-2:#5C5F66; --text-3:#9A9DA3;
  }
  [data-theme="dark"]{ color-scheme:dark; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#000;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 0 40px;min-height:100vh;}
  svg{fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

  .caption{max-width:392px;padding:0 18px;color:var(--text-2);font-size:13px;line-height:1.55;}
  .caption b{color:var(--text);font-weight:500;}
  .caption .tag{display:inline-block;background:var(--steel-tint);color:var(--steel);font-size:11px;padding:2px 8px;border-radius:999px;margin-bottom:6px;}
  .toggle{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px;margin-left:8px;}
  .toggle button{appearance:none;border:none;background:none;color:var(--text-2);font:inherit;font-size:11px;padding:4px 11px;border-radius:999px;cursor:pointer;}
  .toggle button[aria-pressed="true"]{background:var(--steel-tint);color:var(--steel);font-weight:600;}

  .phone{width:390px;height:800px;background:var(--bg);border:1px solid #2a2c30;border-radius:34px;overflow:hidden;position:relative;display:flex;flex-direction:column;}

  .bar{height:56px;display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid var(--border);flex:none;}
  .bar .back{color:var(--text-2);background:none;border:none;padding:4px;}
  .bar .ttl{font-size:18px;font-weight:600;}
  .bar .dot{margin-left:auto;width:8px;height:8px;border-radius:999px;background:var(--green);}
  .bar .health{font-size:12px;color:var(--text-2);}

  .filters{display:flex;gap:7px;padding:11px 14px 9px;flex:none;overflow-x:auto;}
  .chip{appearance:none;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font:inherit;font-size:12.5px;padding:6px 12px;border-radius:999px;white-space:nowrap;flex:none;}
  .chip.on{background:var(--steel-tint);color:var(--steel);border-color:transparent;font-weight:500;}

  .body{flex:1;overflow-y:auto;padding:4px 14px 16px;}
  .sect{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin:14px 2px 9px;}
  .sect:first-child{margin-top:6px;}

  /* flow card: trigger ▸ action ▸ action ▸ run */
  .flow{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px;margin-bottom:11px;}
  .flow.off{opacity:.6;}
  .flow-top{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
  .pl{font-size:13.5px;font-family:var(--font-mono);font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sw{flex:none;margin-left:auto;width:42px;height:25px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);position:relative;cursor:pointer;transition:.16s;padding:0;}
  .sw[aria-checked="true"]{background:var(--green-tint);border-color:rgba(143,188,154,.45);}
  .sw .knob{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:999px;background:var(--text-3);transition:.16s;}
  .sw[aria-checked="true"] .knob{left:19px;background:var(--green);}

  /* the chain */
  .chain{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:3px;}
  .node{flex:none;border:1px solid var(--border);background:var(--surface-2);border-radius:11px;padding:8px 10px;min-width:0;display:flex;flex-direction:column;gap:4px;cursor:pointer;position:relative;transition:.14s;}
  .node:active{transform:scale(.97);}
  .node .ndot{width:8px;height:8px;border-radius:999px;background:var(--text-3);position:absolute;top:8px;right:8px;}
  .node .ndot.ok{background:var(--green);}
  .node .ndot.run{background:var(--green);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .node .ndot.failed{background:var(--rose);}
  .nkind{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);padding-right:12px;}
  .nname{font-size:12.5px;font-family:var(--font-mono);white-space:nowrap;}
  /* trigger node tints by type */
  .node.trig-event{border-color:rgba(127,167,201,.4);}.node.trig-event .nkind{color:var(--steel);}
  .node.trig-schedule{border-color:rgba(201,163,106,.4);}.node.trig-schedule .nkind{color:var(--amber);}
  .node.trig-manual{border-color:rgba(164,147,201,.4);}.node.trig-manual .nkind{color:var(--violet);}
  .node.act .nname{color:var(--text);}
  .node.terminal{background:none;border-style:dashed;}
  .node.terminal .nname{color:var(--text-3);}
  .arrow{flex:none;align-self:center;color:var(--text-3);padding:0 6px;}

  .flow-foot{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:11.5px;color:var(--text-3);font-variant-numeric:tabular-nums;}
  .flow-foot .when{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fire{flex:none;display:flex;align-items:center;gap:6px;background:var(--amber-tint);color:var(--amber);border:none;border-radius:9px;padding:7px 11px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;}
  .fire.running{background:var(--green-tint);color:var(--green);pointer-events:none;}
  .fire:disabled{background:var(--surface-2);color:var(--text-3);cursor:default;}
  .fire svg.spin{animation:spin 1.1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* detail sheet for a tapped node */
  .scrim{position:absolute;inset:0;background:rgba(14,15,17,.6);opacity:0;pointer-events:none;transition:.2s;z-index:30;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%);transition:transform .24s cubic-bezier(.2,.7,.3,1);z-index:31;padding:8px 16px calc(18px + env(safe-area-inset-bottom));max-height:78%;overflow-y:auto;}
  .sheet.show{transform:translateY(0);}
  .grip{width:40px;height:4px;border-radius:999px;background:var(--border);margin:2px auto 12px;}
  .sh-kind{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);}
  .sh-name{font-size:18px;font-weight:600;font-family:var(--font-mono);margin:3px 0 4px;}
  .sh-desc{font-size:13.5px;color:var(--text-2);line-height:1.5;}
  .sh-meta{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0 4px;}
  .pill{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;}
  .pill.cheap{background:var(--green-tint);color:var(--green);}
  .pill.standard{background:var(--steel-tint);color:var(--steel);}
  .pill.expensive{background:var(--amber-tint);color:var(--amber);}
  .pill.dom{background:var(--surface-2);color:var(--text-2);}
  .sh-lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin:16px 0 8px;}
  .runrow{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--border);font-variant-numeric:tabular-nums;}
  .runrow:first-of-type{border-top:none;}
  .rd{width:7px;height:7px;border-radius:999px;flex:none;}
  .rd.ok{background:var(--green);}.rd.failed{background:var(--rose);}.rd.run{background:var(--green);animation:pulse 1.4s ease-in-out infinite;}
  .rt{font-size:13px;}.rm{margin-left:auto;font-size:11.5px;color:var(--text-3);}
  .rerr{font-size:12px;color:var(--rose);font-family:var(--font-mono);background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 9px;margin:2px 0 8px;line-height:1.5;}
  .sh-foot{display:flex;gap:9px;margin-top:16px;}
  .sh-foot button{flex:1;border:1px solid var(--border);background:var(--surface-2);color:var(--text-2);font:inherit;font-size:13.5px;font-weight:500;border-radius:11px;padding:11px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;}
  .sh-foot button.fire2{background:var(--amber-tint);color:var(--amber);border-color:transparent;}
  .sh-foot button:disabled{opacity:.45;}

  .toast{position:absolute;left:16px;right:16px;bottom:24px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--text-2);transform:translateY(160%);opacity:0;transition:.2s;z-index:40;display:flex;gap:9px;align-items:center;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast .ti{color:var(--steel);flex:none;}
</style>
</head>
<body>
  <div class="caption">
    <span class="tag">Workflow · B — pipeline / dataflow</span>
    <span class="toggle" role="group" aria-label="theme">
      <button id="t-dark" aria-pressed="true" onclick="setTheme('dark')">dark</button>
      <button id="t-light" aria-pressed="false" onclick="setTheme('light')">light</button>
    </span><br/>
    <b>Pipeline-centric</b>: each pipeline is a compact flow —
    <span style="font-family:var(--font-mono);font-size:12px">trigger ▸ action ▸ action ▸ run</span> —
    with status dots on the chain and a <b>fire</b> control on its trigger. A visual map of
    what's wired to what. Tap any node for its detail + recent runs.
  </div>

  <div class="phone">
    <div class="bar">
      <button class="back"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
      <span class="ttl">Workflow</span>
      <span class="dot"></span><span class="health">worker live · 1 worker</span>
    </div>

    <div class="filters" id="filters">
      <button class="chip on" onclick="setFilter('all',this)">all</button>
      <button class="chip" onclick="setFilter('event',this)">event</button>
      <button class="chip" onclick="setFilter('schedule',this)">schedule</button>
      <button class="chip" onclick="setFilter('manual',this)">manual</button>
    </div>

    <div class="body" id="body"></div>

    <div class="scrim" id="scrim" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
      <div class="grip"></div>
      <div id="sh-content"></div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
function setTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById('t-dark').setAttribute('aria-pressed',String(t==='dark'));
  document.getElementById('t-light').setAttribute('aria-pressed',String(t==='light'));
}

const ACTIONS={
  ingest_note:{cost:'standard',desc:'Index a note: chunk + stage embeddings for retrieval.'},
  embed_note:{cost:'standard',desc:'Embed a note’s chunks into the vector index.'},
  integrate_note:{cost:'expensive',desc:'Extract facts, resolve entities, write the graph.'},
  ocr_attachment:{cost:'expensive',desc:'Vision OCR + salient description for an image/PDF.'},
  consolidate_predicates:{cost:'standard',desc:'Merge near-duplicate predicates left by older prompts.'},
  sync_predicates:{cost:'standard',desc:'Re-embed the canonical_predicates index to match the schema registry.'},
  purge_deleted_artifacts:{cost:'cheap',desc:'Reap orphaned chunks + blobs of deleted notes.'},
  reconcile_pending_notes:{cost:'cheap',desc:'Re-enqueue ingest for any note still ingest_state=pending — dropped-event safety net.'},
  reconcile_pending_integration:{cost:'cheap',desc:'Re-enqueue integration for indexed-but-unintegrated notes (bounded).'},
  reconcile_unembedded_notes:{cost:'cheap',desc:'Embed notes whose chunks slipped through (NULL embedding).'},
};

// pipeline flows from the engine seeds
const FLOWS=[
  {pipeline:'event_ingest_note',group:'event',enabled:true,
   trig:{kind:'on note.created',type:'event',name:'note.created',id:'00000000-0000-0000-0000-0000000e0001',manual:false,
         desc:'Fires when a freshly created note is saved. Cross-domain — accepts any note domain.'},
   steps:['ingest_note'],
   runs:[{s:'run',t:'roof-quote note',m:'now'},{s:'ok',t:'grocery note',m:'2h ago · 9s'}]},
  {pipeline:'event_integrate_note',group:'event',enabled:true,
   trig:{kind:'on note.ingested',type:'event',name:'note.ingested',id:'00000000-0000-0000-0000-0000000e0002',manual:false,
         desc:'Fires when a note finishes indexing. Hands the indexed note to the fact pipeline.'},
   steps:['integrate_note'],
   runs:[{s:'failed',t:'labs PDF note',m:'18m ago · 31s',err:'integrate_note: upstream ocr_attachment failed — fact extract skipped, retried.'},{s:'ok',t:'roof-quote note',m:'1h ago · 22s'}]},
  {pipeline:'event_consolidate_predicates',group:'event',enabled:true,
   trig:{kind:'on resolution.changed',type:'event',name:'resolution.changed',id:'00000000-0000-0000-0000-0000000e0003',manual:false,
         desc:'Fires after a review resolution changes the graph — normalizes predicate drift.'},
   steps:['consolidate_predicates'],
   runs:[{s:'ok',t:'after merge review',m:'40m ago · 3s'}]},

  {pipeline:'reconcile_pending_notes',group:'schedule',enabled:true,
   trig:{kind:'every 5 min · manual',type:'schedule',name:'schedule · 300s',id:'00000000-0000-0000-0000-0000000c0012',manual:true,
         interval:'every 5m',next:'in 2m',last:'3m ago',
         desc:'Dropped-event safety net: re-enqueues ingest for any note still pending. Idempotent.'},
   steps:['reconcile_pending_notes'],
   runs:[{s:'ok',t:'swept 0 pending',m:'3m ago · 0.2s'},{s:'ok',t:'swept 1 pending',m:'8m ago · 0.4s'}]},
  {pipeline:'reconcile_pending_integration',group:'schedule',enabled:true,
   trig:{kind:'every 5 min · manual',type:'schedule',name:'schedule · 300s',id:'00000000-0000-0000-0000-0000000c0014',manual:true,
         interval:'every 5m',next:'in 2m',last:'3m ago',
         desc:'Re-enqueues integration for indexed-but-unintegrated notes (bounded, oldest-first).'},
   steps:['reconcile_pending_integration'],
   runs:[{s:'ok',t:'swept 0 pending',m:'3m ago · 0.2s'}]},
  {pipeline:'reconcile_unembedded_notes',group:'schedule',enabled:false,
   trig:{kind:'every 5 min · manual',type:'schedule',name:'schedule · 300s',id:'00000000-0000-0000-0000-0000000c0011x',manual:true,
         interval:'every 5m',next:'paused',last:'1h ago',
         desc:'Embeds notes whose chunks slipped through. Currently disabled.'},
   steps:['reconcile_unembedded_notes'],
   runs:[{s:'ok',t:'swept 0 unembedded',m:'1h ago · 0.3s'}]},

  {pipeline:'nightly_consolidate_predicates',group:'schedule',enabled:true,
   trig:{kind:'nightly 02:00 · manual',type:'schedule',name:'schedule · 86400s',id:'00000000-0000-0000-0000-0000000c0002',manual:true,
         interval:'nightly',next:'02:00 UTC · in 7h',last:'02:00 today',
         desc:'Nightly normalization of predicate drift. Manual-fireable from Ops without a restart.'},
   steps:['consolidate_predicates'],
   runs:[{s:'ok',t:'merged 4 predicates',m:'02:00 · 6s'}]},
  {pipeline:'nightly_sync_predicates',group:'schedule',enabled:true,
   trig:{kind:'nightly 02:00 · manual',type:'schedule',name:'schedule · 86400s',id:'00000000-0000-0000-0000-0000000c0004',manual:true,
         interval:'nightly',next:'02:00 UTC · in 7h',last:'02:00 today',
         desc:'Keeps the canonical_predicates index in step with the schema registry.'},
   steps:['sync_predicates'],
   runs:[{s:'ok',t:'index in step',m:'02:00 · 2s'}]},
  {pipeline:'nightly_purge_deleted_artifacts',group:'schedule',enabled:true,
   trig:{kind:'nightly 02:00 · manual',type:'schedule',name:'schedule · 86400s',id:'00000000-0000-0000-0000-0000000c0006',manual:true,
         interval:'nightly',next:'02:00 UTC · in 7h',last:'02:00 today',
         desc:'Purges artifacts of notes deleted before the cascade existed.'},
   steps:['purge_deleted_artifacts'],
   runs:[{s:'ok',t:'purged 12 orphans',m:'02:00 · 1s'}]},
];

let FILTER='all';
function matches(f){
  if(FILTER==='all')return true;
  if(FILTER==='manual')return f.trig.manual;
  return f.trig.type===FILTER;
}

function lastDot(f){
  const r=f.runs[0]; return r? r.s : 'ok';
}
function trigType(f){ return f.trig.manual? 'trig-manual' : ('trig-'+f.trig.type); }

function chainHtml(f){
  const tdot=lastDot(f);
  let html=`<div class="node ${trigType(f)}" onclick="openTrig('${f.pipeline}')">
    <span class="ndot ${f.enabled?tdot:''}"></span>
    <span class="nkind">trigger</span><span class="nname">${f.trig.name}</span></div>`;
  for(const s of f.steps){
    html+=`<span class="arrow"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>`;
    html+=`<div class="node act" onclick="openAction('${s}')">
      <span class="ndot ${f.enabled?tdot:''}"></span>
      <span class="nkind">action · ${ACTIONS[s].cost}</span><span class="nname">${s}</span></div>`;
  }
  html+=`<span class="arrow"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>`;
  html+=`<div class="node terminal"><span class="nkind">enqueues</span><span class="nname">run</span></div>`;
  return html;
}

function whenText(f){
  if(f.trig.type==='event') return `fires on ${f.trig.name}`;
  if(!f.enabled) return 'paused';
  return `next ${f.trig.next} · last ${f.trig.last}`;
}

function flowCard(f){
  const disabled = !f.trig.manual;
  return `<div class="flow ${f.enabled?'':'off'}" id="flow-${f.pipeline}">
    <div class="flow-top">
      <span class="pl">${f.pipeline}</span>
      <span class="sw" role="switch" aria-checked="${f.enabled}" onclick="flip('${f.pipeline}',event)"><span class="knob"></span></span>
    </div>
    <div class="chain">${chainHtml(f)}</div>
    <div class="flow-foot">
      <span class="when">${whenText(f)}</span>
      <button class="fire" id="fire-${f.pipeline}" ${disabled?'disabled title="event-driven — fires automatically"':''} onclick="fire('${f.pipeline}',event)">
        ${disabled?'<svg width="13" height="13" viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>auto'
                 :'<svg width="13" height="13" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>Fire now'}
      </button>
    </div>
  </div>`;
}

const GROUPS=[['event','Event-driven flows'],['schedule','Scheduled & manual sweeps']];
function render(){
  let html='';
  for(const [g,label] of GROUPS){
    const items=FLOWS.filter(f=>f.group===g&&matches(f));
    if(!items.length)continue;
    html+=`<div class="sect">${label}</div>`+items.map(flowCard).join('');
  }
  if(!html) html=`<div style="color:var(--text-2);font-size:13px;padding:20px 4px;">No flows match this filter.</div>`;
  document.getElementById('body').innerHTML=html;
}

function setFilter(f,el){
  FILTER=f;
  document.querySelectorAll('#filters .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');render();
}

function flip(pl,e){
  e.stopPropagation();
  const f=FLOWS.find(x=>x.pipeline===pl);f.enabled=!f.enabled;
  render();
  toast(`${pl} ${f.enabled?'enabled':'disabled'}.`);
}

function fire(pl,e){
  e.stopPropagation();
  const f=FLOWS.find(x=>x.pipeline===pl);if(!f.enabled||!f.trig.manual)return;
  const btn=document.getElementById('fire-'+pl);
  btn.classList.add('running');
  btn.innerHTML='<svg class="spin" width="13" height="13" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4"/></svg>firing…';
  // light the chain dots as running
  const dots=document.querySelectorAll('#flow-'+pl+' .ndot');
  dots.forEach(d=>{d.className='ndot run';});
  setTimeout(()=>{
    btn.classList.remove('running');
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24"><path d="M5 12l4 4L19 7"/></svg>queued';
    dots.forEach(d=>{d.className='ndot ok';});
    f.runs.unshift({s:'ok',t:'fired from Ops',m:'now · queued'});
    toast(`Fired ${pl} now — run queued.`);
    setTimeout(()=>{btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>Fire now';},2000);
  },1600);
}

function runHtml(runs){
  return runs.map(r=>{
    const main=`<div class="runrow"><span class="rd ${r.s}"></span><span class="rt">${r.t}</span><span class="rm">${r.m}</span></div>`;
    return main+(r.err?`<div class="rerr">${r.err}</div>`:'');
  }).join('');
}

function openTrig(pl){
  const f=FLOWS.find(x=>x.pipeline===pl);const t=f.trig;
  const fireDisabled=!t.manual||!f.enabled;
  document.getElementById('sh-content').innerHTML=`
    <div class="sh-kind">trigger · ${t.type}${t.manual?' · manual':''}</div>
    <div class="sh-name">${t.name}</div>
    <div class="sh-desc">${t.desc}</div>
    <div class="sh-meta">
      <span class="pill dom">→ ${pl}</span>
      ${t.type==='schedule'?`<span class="pill standard">${t.interval}</span>`:''}
      ${t.type==='schedule'&&f.enabled?`<span class="pill dom">next ${t.next}</span>`:''}
      ${t.manual?'<span class="pill standard">manual-fireable</span>':'<span class="pill dom">event-only</span>'}
    </div>
    <div class="sh-lab">Recent runs of this pipeline</div>
    ${runHtml(f.runs)}
    <div class="sh-foot">
      <button onclick="toast('Opened ${pl} runs in the Runs log.')"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>All runs</button>
      <button class="fire2" ${fireDisabled?'disabled':''} onclick="closeSheet();fire('${pl}',{stopPropagation:()=>{}})">
        <svg width="15" height="15" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>Fire now</button>
    </div>`;
  showSheet();
}
function openAction(name){
  const a=ACTIONS[name];
  document.getElementById('sh-content').innerHTML=`
    <div class="sh-kind">action · registered handler</div>
    <div class="sh-name">${name}</div>
    <div class="sh-desc">${a.desc}</div>
    <div class="sh-meta">
      <span class="pill ${a.cost}">${a.cost}</span>
      <span class="pill dom">cross-domain</span>
      <span class="pill dom">mutating</span>
    </div>
    <div class="sh-lab">Where it's wired</div>
    <div style="font-size:13px;color:var(--text-2);line-height:1.5;">
      Used by <b style="color:var(--text)">${FLOWS.filter(f=>f.steps.includes(name)).map(f=>f.pipeline).join(', ')}</b>.
      Actions name a registered handler — the engine can't invent one.</div>
    <div class="sh-foot">
      <button onclick="closeSheet()"><svg width="15" height="15" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>Close</button>
    </div>`;
  showSheet();
}
function showSheet(){document.getElementById('scrim').classList.add('show');document.getElementById('sheet').classList.add('show');}
function closeSheet(){document.getElementById('scrim').classList.remove('show');document.getElementById('sheet').classList.remove('show');}

function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=`<svg class="ti" width="16" height="16" viewBox="0 0 24 24"><path d="M5 12l4 4L19 7"/></svg>${msg}`;
  t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),3200);
}

render();
</script>
</body>
</html>
