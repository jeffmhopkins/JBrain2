<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#021016">
<title>JBrain — Wireframe Genesis</title>
<style>
  html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#021016; }
  #c { display:block; width:100vw; height:100vh; }
  #net { position:fixed; right:0; bottom:0; pointer-events:none; mix-blend-mode:screen; opacity:.60; }
  #panel {
    position:fixed; left:16px; top:16px; z-index:10;
    font:11px/1.5 'Courier New', ui-monospace, monospace;
    color:#2fffe0; letter-spacing:.6px;
    background:rgba(2,16,22,.82); border:1px solid rgba(47,255,224,.28);
    border-radius:4px; padding:12px 14px 10px;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    transition:opacity .6s; user-select:none; max-width:240px;
    text-shadow: 0 0 6px rgba(47,255,224,.4);
  }
  body.idle #panel { opacity:0; pointer-events:none; }
  #panel .ttl { color:#2fffe0; font-weight:bold; margin-bottom:6px; font-size:13px; text-shadow:0 0 10px rgba(47,255,224,.8); letter-spacing:2px; }
  #panel .ttl span { color:#1a5c52; font-weight:normal; font-size:10px; }
  #panel .lbl { color:#ffb000; font-size:10px; margin:8px 0 3px; text-shadow:0 0 6px rgba(255,176,0,.5); letter-spacing:1px; }
  #panel .hint { color:#2a7a6c; }
  #panel .sep { border:none; border-top:1px solid rgba(47,255,224,.15); margin:6px 0; }
  #brand { position:fixed; left:0; right:0; bottom:18px; z-index:10; text-align:center;
    font:600 12px/1 'Courier New', ui-monospace, monospace; letter-spacing:5px;
    color:rgba(47,255,224,.45); text-shadow:0 0 14px rgba(47,255,224,.35); transition:opacity .6s; }
  body.idle #brand { opacity:.2; }
  /* scanline overlay */
  #scanlines {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,8,6,.12) 2px, rgba(0,8,6,.12) 4px
    );
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="net"></canvas>
<div id="scanlines"></div>
<div id="panel">
  <div class="ttl">JBRAIN <span>// wireframe genesis</span></div>
  <div class="hint">holographic flock simulation. one mind made visible.</div>
  <hr class="sep">
  <div class="lbl">&#9632; SELECTED &middot; <span id="selId">#0</span></div>
  <div class="hint">click any boid to read its neural trace</div>
  <div class="lbl">&#9632; CONTROLS</div>
  <div class="hint">drag orbit &middot; scroll zoom &middot; H hide ui</div>
</div>
<div id="brand">J B R A I N</div>

<script>
"use strict";
/* ============================================================ wireframe-genesis engine
   Software 3D renderer — holographic engineering blueprint style.
   Wireframe-only boids, ground grid, schematic neural overlay.
   No dependencies. */

// ---- style knobs ----
const STYLE = {
  bg:[2,16,22],
  fog0:30, fog1:115,
  cyanH:171, cyanS:100, cyanL:58,    // phosphor cyan #2fffe0
  amberH:41, amberS:100, amberL:50,  // amber #ffb000
  predAlert:true,
  netInk:'#2fffe0',
  netHot:'#ffb000',
  glow:true,
};

const cnv = document.getElementById('c');
const ctx = cnv.getContext('2d');
let W=0,H=0,focal=1,cx=0,cyc=0,DPR=1,vig=null;
function resize(){
  DPR = Math.min(1.75, window.devicePixelRatio||1);
  W = innerWidth; H = innerHeight;
  cnv.width = W*DPR; cnv.height = H*DPR;
  cnv.style.width=W+'px'; cnv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  focal = H*1.05; cx=W/2; cyc=H/2;
  vig = ctx.createRadialGradient(cx,cyc,Math.min(W,H)*0.30, cx,cyc,Math.max(W,H)*0.80);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.60)');
  sizeNet();
}
addEventListener('resize',resize);

// ---- vec math ----
const TAU=Math.PI*2;
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const add=(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
const scl=(a,s)=>[a[0]*s,a[1]*s,a[2]*s];
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const len=a=>Math.hypot(a[0],a[1],a[2]);
const norm=a=>{const l=len(a)||1;return [a[0]/l,a[1]/l,a[2]/l];};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

// ---- camera (orbit) ----
const cam={pos:[0,0,60],f:[0,0,-1],r:[1,0,0],u:[0,1,0]};
let camYaw=0.6, camPitch=0.25, camDist=58, yawV=0, pitchV=0;
function updateCamera(t){
  camYaw += yawV; camPitch += pitchV; yawV*=0.9; pitchV*=0.9;
  if(!dragging) camYaw += 0.0012;
  camPitch = clamp(camPitch,-1.2,1.2);
  const cp=Math.cos(camPitch), sp=Math.sin(camPitch);
  const tgt=[0,0,0];
  cam.pos=[Math.sin(camYaw)*cp*camDist, sp*camDist + Math.sin(t*0.0003)*3, Math.cos(camYaw)*cp*camDist];
  const f=norm(sub(tgt,cam.pos));
  const r=norm(cross(f,[0,1,0]));
  cam.f=f; cam.r=r; cam.u=cross(r,f);
}
function project(p){
  const d=sub(p,cam.pos);
  const z=dot(d,cam.f);
  if(z<=0.05) return {vis:false};
  const x=dot(d,cam.r), y=dot(d,cam.u);
  const inv=focal/z;
  return {x:cx+x*inv, y:cyc-y*inv, z, inv, vis:true};
}
function fogAt(z){ return clamp(1-(z-STYLE.fog0)/(STYLE.fog1-STYLE.fog0),0,1); }

// ---- render list (painter) ----
const RL=[];
// Push wireframe edges for a mesh face (no fill, cyan lines only)
function pushWireEdge(pA,pB,hue,sat,l,fog,w,alpha){
  RL.push({t:'line',x1:pA.x,y1:pA.y,x2:pB.x,y2:pB.y,depth:(pA.z+pB.z)/2,
            h:hue,s:sat,l,a:alpha*fog,w});
}
function pushMeshWire(mesh, pos, basis, hue, sat, l, scale, alpha){
  const [R,U,F]=basis;
  const wv=mesh.v.map(p=>{
    const wx=pos[0]+R[0]*p[0]*scale+U[0]*p[1]*scale+F[0]*p[2]*scale;
    const wy=pos[1]+R[1]*p[0]*scale+U[1]*p[1]*scale+F[1]*p[2]*scale;
    const wz=pos[2]+R[2]*p[0]*scale+U[2]*p[1]*scale+F[2]*p[2]*scale;
    return [wx,wy,wz];
  });
  const pj=wv.map(project);
  // Collect unique edges to avoid double-drawing shared edges
  const drawn=new Set();
  for(const fc of mesh.f){
    const a=pj[fc[0]],b=pj[fc[1]],c=pj[fc[2]];
    if(!a.vis||!b.vis||!c.vis) continue;
    const depth=(a.z+b.z+c.z)/3, fog=fogAt(depth);
    if(fog<0.02) continue;
    const pairs=[[fc[0],fc[1]],[fc[1],fc[2]],[fc[2],fc[0]]];
    for(const [i0,i1] of pairs){
      const key=i0<i1?`${i0}_${i1}`:`${i1}_${i0}`;
      if(drawn.has(key)) continue;
      drawn.add(key);
      const pa=pj[i0],pb=pj[i1];
      if(!pa.vis||!pb.vis) continue;
      const edFog=fogAt((pa.z+pb.z)/2);
      if(edFog<0.02) continue;
      pushWireEdge(pa,pb,hue,sat,l,edFog,1.1,alpha);
    }
  }
}
function pushLine(p,q,hue,sat,l,a,w){
  const A=project(p),B=project(q); if(!A.vis||!B.vis) return;
  const depth=(A.z+B.z)/2, fog=fogAt(depth); if(fog<0.02) return;
  RL.push({t:'line',x1:A.x,y1:A.y,x2:B.x,y2:B.y,depth,h:hue,s:sat,l,a:a*fog,w});
}
function pushPoint(p,r,hue,sat,l,a){
  const P=project(p); if(!P.vis) return; const fog=fogAt(P.z); if(fog<0.04) return;
  RL.push({t:'pt',x:P.x,y:P.y,r:Math.max(0.8,r*P.inv),depth:P.z,h:hue,s:sat,l,a:a*fog});
}
// Reticle crosshair box for selected boid
function pushReticle(screenX,screenY,sz,hue,sat,l,a){
  RL.push({t:'reticle',x:screenX,y:screenY,sz,depth:-1,h:hue,s:sat,l,a});
}
function flush(){
  RL.sort((a,b)=>b.depth-a.depth);
  ctx.lineJoin='round'; ctx.lineCap='round';
  for(const f of RL){
    if(f.t==='line'){
      ctx.strokeStyle=`hsla(${f.h},${f.s}%,${f.l}%,${f.a})`;
      ctx.lineWidth=f.w; ctx.beginPath();
      ctx.moveTo(f.x1,f.y1); ctx.lineTo(f.x2,f.y2); ctx.stroke();
    } else if(f.t==='pt'){
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle=`hsla(${f.h},${f.s}%,${f.l}%,${f.a*0.2})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r*3.2,0,TAU); ctx.fill();
      ctx.fillStyle=`hsla(${f.h},${f.s}%,${Math.min(94,f.l+18)}%,${f.a})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,TAU); ctx.fill();
      ctx.restore();
    } else if(f.t==='reticle'){
      const {x,y,sz,h,s,l,a}=f;
      const h2=sz/2, c=8; // corner size
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${a})`;
      ctx.lineWidth=1.5;
      // draw corner brackets
      ctx.beginPath();
      // top-left
      ctx.moveTo(x-h2+c,y-h2); ctx.lineTo(x-h2,y-h2); ctx.lineTo(x-h2,y-h2+c);
      // top-right
      ctx.moveTo(x+h2-c,y-h2); ctx.lineTo(x+h2,y-h2); ctx.lineTo(x+h2,y-h2+c);
      // bottom-left
      ctx.moveTo(x-h2+c,y+h2); ctx.lineTo(x-h2,y+h2); ctx.lineTo(x-h2,y+h2-c);
      // bottom-right
      ctx.moveTo(x+h2-c,y+h2); ctx.lineTo(x+h2,y+h2); ctx.lineTo(x+h2,y+h2-c);
      ctx.stroke();
      // center crosshair tiny tick
      ctx.strokeStyle=`hsla(${h},${s}%,${l}%,${a*0.5})`;
      ctx.lineWidth=0.8;
      ctx.beginPath();
      ctx.moveTo(x-4,y); ctx.lineTo(x+4,y);
      ctx.moveTo(x,y-4); ctx.lineTo(x,y+4);
      ctx.stroke();
      ctx.restore();
    }
  }
  RL.length=0;
}

// ---- geometry: low-poly fish wireframe facing +z ----
function fishMesh(){
  const v=[
    [0,0,1.15],          // 0 nose
    [0.32,0,0.1],        // 1 right
    [-0.32,0,0.1],       // 2 left
    [0,0.34,0.1],        // 3 top
    [0,-0.30,0.1],       // 4 bottom
    [0,0,-0.85],         // 5 tail base
    [0,0.55,-1.2],       // 6 caudal top
    [0,-0.5,-1.2],       // 7 caudal bottom
    [0,0.62,-0.2],       // 8 dorsal tip
  ];
  const f=[
    [0,3,1],[0,1,4],[0,4,2],[0,2,3],
    [3,5,1],[1,5,4],[4,5,2],[2,5,3],
    [5,6,7],
    [3,8,5],
  ];
  return {v,f};
}
const FISH=fishMesh();

function predMesh(){
  const v=[
    [0,0,1.8],[0.55,0,0.0],[-0.55,0,0.0],[0,0.55,0.0],[0,-0.5,0.0],
    [0,0,-1.5],[0,0.95,-2.1],[0,-0.85,-2.1],[0,1.0,-0.3],
    [0.3,-0.25,1.2],[-0.3,-0.25,1.2],
  ];
  const f=[
    [0,3,1],[0,1,4],[0,4,2],[0,2,3],
    [3,5,1],[1,5,4],[4,5,2],[2,5,3],
    [5,6,7],[3,8,5],
    [0,9,1],[0,2,10],
  ];
  return {v,f};
}
const PRED=predMesh();

// ---- boids ----
const BND=27;
const N=120;
const boids=[];
function rnd(a,b){return a+Math.random()*(b-a);}
for(let i=0;i<N;i++){
  boids.push({
    p:[rnd(-BND,BND),rnd(-BND,BND),rnd(-BND,BND)],
    v:[rnd(-1,1),rnd(-1,1),rnd(-1,1)],
    state:{density:0,speed:0,threat:0,sep:0,ali:0,coh:0},
    sx:-1,sy:-1,sz:1e9,
  });
}
const predator={p:[0,0,-40],v:[0,0,1]};

const MAXSPD=0.62, MAXF=0.022;
const R_NEI=7.5, R_SEP=3.2, R_FLEE=12;
function limit(v,m){const l=len(v);return l>m?scl(v,m/l):v;}
function stepBoids(){
  for(const b of boids){
    let sep=[0,0,0],ali=[0,0,0],coh=[0,0,0],cnt=0,scnt=0;
    for(const o of boids){
      if(o===b) continue;
      const d=sub(b.p,o.p), dl=len(d);
      if(dl<R_NEI){ ali=add(ali,o.v); coh=add(coh,o.p); cnt++; }
      if(dl<R_SEP && dl>1e-4){ sep=add(sep,scl(d,1/(dl*dl))); scnt++; }
    }
    let acc=[0,0,0];
    if(scnt){ sep=limit(sub(scl(norm(sep),MAXSPD),b.v),MAXF); acc=add(acc,scl(sep,1.7)); }
    if(cnt){
      ali=limit(sub(scl(norm(ali),MAXSPD),b.v),MAXF); acc=add(acc,scl(ali,1.0));
      coh=sub(scl(coh,1/cnt),b.p); coh=limit(sub(scl(norm(coh),MAXSPD),b.v),MAXF); acc=add(acc,scl(coh,0.9));
    }
    const dp=sub(b.p,predator.p), dpl=len(dp); let threat=0;
    if(dpl<R_FLEE && dpl>1e-3){
      const flee=limit(sub(scl(norm(dp),MAXSPD),b.v),MAXF*3);
      acc=add(acc,scl(flee,3.2*(R_FLEE/Math.max(dpl,1))));
      threat=1-clamp(dpl/R_FLEE,0,1);
    }
    for(let k=0;k<3;k++){
      if(b.p[k]> BND-4) acc[k]-=0.01*(b.p[k]-(BND-4));
      if(b.p[k]<-BND+4) acc[k]-=0.01*(b.p[k]-(-BND+4));
    }
    b.v=limit(add(b.v,acc),MAXSPD);
    if(len(b.v)<0.18) b.v=scl(norm(b.v),0.18);
    b.p=add(b.p,b.v);
    b.state.density=clamp(cnt/12,0,1);
    b.state.speed=clamp(len(b.v)/MAXSPD,0,1);
    b.state.threat=threat;
    b.state.sep=clamp(len(sep)/MAXF,0,1);
    b.state.ali=clamp(len(ali)/MAXF,0,1);
    b.state.coh=clamp(len(coh)/MAXF,0,1);
  }
  let c=[0,0,0]; for(const b of boids) c=add(c,b.p); c=scl(c,1/N);
  const seek=limit(sub(scl(norm(sub(c,predator.p)),MAXSPD*0.92),predator.v),MAXF*1.3);
  predator.v=limit(add(predator.v,seek),MAXSPD*0.92);
  predator.p=add(predator.p,predator.v);
}

function basisFrom(v){
  const F=norm(v);
  let R=cross(F,[0,1,0]); if(len(R)<1e-3) R=[1,0,0]; R=norm(R);
  const U=cross(R,F);
  return [R,U,F];
}

// ---- ground grid ----
function drawGroundGrid(){
  const y=-BND;
  const step=7, half=BND;
  for(let x=-half;x<=half;x+=step){
    pushLine([x,y,-half],[x,y,half],STYLE.cyanH,STYLE.cyanS,22,0.13,0.7);
  }
  for(let z=-half;z<=half;z+=step){
    pushLine([-half,y,z],[half,y,z],STYLE.cyanH,STYLE.cyanS,22,0.13,0.7);
  }
}

let selected=0;
function drawWorld(){
  // ground grid
  drawGroundGrid();

  // bounding cage (very faint)
  const e=BND;
  const corners=[[-e,-e,-e],[e,-e,-e],[e,e,-e],[-e,e,-e],[-e,-e,e],[e,-e,e],[e,e,e],[-e,e,e]];
  const E=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  for(const [a,b] of E) pushLine(corners[a],corners[b],STYLE.cyanH,STYLE.cyanS,25,0.07,0.6);

  // boids as wireframe
  for(let i=0;i<N;i++){
    const b=boids[i];
    const basis=basisFrom(b.v);
    const isAlert=b.state.threat>0.35;
    const isSel=i===selected;
    let hue=STYLE.cyanH, sat=STYLE.cyanS, l=STYLE.cyanL;
    if(isAlert){ hue=STYLE.amberH; sat=STYLE.amberS; l=STYLE.amberL; }
    if(isSel){ l=Math.min(90,l+18); }
    const alpha=isSel?0.95:0.70;
    pushMeshWire(FISH,b.p,basis,hue,sat,l,isSel?1.5:1.0,alpha);
    // glow dot at body center
    pushPoint(b.p,isSel?2.0:1.1,hue,sat,l,isSel?0.9:0.5);
    // screen pos for pick
    const P=project(b.p); if(P.vis){ b.sx=P.x; b.sy=P.y; b.sz=P.z; } else { b.sz=1e9; }
    if(isSel){
      // reticle
      pushReticle(P.x,P.y,28,hue,sat,l,0.90);
    }
  }
  // predator — always amber alert
  const pb=basisFrom(predator.v);
  pushMeshWire(PRED,predator.p,pb,STYLE.amberH,STYLE.amberS,STYLE.amberL,2.0,0.90);
  pushPoint(predator.p,2.6,STYLE.amberH,STYLE.amberS,STYLE.amberL,0.80);
}

// ============================================================ schematic neural overlay
const net=document.getElementById('net');
const nctx=net.getContext('2d');
let NW=300,NH=260;
function sizeNet(){
  NW=Math.min(360,Math.round(W*0.44)); NH=Math.min(300,Math.round(H*0.44));
  net.width=NW*DPR; net.height=NH*DPR;
  net.style.width=NW+'px'; net.style.height=NH+'px';
  nctx.setTransform(DPR,0,0,DPR,0,0);
  layoutNet();
}
const LAYERS=[6,8,8,3];
const INPUT_LABELS=['density','speed','threat','sep','align','cohere'];
const OUTPUT_LABELS=['turn','flee','throttle'];
let nodes=[],edges=[];
function layoutNet(){
  nodes=[]; edges=[];
  const headerH=20, footerH=10;
  const padX=38, padY=headerH+14;
  const availH=NH-padY-footerH;
  const gw=(NW-padX*2)/(LAYERS.length-1);
  for(let l=0;l<LAYERS.length;l++){
    const col=[];
    const gh=availH/Math.max(1,LAYERS[l]-1);
    for(let i=0;i<LAYERS[l];i++){
      col.push({x:padX+l*gw, y:LAYERS[l]===1?padY+availH/2:padY+i*gh, a:0});
    }
    nodes.push(col);
  }
  for(let l=1;l<LAYERS.length;l++){
    for(let i=0;i<LAYERS[l-1];i++) for(let j=0;j<LAYERS[l];j++)
      edges.push({l,i,j,w:rnd(-1,1),pulses:[]});
  }
}
function sig(x){return 1/(1+Math.exp(-x));}
function netForward(){
  const s=boids[selected].state;
  const inp=[s.density,s.speed,s.threat,s.sep,s.ali,s.coh];
  for(let i=0;i<LAYERS[0];i++) nodes[0][i].a=lerp(nodes[0][i].a,inp[i],0.2);
  for(let l=1;l<LAYERS.length;l++){
    for(let j=0;j<LAYERS[l];j++){
      let sum=-0.4;
      for(const e of edges) if(e.l===l && e.j===j) sum+=nodes[l-1][e.i].a*e.w*0.9;
      const tgt=sig(sum*2.2);
      nodes[l][j].a=lerp(nodes[l][j].a,tgt,0.18);
    }
  }
  for(const e of edges){
    const src=nodes[e.l-1][e.i];
    if(src.a>0.4 && Math.random()<src.a*0.10){
      e.pulses.push({t:0,sp:rnd(0.02,0.05)});
    }
  }
}
function hexA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function fmtAct(v){ return v.toFixed(2); }
function drawNet(){
  nctx.clearRect(0,0,NW,NH);
  // background panel tint
  nctx.fillStyle='rgba(2,16,22,0.55)';
  nctx.fillRect(0,0,NW,NH);
  // border
  nctx.strokeStyle=hexA(STYLE.netInk,0.35);
  nctx.lineWidth=0.8;
  nctx.strokeRect(1,1,NW-2,NH-2);

  // header: "BOID #N · NEURAL TRACE"
  nctx.fillStyle=hexA(STYLE.netInk,0.85);
  nctx.font="bold 9px 'Courier New', monospace";
  nctx.fillText(`BOID #${selected} · NEURAL TRACE`,6,13);
  // tick counter / frame decoration
  nctx.fillStyle=hexA(STYLE.netInk,0.30);
  nctx.font="8px 'Courier New', monospace";
  const tick=Math.floor(performance.now()/16)&0xFFFF;
  nctx.fillText(`FRM:${tick.toString(16).toUpperCase().padStart(4,'0')}`,NW-56,13);
  // separator line under header
  nctx.strokeStyle=hexA(STYLE.netInk,0.25);
  nctx.lineWidth=0.6;
  nctx.beginPath(); nctx.moveTo(2,17); nctx.lineTo(NW-2,17); nctx.stroke();

  nctx.globalCompositeOperation='lighter';
  // draw edges as thin cyan lines
  for(const e of edges){
    const A=nodes[e.l-1][e.i], B=nodes[e.l][e.j];
    const act=(A.a+B.a)*0.5;
    nctx.strokeStyle=hexA(STYLE.netInk,0.04+act*0.18);
    nctx.lineWidth=0.5+act*0.9;
    nctx.beginPath(); nctx.moveTo(A.x,A.y); nctx.lineTo(B.x,B.y); nctx.stroke();
    // pulses
    for(let k=e.pulses.length-1;k>=0;k--){
      const p=e.pulses[k]; p.t+=p.sp;
      if(p.t>=1){ B.a=Math.min(1,B.a+0.12); e.pulses.splice(k,1); continue; }
      const x=lerp(A.x,B.x,p.t), y=lerp(A.y,B.y,p.t);
      const col=B.a>0.6?STYLE.netHot:STYLE.netInk;
      nctx.fillStyle=hexA(col,0.95);
      nctx.beginPath(); nctx.arc(x,y,1.6,0,TAU); nctx.fill();
    }
  }
  // draw nodes as cyan squares/rings + numeric activation value
  for(let l=0;l<nodes.length;l++) for(const nd of nodes[l]){
    const col=nd.a>0.55?STYLE.netHot:STYLE.netInk;
    const r=4+nd.a*5;
    // glow halo
    const g=nctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,r+5);
    g.addColorStop(0,hexA(col,0.30+nd.a*0.55));
    g.addColorStop(1,hexA(col,0));
    nctx.fillStyle=g; nctx.beginPath(); nctx.arc(nd.x,nd.y,r+5,0,TAU); nctx.fill();
    // square node
    const hs=3+nd.a*3;
    nctx.strokeStyle=hexA(col,0.75+nd.a*0.25);
    nctx.lineWidth=1.2;
    nctx.strokeRect(nd.x-hs,nd.y-hs,hs*2,hs*2);
    // inner bright dot
    nctx.fillStyle=hexA('#ffffff',0.20+nd.a*0.70);
    nctx.fillRect(nd.x-1.5,nd.y-1.5,3,3);
  }
  nctx.globalCompositeOperation='source-over';

  // labels and activation values
  nctx.font="8px 'Courier New', monospace";
  // input layer: left of node, label + activation
  for(let i=0;i<LAYERS[0];i++){
    const nd=nodes[0][i];
    const col=nd.a>0.55?STYLE.netHot:STYLE.netInk;
    nctx.fillStyle=hexA(col,0.70);
    nctx.fillText(INPUT_LABELS[i],2,nd.y-4);
    nctx.fillStyle=hexA(col,0.55);
    nctx.fillText(fmtAct(nd.a),2,nd.y+8);
  }
  // hidden layers: activation value below node
  for(let l=1;l<LAYERS.length-1;l++) for(const nd of nodes[l]){
    const col=nd.a>0.55?STYLE.netHot:STYLE.netInk;
    nctx.fillStyle=hexA(col,0.50);
    nctx.fillText(fmtAct(nd.a),nd.x-9,nd.y+14);
  }
  // output layer: right of node
  for(let i=0;i<LAYERS[3];i++){
    const nd=nodes[3][i];
    const col=nd.a>0.55?STYLE.netHot:STYLE.netInk;
    nctx.fillStyle=hexA(col,0.70);
    nctx.fillText(OUTPUT_LABELS[i],nd.x+8,nd.y-3);
    nctx.fillStyle=hexA(col,0.55);
    nctx.fillText(fmtAct(nd.a),nd.x+8,nd.y+9);
  }

  // bottom chrome bar
  nctx.strokeStyle=hexA(STYLE.netInk,0.20);
  nctx.lineWidth=0.6;
  nctx.beginPath(); nctx.moveTo(2,NH-10); nctx.lineTo(NW-2,NH-10); nctx.stroke();
  nctx.fillStyle=hexA(STYLE.netInk,0.25);
  nctx.font="7px 'Courier New', monospace";
  nctx.fillText('JBRAIN SIM',4,NH-3);
  nctx.fillText('LIVE',NW-22,NH-3);
}

// ============================================================ interaction
let dragging=false,lastX=0,lastY=0;
cnv.addEventListener('pointerdown',e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; pokeIdle(); pickStart=[e.clientX,e.clientY]; });
addEventListener('pointermove',e=>{
  pokeIdle();
  if(dragging){ yawV+=-(e.clientX-lastX)*0.0010; pitchV+=(e.clientY-lastY)*0.0010; lastX=e.clientX; lastY=e.clientY; }
});
let pickStart=null;
addEventListener('pointerup',e=>{
  dragging=false;
  if(pickStart && Math.hypot(e.clientX-pickStart[0],e.clientY-pickStart[1])<6) pick(e.clientX,e.clientY);
  pickStart=null;
});
cnv.addEventListener('wheel',e=>{ e.preventDefault(); camDist=clamp(camDist*(1+Math.sign(e.deltaY)*0.08),22,110); pokeIdle(); },{passive:false});
function pick(mx,my){
  let best=-1,bd=1e9;
  for(let i=0;i<N;i++){ const b=boids[i]; if(b.sz>1e8) continue;
    const d=Math.hypot(b.sx-mx,b.sy-my); if(d<26 && d<bd){bd=d;best=i;} }
  if(best>=0){ selected=best; document.getElementById('selId').textContent='#'+best; }
}
let idleTimer=null;
function pokeIdle(){ document.body.classList.remove('idle'); clearTimeout(idleTimer); idleTimer=setTimeout(()=>document.body.classList.add('idle'),4000); }
addEventListener('keydown',e=>{ if(e.key==='h'||e.key==='H') document.body.classList.toggle('idle'); });
pokeIdle();

// ============================================================ main loop
function frame(){
  const now=performance.now();
  updateCamera(now);
  stepBoids();
  // fade-trail (dark teal bg)
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=`rgba(${STYLE.bg[0]},${STYLE.bg[1]},${STYLE.bg[2]},0.28)`;
  ctx.fillRect(0,0,W,H);
  drawWorld();
  flush();
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  netForward(); drawNet();
  requestAnimationFrame(frame);
}
resize();
requestAnimationFrame(frame);
</script>
