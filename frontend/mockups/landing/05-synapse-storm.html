<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#04060d">
<title>JBrain — Synapse Storm</title>
<style>
  html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#04060d;
    touch-action:none; -webkit-user-select:none; user-select:none; }
  #c { display:block; position:fixed; left:0; top:0; }
  #net { display:block; position:fixed; left:0; bottom:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="net"></canvas>

<script>
"use strict";
/* ============================================================ SYNAPSE STORM
   Engine: identical to neon-reef (10 boids + 1 predator, slow, split layout).
   Visual: near-black bg; cool teal (#1fd6c4) at rest -> hot orange (#ff7a18)
   -> white (#ffffff) as neurons fire / threat rises. Neural-net panel is the
   expressive star with layered additive glow, organic cascades, refractory
   cooldown, spontaneous baseline pulses. Flock stays serene above. */

const STYLE = {
  bg:[4,6,13],
  fog0:18, fog1:78,
  hueCalm:177,                    // cool teal
  hueHot:28,                      // orange/amber
  sat:88,
  selHue:22,                      // selected boid -> hot orange/white
  selSat:95,
  predHue:6, predSat:92,
  netInk:'#1fd6c4',               // cool teal
  netHot:'#ff7a18',               // hot orange
  netPeak:'#ffffff',              // peak white
  netBg:[4,6,13],
};

const cnv=document.getElementById('c'), ctx=cnv.getContext('2d');
const net=document.getElementById('net'), nctx=net.getContext('2d');
let W=0,H=0,SCENE_H=0,NET_H=0,focal=1,cx=0,cyc=0,DPR=1,vig=null;

function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  NET_H=Math.round(H*0.33); SCENE_H=H-NET_H;
  cnv.width=W*DPR; cnv.height=SCENE_H*DPR; cnv.style.width=W+'px'; cnv.style.height=SCENE_H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  net.width=W*DPR; net.height=NET_H*DPR; net.style.width=W+'px'; net.style.height=NET_H+'px';
  nctx.setTransform(DPR,0,0,DPR,0,0);
  focal=SCENE_H*1.15; cx=W/2; cyc=SCENE_H/2;
  vig=ctx.createRadialGradient(cx,cyc,Math.min(W,SCENE_H)*0.25,cx,cyc,Math.max(W,SCENE_H)*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.55)');
  layoutNet();
}
addEventListener('resize',resize);

// ---- vec ----
const TAU=Math.PI*2;
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const add=(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
const scl=(a,s)=>[a[0]*s,a[1]*s,a[2]*s];
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const len=a=>Math.hypot(a[0],a[1],a[2]);
const norm=a=>{const l=len(a)||1;return [a[0]/l,a[1]/l,a[2]/l];};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function rnd(a,b){return a+Math.random()*(b-a);}

// ---- camera (gentle orbit) ----
const cam={pos:[0,0,40],f:[0,0,-1],r:[1,0,0],u:[0,1,0]};
let camYaw=0.5,camPitch=0.18,camDist=42,yawV=0,pitchV=0;
function updateCamera(t){
  camYaw+=yawV; camPitch+=pitchV; yawV*=0.9; pitchV*=0.9;
  if(!dragging) camYaw+=0.0008;
  camPitch=clamp(camPitch,-1.0,1.0);
  const cp=Math.cos(camPitch),sp=Math.sin(camPitch);
  cam.pos=[Math.sin(camYaw)*cp*camDist, sp*camDist+Math.sin(t*0.0002)*2, Math.cos(camYaw)*cp*camDist];
  const f=norm(sub([0,0,0],cam.pos));
  const r=norm(cross(f,[0,1,0]));
  cam.f=f; cam.r=r; cam.u=cross(r,f);
}
function project(p){
  const d=sub(p,cam.pos), z=dot(d,cam.f);
  if(z<=0.05) return {vis:false};
  const inv=focal/z;
  return {x:cx+dot(d,cam.r)*inv, y:cyc-dot(d,cam.u)*inv, z, inv, vis:true};
}
function fogAt(z){ return clamp(1-(z-STYLE.fog0)/(STYLE.fog1-STYLE.fog0),0,1); }

// ---- render list (painter) ----
const RL=[];
const LIGHT=norm([0.4,0.85,0.35]);
function pushMesh(mesh,pos,basis,hue,sat,scale,baseL,edgeA){
  const [R,U,F]=basis;
  const wv=mesh.v.map(p=>[
    pos[0]+R[0]*p[0]*scale+U[0]*p[1]*scale+F[0]*p[2]*scale,
    pos[1]+R[1]*p[0]*scale+U[1]*p[1]*scale+F[1]*p[2]*scale,
    pos[2]+R[2]*p[0]*scale+U[2]*p[1]*scale+F[2]*p[2]*scale]);
  const pj=wv.map(project);
  for(const fc of mesh.f){
    const a=pj[fc[0]],b=pj[fc[1]],c=pj[fc[2]];
    if(!a.vis||!b.vis||!c.vis) continue;
    const depth=(a.z+b.z+c.z)/3, fog=fogAt(depth); if(fog<0.02) continue;
    const n=norm(cross(sub(wv[fc[1]],wv[fc[0]]),sub(wv[fc[2]],wv[fc[0]])));
    const shade=0.45+0.55*clamp(dot(n,LIGHT),0,1);
    RL.push({t:'tri',pts:[a,b,c],depth,h:hue,s:sat,l:clamp(baseL*shade,8,75),a:fog,eA:edgeA,eL:Math.min(92,baseL*shade+26)});
  }
}
function pushPoint(p,r,hue,sat,l,a){
  const P=project(p); if(!P.vis) return; const fog=fogAt(P.z); if(fog<0.04) return;
  RL.push({t:'pt',x:P.x,y:P.y,r:Math.max(0.8,r*P.inv),depth:P.z,h:hue,s:sat,l,a:a*fog});
}
function flush(){
  RL.sort((a,b)=>b.depth-a.depth);
  ctx.lineJoin='round'; ctx.lineCap='round';
  for(const f of RL){
    if(f.t==='tri'){
      ctx.beginPath(); ctx.moveTo(f.pts[0].x,f.pts[0].y); ctx.lineTo(f.pts[1].x,f.pts[1].y); ctx.lineTo(f.pts[2].x,f.pts[2].y); ctx.closePath();
      ctx.fillStyle=`hsla(${f.h},${f.s}%,${f.l}%,${f.a*0.88})`; ctx.fill();
      ctx.strokeStyle=`hsla(${f.h},${f.s}%,${f.eL}%,${f.a*f.eA})`; ctx.lineWidth=1; ctx.stroke();
    } else {
      // additive soft glow halo + bright core
      ctx.save(); ctx.globalCompositeOperation='lighter';
      ctx.fillStyle=`hsla(${f.h},${f.s}%,${f.l}%,${f.a*0.16})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r*5.0,0,TAU); ctx.fill();
      ctx.fillStyle=`hsla(${f.h},${f.s}%,${f.l}%,${f.a*0.20})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r*2.8,0,TAU); ctx.fill();
      ctx.fillStyle=`hsla(${f.h},${f.s}%,${Math.min(95,f.l+28)}%,${f.a})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,TAU); ctx.fill();
      ctx.restore();
    }
  }
  RL.length=0;
}

// ---- geometry ----
const FISH={v:[[0,0,1.15],[0.32,0,0.1],[-0.32,0,0.1],[0,0.34,0.1],[0,-0.30,0.1],[0,0,-0.85],[0,0.55,-1.2],[0,-0.5,-1.2],[0,0.62,-0.2]],
  f:[[0,3,1],[0,1,4],[0,4,2],[0,2,3],[3,5,1],[1,5,4],[4,5,2],[2,5,3],[5,6,7],[3,8,5]]};
const PRED={v:[[0,0,1.8],[0.55,0,0],[-0.55,0,0],[0,0.55,0],[0,-0.5,0],[0,0,-1.5],[0,0.95,-2.1],[0,-0.85,-2.1],[0,1.0,-0.3],[0.3,-0.25,1.2],[-0.3,-0.25,1.2]],
  f:[[0,3,1],[0,1,4],[0,4,2],[0,2,3],[3,5,1],[1,5,4],[4,5,2],[2,5,3],[5,6,7],[3,8,5],[0,9,1],[0,2,10]]};

// ---- boids (10, slow) ----
const BND=17, N=10;
const boids=[];
for(let i=0;i<N;i++) boids.push({
  p:[rnd(-BND,BND),rnd(-BND,BND),rnd(-BND,BND)],
  v:[rnd(-1,1),rnd(-1,1),rnd(-1,1)],
  state:{density:0,speed:0,threat:0,sep:0,ali:0,coh:0}, sx:-1,sy:-1,sz:1e9,
});
const predator={p:[0,0,-26],v:[0,0,1]};

const MAXSPD=0.16, MAXF=0.006, R_NEI=11, R_SEP=5, R_FLEE=13;
function limit(v,m){const l=len(v);return l>m?scl(v,m/l):v;}
function stepBoids(){
  for(const b of boids){
    let sep=[0,0,0],ali=[0,0,0],coh=[0,0,0],cnt=0,scnt=0;
    for(const o of boids){ if(o===b) continue;
      const d=sub(b.p,o.p), dl=len(d);
      if(dl<R_NEI){ ali=add(ali,o.v); coh=add(coh,o.p); cnt++; }
      if(dl<R_SEP&&dl>1e-4){ sep=add(sep,scl(d,1/(dl*dl))); scnt++; }
    }
    let acc=[0,0,0];
    if(scnt){ sep=limit(sub(scl(norm(sep),MAXSPD),b.v),MAXF); acc=add(acc,scl(sep,1.6)); }
    if(cnt){
      ali=limit(sub(scl(norm(ali),MAXSPD),b.v),MAXF); acc=add(acc,scl(ali,1.0));
      coh=sub(scl(coh,1/cnt),b.p); coh=limit(sub(scl(norm(coh),MAXSPD),b.v),MAXF); acc=add(acc,scl(coh,0.9));
    }
    const dp=sub(b.p,predator.p), dpl=len(dp); let threat=0;
    if(dpl<R_FLEE&&dpl>1e-3){
      const flee=limit(sub(scl(norm(dp),MAXSPD),b.v),MAXF*3);
      acc=add(acc,scl(flee,3.0*(R_FLEE/Math.max(dpl,1)))); threat=1-clamp(dpl/R_FLEE,0,1);
    }
    for(let k=0;k<3;k++){
      if(b.p[k]>BND-3) acc[k]-=0.006*(b.p[k]-(BND-3));
      if(b.p[k]<-BND+3) acc[k]-=0.006*(b.p[k]-(-BND+3));
    }
    b.v=limit(add(b.v,acc),MAXSPD);
    if(len(b.v)<0.05) b.v=scl(norm(b.v),0.05);
    b.p=add(b.p,b.v);
    b.state.density=clamp(cnt/6,0,1); b.state.speed=clamp(len(b.v)/MAXSPD,0,1);
    b.state.threat=threat; b.state.sep=clamp(len(sep)/MAXF,0,1);
    b.state.ali=clamp(len(ali)/MAXF,0,1); b.state.coh=clamp(len(coh)/MAXF,0,1);
  }
  let c=[0,0,0]; for(const b of boids) c=add(c,b.p); c=scl(c,1/N);
  const seek=limit(sub(scl(norm(sub(c,predator.p)),MAXSPD*0.8),predator.v),MAXF*1.1);
  predator.v=limit(add(predator.v,seek),MAXSPD*0.8); predator.p=add(predator.p,predator.v);
}
function basisFrom(v){ const F=norm(v); let R=cross(F,[0,1,0]); if(len(R)<1e-3) R=[1,0,0]; R=norm(R); return [R,cross(R,F),F]; }

let selected=0;
function drawWorld(t){
  for(let i=0;i<N;i++){
    const b=boids[i], basis=basisFrom(b.v), spd=clamp(len(b.v)/MAXSPD,0,1);
    const isSel=i===selected;
    // cool teal -> hot orange on cool-hot scale; selected boid -> bright orange/white
    const hue=isSel?STYLE.selHue:lerp(STYLE.hueCalm,STYLE.hueHot,spd*0.7+b.state.threat*0.6);
    const sat=isSel?STYLE.selSat:STYLE.sat;
    pushMesh(FISH,b.p,basis,hue,sat,isSel?1.7:1.15,isSel?78:48,isSel?0.95:0.45);
    const P=project(b.p); if(P.vis){ b.sx=P.x; b.sy=P.y; b.sz=P.z; } else b.sz=1e9;
    // selected boid: bright additive glow halo in hot orange
    if(isSel) pushPoint(b.p,2.4,STYLE.selHue,STYLE.selSat,88,0.95);
  }
  pushMesh(PRED,predator.p,basisFrom(predator.v),STYLE.predHue,STYLE.predSat,2.1,55,0.9);
  pushPoint(predator.p,2.6,STYLE.predHue,STYLE.predSat,68,0.6);
}

// ============================================================ neural net (bottom 1/3)
const LAYERS=[6,6,3];
let nodes=[],edges=[];
function layoutNet(){
  nodes=[]; edges=[];
  const padX=64, padY=22;
  const gw=(W-padX*2)/(LAYERS.length-1);
  for(let l=0;l<LAYERS.length;l++){
    const col=[]; const gh=(NET_H-padY*2)/Math.max(1,LAYERS[l]-1);
    for(let i=0;i<LAYERS[l];i++) col.push({
      x:padX+l*gw,
      y:LAYERS[l]===1?NET_H/2:padY+i*gh,
      a:0,        // activation 0-1
      refract:0,  // refractory cooldown frames
    });
    nodes.push(col);
  }
  for(let l=1;l<LAYERS.length;l++) for(let i=0;i<LAYERS[l-1];i++) for(let j=0;j<LAYERS[l];j++)
    edges.push({l,i,j,w:rnd(-1,1),pulses:[]});
}
function sig(x){return 1/(1+Math.exp(-x));}

// Storm intensity driven by threat on selected boid
let stormLevel=0;

function netForward(){
  const s=boids[selected].state;
  // gentle threat-driven intensification — calm baseline, never frantic
  stormLevel=lerp(stormLevel,s.threat*0.75,0.04);
  const inp=[s.density,s.speed,s.threat,s.sep,s.ali,s.coh];
  for(let i=0;i<LAYERS[0];i++) nodes[0][i].a=lerp(nodes[0][i].a,inp[i],0.12);

  for(let l=1;l<LAYERS.length;l++){
    for(let j=0;j<LAYERS[l];j++){
      let sum=-0.4;
      for(const e of edges) if(e.l===l&&e.j===j) sum+=nodes[l-1][e.i].a*e.w*0.9;
      // smooth activation decay via lerp — easing not a step function
      nodes[l][j].a=lerp(nodes[l][j].a,sig(sum*2.2),0.10);
      // refractory cooldown decay
      if(nodes[l][j].refract>0) nodes[l][j].refract--;
    }
  }

  // spontaneous baseline pulses so net is never fully dark + gentle storm scaling
  const baseRate=0.030 + stormLevel*0.12;
  for(const e of edges){
    const src=nodes[e.l-1][e.i];
    if(src.refract>0) continue;
    // activation-gated emission; occasional spontaneous pulse for organic baseline
    let rate=0;
    if(src.a>0.32) rate=src.a*baseRate;
    else if(Math.random()<0.005+stormLevel*0.018) rate=0.9;
    if(rate>0 && Math.random()<rate){
      // gentle per-pulse speed jitter — unhurried
      const spJitter=rnd(0.014,0.032)*(1+stormLevel*0.35);
      e.pulses.push({t:0,sp:spJitter});
    }
  }
}

function hexA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

// Layered additive glow halo — luminous but readable, not a strobe
function bloomNode(nx,ny,radius,colHex,alpha){
  nctx.save(); nctx.globalCompositeOperation='lighter';
  // outer diffuse halo
  const g1=nctx.createRadialGradient(nx,ny,0,nx,ny,radius*5.5);
  g1.addColorStop(0,hexA(colHex,alpha*0.14));
  g1.addColorStop(1,hexA(colHex,0));
  nctx.fillStyle=g1; nctx.beginPath(); nctx.arc(nx,ny,radius*5.5,0,TAU); nctx.fill();
  // mid halo
  const g2=nctx.createRadialGradient(nx,ny,0,nx,ny,radius*2.6);
  g2.addColorStop(0,hexA(colHex,alpha*0.28));
  g2.addColorStop(1,hexA(colHex,0));
  nctx.fillStyle=g2; nctx.beginPath(); nctx.arc(nx,ny,radius*2.6,0,TAU); nctx.fill();
  // inner core glow
  const g3=nctx.createRadialGradient(nx,ny,0,nx,ny,radius+3);
  g3.addColorStop(0,hexA(colHex,alpha*0.70));
  g3.addColorStop(1,hexA(colHex,0));
  nctx.fillStyle=g3; nctx.beginPath(); nctx.arc(nx,ny,radius+3,0,TAU); nctx.fill();
  nctx.restore();
}

function bloomPulse(x,y,colHex,alpha,sz){
  nctx.save(); nctx.globalCompositeOperation='lighter';
  const g=nctx.createRadialGradient(x,y,0,x,y,sz*4.0);
  g.addColorStop(0,hexA(colHex,alpha*0.50));
  g.addColorStop(0.35,hexA(colHex,alpha*0.18));
  g.addColorStop(1,hexA(colHex,0));
  nctx.fillStyle=g; nctx.beginPath(); nctx.arc(x,y,sz*4.0,0,TAU); nctx.fill();
  nctx.fillStyle=hexA('#ffffff',alpha*0.65);
  nctx.beginPath(); nctx.arc(x,y,sz,0,TAU); nctx.fill();
  nctx.restore();
}

function drawNet(){
  // distinct panel background + hairline divider
  nctx.globalCompositeOperation='source-over';
  nctx.fillStyle=`rgb(${STYLE.netBg[0]},${STYLE.netBg[1]},${STYLE.netBg[2]})`;
  nctx.fillRect(0,0,W,NET_H);
  // top-edge divider: teal at rest, warms under threat
  const divHot=stormLevel>0.3;
  nctx.fillStyle=hexA(divHot?STYLE.netHot:STYLE.netInk,0.22);
  nctx.fillRect(0,0,W,1);

  nctx.globalCompositeOperation='lighter';

  // edges + pulses
  for(const e of edges){
    const A=nodes[e.l-1][e.i], B=nodes[e.l][e.j];
    const act=(A.a+B.a)*0.5;
    const edgeCol=stormLevel>0.4?STYLE.netHot:STYLE.netInk;
    nctx.strokeStyle=hexA(edgeCol,0.025+act*0.18+stormLevel*0.04);
    nctx.lineWidth=0.5+act*1.2+stormLevel*0.6;
    nctx.beginPath(); nctx.moveTo(A.x,A.y); nctx.lineTo(B.x,B.y); nctx.stroke();

    for(let k=e.pulses.length-1;k>=0;k--){
      const p=e.pulses[k]; p.t+=p.sp;
      if(p.t>=1){
        // pulse arrives: boost target activation + set short refractory
        B.a=Math.min(1,B.a+0.14+stormLevel*0.10);
        B.refract=10+Math.round(rnd(0,8));
        e.pulses.splice(k,1);
        continue;
      }
      const x=lerp(A.x,B.x,p.t), y=lerp(A.y,B.y,p.t);
      // heat color: teal -> orange -> white as storm rises
      let pCol;
      if(stormLevel>0.65) pCol=STYLE.netPeak;
      else if(stormLevel>0.30) pCol=STYLE.netHot;
      else pCol=STYLE.netInk;
      const psz=1.5+stormLevel*1.2;
      bloomPulse(x,y,pCol,0.82,psz);
    }
  }

  // nodes with layered glow halos
  for(let l=0;l<nodes.length;l++){
    for(const n of nodes[l]){
      const r=4+n.a*9+stormLevel*3;
      // smooth cool->warm color via activation + storm blend
      const hotMix=clamp(n.a*1.3+stormLevel*0.55,0,1);
      let col;
      if(hotMix>0.80) col=STYLE.netPeak;
      else if(hotMix>0.42) col=STYLE.netHot;
      else col=STYLE.netInk;
      bloomNode(n.x,n.y,r,col,0.26+n.a*0.55+stormLevel*0.18);
      // bright core dot
      nctx.save(); nctx.globalCompositeOperation='lighter';
      nctx.fillStyle=hexA('#ffffff',0.16+n.a*0.65);
      nctx.beginPath(); nctx.arc(n.x,n.y,1.4+n.a*2,0,TAU); nctx.fill();
      nctx.restore();
    }
  }

  // labels and header — source-over so they stay readable
  nctx.globalCompositeOperation='source-over';
  nctx.fillStyle=hexA(STYLE.netInk,0.45);
  nctx.font="9px ui-monospace, 'Courier New', monospace";
  const labs=['density','speed','threat','sep','align','cohere'];
  nctx.textAlign='right';
  for(let i=0;i<LAYERS[0];i++) nctx.fillText(labs[i],nodes[0][i].x-9,nodes[0][i].y+3);
  const out=['turn','flee','throttle'];
  nctx.textAlign='left';
  for(let i=0;i<LAYERS[2];i++) nctx.fillText(out[i],nodes[2][i].x+9,nodes[2][i].y+3);
  nctx.textAlign='center';
  nctx.fillStyle=hexA(STYLE.netInk,0.60);
  nctx.fillText('boid #'+selected+' — neural activity',W/2,14);
}

// ============================================================ interaction (orbit + tap-select + pinch)
let dragging=false,lastX=0,lastY=0,downX=0,downY=0,moved=false;
const ptrs=new Map(); let pinchD=0;
cnv.addEventListener('pointerdown',e=>{ ptrs.set(e.pointerId,[e.clientX,e.clientY]);
  if(ptrs.size===1){ dragging=true; lastX=e.clientX; lastY=e.clientY; downX=e.clientX; downY=e.clientY; moved=false; }
  else if(ptrs.size===2){ const v=[...ptrs.values()]; pinchD=Math.hypot(v[0][0]-v[1][0],v[0][1]-v[1][1]); } });
addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId)) return; ptrs.set(e.pointerId,[e.clientX,e.clientY]);
  if(ptrs.size===2){ const v=[...ptrs.values()]; const d=Math.hypot(v[0][0]-v[1][0],v[0][1]-v[1][1]);
    if(pinchD) camDist=clamp(camDist*(pinchD/d),18,80); pinchD=d; return; }
  if(dragging){ const dx=e.clientX-lastX, dy=e.clientY-lastY;
    if(Math.hypot(e.clientX-downX,e.clientY-downY)>6) moved=true;
    yawV+=-dx*0.0012; pitchV+=dy*0.0012; lastX=e.clientX; lastY=e.clientY; } });
function endPtr(e){ ptrs.delete(e.pointerId);
  if(ptrs.size<2) pinchD=0;
  if(ptrs.size===0){ dragging=false;
    if(!moved && e.clientY<SCENE_H) pick(e.clientX,e.clientY); } }
addEventListener('pointerup',endPtr); addEventListener('pointercancel',endPtr);
cnv.addEventListener('wheel',e=>{ e.preventDefault(); camDist=clamp(camDist*(1+Math.sign(e.deltaY)*0.08),18,80); },{passive:false});
function pick(mx,my){ let best=-1,bd=1e9;
  for(let i=0;i<N;i++){ const b=boids[i]; if(b.sz>1e8) continue;
    const d=Math.hypot(b.sx-mx,b.sy-my); if(d<40&&d<bd){bd=d;best=i;} }
  if(best>=0) selected=best; }

// ============================================================ loop
function frame(now){
  updateCamera(now); stepBoids();
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.globalCompositeOperation='source-over';
  // modest fade-trail alpha — keeps motion readable without bright streaks
  ctx.fillStyle=`rgba(${STYLE.bg[0]},${STYLE.bg[1]},${STYLE.bg[2]},0.28)`; ctx.fillRect(0,0,W,SCENE_H);
  drawWorld(now); flush();
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,SCENE_H);
  netForward(); drawNet();
  requestAnimationFrame(frame);
}
resize(); requestAnimationFrame(frame);
</script>
</body>
