<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14130f">
<title>JBrain — Ghost Ink</title>
<style>
  html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#14130f; }
  #c { display:block; width:100vw; height:100vh; }
  #net { position:fixed; right:0; bottom:0; pointer-events:none; mix-blend-mode:normal; opacity:.50; }
  #panel {
    position:fixed; left:16px; top:16px; z-index:10;
    font:11px/1.5 'Courier New', ui-monospace, monospace;
    color:#ece9e0; letter-spacing:.4px;
    background:rgba(20,19,15,.82); border:1px solid rgba(236,233,224,.18);
    border-radius:10px; padding:12px 14px 10px;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    transition:opacity .6s; user-select:none; max-width:230px;
  }
  body.idle #panel { opacity:0; pointer-events:none; }
  #panel .ttl { color:#ece9e0; font-weight:bold; margin-bottom:6px; font-size:13px; }
  #panel .ttl span { color:#8a8070; font-weight:normal; font-size:10px; }
  #panel .lbl { color:#d9402a; font-size:10px; margin:8px 0 3px; }
  #panel .hint { color:#6e6a5e; }
  #brand { position:fixed; left:0; right:0; bottom:18px; z-index:10; text-align:center;
    font:600 12px/1 'Courier New', ui-monospace, monospace; letter-spacing:3px;
    color:rgba(236,233,224,.38); transition:opacity .6s; }
  body.idle #brand { opacity:.18; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="net"></canvas>
<div id="panel">
  <div class="ttl">JBRAIN <span>// ghost ink</span></div>
  <div class="hint">a flock of boids. one mind made visible.</div>
  <div class="lbl">SELECTED &middot; <span id="selId">#0</span></div>
  <div class="hint">click any boid to read its brain</div>
  <div class="lbl">CONTROLS</div>
  <div class="hint">drag orbit &middot; scroll zoom &middot; H hide ui</div>
</div>
<div id="brand">J B R A I N</div>

<script>
"use strict";
/* ============================================================ shared engine
   Pure-canvas software 3D renderer — Ghost Ink style:
   sumi-e / ink-on-paper aesthetic. Monochrome off-white strokes on deep
   charcoal, vermilion predator, ghosting brush-trails. No dependencies. */

// ---- style knobs ----
const STYLE = {
  bg:[20,19,15],
  fog0:34, fog1:120,
  inkR:236, inkG:233, inkB:224,   // off-white ink color
  predR:217, predG:64, predB:42,  // vermilion #d9402a
  glow:false,
};

const cnv = document.getElementById('c');
const ctx = cnv.getContext('2d');
let W=0,H=0,focal=1,cx=0,cyc=0,DPR=1,vig=null,grain=null;
function resize(){
  DPR = Math.min(1.75, window.devicePixelRatio||1);
  W = innerWidth; H = innerHeight;
  cnv.width = W*DPR; cnv.height = H*DPR;
  cnv.style.width=W+'px'; cnv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  focal = H*1.05; cx=W/2; cyc=H/2;
  // Dark vignette from edges inward — deepens the ink-on-paper feel
  vig = ctx.createRadialGradient(cx,cyc,Math.min(W,H)*0.28, cx,cyc,Math.max(W,H)*0.82);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.70)');
  buildGrain();
  sizeNet();
}
addEventListener('resize',resize);

// Paper-grain vignette: subtle noise stamped once per resize
function buildGrain(){
  const gc=document.createElement('canvas');
  gc.width=W; gc.height=H;
  const gx=gc.getContext('2d');
  const id=gx.createImageData(W,H);
  const d=id.data;
  // Very sparse, very faint grain — just enough to break the flat fill
  for(let i=0;i<d.length;i+=4){
    const v=Math.random()<0.18 ? (Math.random()*18|0) : 0;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=v ? 20 : 0;
  }
  gx.putImageData(id,0,0);
  // Radial mask so grain is stronger at edges
  const mask=gx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.22, W/2,H/2,Math.max(W,H)*0.72);
  mask.addColorStop(0,'rgba(0,0,0,0.0)');
  mask.addColorStop(1,'rgba(0,0,0,0.72)');
  gx.fillStyle=mask; gx.fillRect(0,0,W,H);
  grain=gc;
}

// ---- vec ----
const TAU=Math.PI*2;
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const add=(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
const scl=(a,s)=>[a[0]*s,a[1]*s,a[2]*s];
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const len=a=>Math.hypot(a[0],a[1],a[2]);
const norm=a=>{const l=len(a)||1;return [a[0]/l,a[1]/l,a[2]/l];};
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

// ---- camera (orbit) ----
const cam={pos:[0,0,60],f:[0,0,-1],r:[1,0,0],u:[0,1,0]};
let camYaw=0.6, camPitch=0.25, camDist=58, yawV=0, pitchV=0;
function updateCamera(t){
  camYaw += yawV; camPitch += pitchV; yawV*=0.9; pitchV*=0.9;
  if(!dragging) camYaw += 0.0012;
  camPitch = clamp(camPitch,-1.2,1.2);
  const cp=Math.cos(camPitch), sp=Math.sin(camPitch);
  const tgt=[0,0,0];
  cam.pos=[Math.sin(camYaw)*cp*camDist, sp*camDist + Math.sin(t*0.0003)*3, Math.cos(camYaw)*cp*camDist];
  const f=norm(sub(tgt,cam.pos));
  const r=norm(cross(f,[0,1,0]));
  cam.f=f; cam.r=r; cam.u=cross(r,f);
}
function project(p){
  const d=sub(p,cam.pos);
  const z=dot(d,cam.f);
  if(z<=0.05) return {vis:false};
  const x=dot(d,cam.r), y=dot(d,cam.u);
  const inv=focal/z;
  return {x:cx+x*inv, y:cyc-y*inv, z, inv, vis:true};
}
function fogAt(z){ return clamp(1-(z-STYLE.fog0)/(STYLE.fog1-STYLE.fog0),0,1); }

// ---- render list (painter) ----
const RL=[];
const LIGHT=norm([0.4,0.85,0.35]);

// inkRGBA: returns an rgba string for the monochrome ink at a given alpha,
// optionally tinted with vermilion (tint 0=pure ink, 1=pure vermilion)
function inkRGBA(a, tint){
  if(tint && tint>0){
    const t=clamp(tint,0,1);
    const r=Math.round(lerp(STYLE.inkR, STYLE.predR, t));
    const g=Math.round(lerp(STYLE.inkG, STYLE.predG, t));
    const b=Math.round(lerp(STYLE.inkB, STYLE.predB, t));
    return `rgba(${r},${g},${b},${a})`;
  }
  return `rgba(${STYLE.inkR},${STYLE.inkG},${STYLE.inkB},${a})`;
}
function predRGBA(a){ return `rgba(${STYLE.predR},${STYLE.predG},${STYLE.predB},${a})`; }

// Slight line-width variation for hand-drawn feel: vary by a seeded offset
// stored per-face. We approximate by using depth as a seed proxy.
function strokeW(base, depthJitter){
  return base + (((depthJitter * 137.5) % 1) - 0.5) * base * 0.35;
}

function pushMesh(mesh, pos, basis, scale, baseAlpha, edgeAlpha, edgeW, isPred, isSel){
  const [R,U,F]=basis;
  const wv=mesh.v.map(p=>{
    const wx=pos[0]+R[0]*p[0]*scale+U[0]*p[1]*scale+F[0]*p[2]*scale;
    const wy=pos[1]+R[1]*p[0]*scale+U[1]*p[1]*scale+F[1]*p[2]*scale;
    const wz=pos[2]+R[2]*p[0]*scale+U[2]*p[1]*scale+F[2]*p[2]*scale;
    return [wx,wy,wz];
  });
  const pj=wv.map(project);
  for(const fc of mesh.f){
    const a=pj[fc[0]],b=pj[fc[1]],c=pj[fc[2]];
    if(!a.vis||!b.vis||!c.vis) continue;
    const depth=(a.z+b.z+c.z)/3, fog=fogAt(depth);
    if(fog<0.02) continue;
    const n=norm(cross(sub(wv[fc[1]],wv[fc[0]]),sub(wv[fc[2]],wv[fc[0]])));
    const shade=0.30+0.70*clamp(dot(n,LIGHT),0,1);
    RL.push({
      t:'tri', pts:[a,b,c], depth, fog,
      shade, baseAlpha, edgeAlpha, edgeW, isPred, isSel,
      // small jitter seed for line-width variation
      jitter: (depth * 0.017) % 1,
    });
  }
}

function pushLine(p,q, alpha, w, isPred){
  const A=project(p),B=project(q); if(!A.vis||!B.vis) return;
  const depth=(A.z+B.z)/2, fog=fogAt(depth); if(fog<0.02) return;
  RL.push({t:'line',x1:A.x,y1:A.y,x2:B.x,y2:B.y,depth,a:alpha*fog,w,isPred:isPred||false});
}

function pushPoint(p,r, alpha, isPred, isSel){
  const P=project(p); if(!P.vis) return; const fog=fogAt(P.z); if(fog<0.04) return;
  RL.push({t:'pt',x:P.x,y:P.y,r:Math.max(0.8,r*P.inv),depth:P.z,a:alpha*fog,isPred,isSel});
}

function flush(){
  RL.sort((a,b)=>b.depth-a.depth);
  ctx.lineJoin='round'; ctx.lineCap='round';
  for(const f of RL){
    if(f.t==='tri'){
      ctx.beginPath();
      ctx.moveTo(f.pts[0].x,f.pts[0].y);
      ctx.lineTo(f.pts[1].x,f.pts[1].y);
      ctx.lineTo(f.pts[2].x,f.pts[2].y);
      ctx.closePath();
      // Very faint fill — the strokes dominate (ink-brush aesthetic)
      const fillA = f.baseAlpha * f.fog * f.shade;
      if(f.isPred){
        ctx.fillStyle = predRGBA(fillA * 0.18);
      } else if(f.isSel){
        // Selected boid picks up a faint vermilion tint
        ctx.fillStyle = inkRGBA(fillA * 0.12, 0.35);
      } else {
        ctx.fillStyle = inkRGBA(fillA * 0.10);
      }
      ctx.fill();
      // Edge stroke — slightly varied line width for hand-drawn feel
      const lw = strokeW(f.edgeW, f.jitter);
      const edgeA = f.edgeAlpha * f.fog * (0.55 + f.shade * 0.45);
      if(f.isPred){
        ctx.strokeStyle = predRGBA(edgeA);
      } else if(f.isSel){
        ctx.strokeStyle = inkRGBA(edgeA, 0.40);
      } else {
        ctx.strokeStyle = inkRGBA(edgeA);
      }
      ctx.lineWidth = lw;
      ctx.stroke();
    } else if(f.t==='line'){
      if(f.isPred){
        ctx.strokeStyle = predRGBA(f.a * 0.7);
      } else {
        ctx.strokeStyle = inkRGBA(f.a);
      }
      ctx.lineWidth=f.w; ctx.beginPath();
      ctx.moveTo(f.x1,f.y1); ctx.lineTo(f.x2,f.y2); ctx.stroke();
    } else {
      // Points: flat ink dot — no additive glow
      ctx.globalCompositeOperation='source-over';
      const r2=f.r*1.8;
      if(f.isPred){
        ctx.fillStyle=predRGBA(f.a * 0.65);
        ctx.beginPath(); ctx.arc(f.x,f.y,r2,0,TAU); ctx.fill();
      } else if(f.isSel){
        // Selected indicator: small vermilion-tinted ring dot
        ctx.strokeStyle=inkRGBA(f.a * 0.75, 0.55);
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(f.x,f.y,r2,0,TAU); ctx.stroke();
      } else {
        ctx.fillStyle=inkRGBA(f.a * 0.50);
        ctx.beginPath(); ctx.arc(f.x,f.y,r2,0,TAU); ctx.fill();
      }
    }
  }
  RL.length=0;
}

// ---- geometry: a chunky low-poly fish facing +z ----
function fishMesh(){
  const v=[
    [0,0,1.15],
    [0.32,0,0.1],
    [-0.32,0,0.1],
    [0,0.34,0.1],
    [0,-0.30,0.1],
    [0,0,-0.85],
    [0,0.55,-1.2],
    [0,-0.5,-1.2],
    [0,0.62,-0.2],
  ];
  const f=[
    [0,3,1],[0,1,4],[0,4,2],[0,2,3],
    [3,5,1],[1,5,4],[4,5,2],[2,5,3],
    [5,6,7],
    [3,8,5],
  ];
  return {v,f};
}
const FISH=fishMesh();

function predMesh(){
  const v=[
    [0,0,1.8],[0.55,0,0.0],[-0.55,0,0.0],[0,0.55,0.0],[0,-0.5,0.0],
    [0,0,-1.5],[0,0.95,-2.1],[0,-0.85,-2.1],[0,1.0,-0.3],
    [0.3,-0.25,1.2],[-0.3,-0.25,1.2],
  ];
  const f=[
    [0,3,1],[0,1,4],[0,4,2],[0,2,3],
    [3,5,1],[1,5,4],[4,5,2],[2,5,3],
    [5,6,7],[3,8,5],
    [0,9,1],[0,2,10],
  ];
  return {v,f};
}
const PRED=predMesh();

// ---- boids ----
const BND=27;
const N=120;
const boids=[];
function rnd(a,b){return a+Math.random()*(b-a);}
for(let i=0;i<N;i++){
  boids.push({
    p:[rnd(-BND,BND),rnd(-BND,BND),rnd(-BND,BND)],
    v:[rnd(-1,1),rnd(-1,1),rnd(-1,1)],
    state:{density:0,speed:0,threat:0,sep:0,ali:0,coh:0},
    sx:-1,sy:-1,sz:1e9,
  });
}
const predator={p:[0,0,-40],v:[0,0,1]};

const MAXSPD=0.62, MAXF=0.022;
const R_NEI=7.5, R_SEP=3.2, R_FLEE=12;
function limit(v,m){const l=len(v);return l>m?scl(v,m/l):v;}
function stepBoids(){
  for(const b of boids){
    let sep=[0,0,0],ali=[0,0,0],coh=[0,0,0],cnt=0,scnt=0;
    for(const o of boids){
      if(o===b) continue;
      const d=sub(b.p,o.p), dl=len(d);
      if(dl<R_NEI){ ali=add(ali,o.v); coh=add(coh,o.p); cnt++; }
      if(dl<R_SEP && dl>1e-4){ sep=add(sep,scl(d,1/(dl*dl))); scnt++; }
    }
    let acc=[0,0,0];
    if(scnt){ sep=limit(sub(scl(norm(sep),MAXSPD),b.v),MAXF); acc=add(acc,scl(sep,1.7)); }
    if(cnt){
      ali=limit(sub(scl(norm(ali),MAXSPD),b.v),MAXF); acc=add(acc,scl(ali,1.0));
      coh=sub(scl(coh,1/cnt),b.p); coh=limit(sub(scl(norm(coh),MAXSPD),b.v),MAXF); acc=add(acc,scl(coh,0.9));
    }
    const dp=sub(b.p,predator.p), dpl=len(dp); let threat=0;
    if(dpl<R_FLEE && dpl>1e-3){
      const flee=limit(sub(scl(norm(dp),MAXSPD),b.v),MAXF*3);
      acc=add(acc,scl(flee,3.2*(R_FLEE/Math.max(dpl,1))));
      threat=1-clamp(dpl/R_FLEE,0,1);
    }
    for(let k=0;k<3;k++){
      if(b.p[k]> BND-4) acc[k]-=0.01*(b.p[k]-(BND-4));
      if(b.p[k]<-BND+4) acc[k]-=0.01*(b.p[k]-(-BND+4));
    }
    b.v=limit(add(b.v,acc),MAXSPD);
    if(len(b.v)<0.18) b.v=scl(norm(b.v),0.18);
    b.p=add(b.p,b.v);
    b.state.density=clamp(cnt/12,0,1);
    b.state.speed=clamp(len(b.v)/MAXSPD,0,1);
    b.state.threat=threat;
    b.state.sep=clamp(len(sep)/MAXF,0,1);
    b.state.ali=clamp(len(ali)/MAXF,0,1);
    b.state.coh=clamp(len(coh)/MAXF,0,1);
  }
  let c=[0,0,0]; for(const b of boids) c=add(c,b.p); c=scl(c,1/N);
  const seek=limit(sub(scl(norm(sub(c,predator.p)),MAXSPD*0.92),predator.v),MAXF*1.3);
  predator.v=limit(add(predator.v,seek),MAXSPD*0.92);
  predator.p=add(predator.p,predator.v);
}

function basisFrom(v){
  const F=norm(v);
  let R=cross(F,[0,1,0]); if(len(R)<1e-3) R=[1,0,0]; R=norm(R);
  const U=cross(R,F);
  return [R,U,F];
}

let selected=0;
function drawWorld(t){
  // World cage — very faint ink lines
  const e=BND;
  const corners=[[-e,-e,-e],[e,-e,-e],[e,e,-e],[-e,e,-e],[-e,-e,e],[e,-e,e],[e,e,e],[-e,e,e]];
  const E=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  for(const [a,b] of E) pushLine(corners[a],corners[b], 0.06, 0.7, false);

  // Dust — tiny translucent ink specks
  for(const d of dust){ pushPoint(d,0.5,0.28,false,false); }

  for(let i=0;i<N;i++){
    const b=boids[i];
    const basis=basisFrom(b.v);
    const isSel=i===selected;
    // Ghost ink boids: faint fill, dominant edges, slightly thicker when selected
    pushMesh(FISH, b.p, basis,
      isSel ? 1.5 : 1.0,        // scale
      0.85,                       // baseAlpha (used for fill, kept faint in flush)
      isSel ? 0.72 : 0.48,       // edgeAlpha
      isSel ? 1.6 : 1.15,        // edgeW — slightly thicker than neon-reef
      false, isSel
    );
    const P=project(b.p); if(P.vis){ b.sx=P.x; b.sy=P.y; b.sz=P.z; } else { b.sz=1e9; }
    if(isSel){ pushPoint(b.p, 2.0, 0.80, false, true); }
  }

  // Predator — full vermilion
  const pb=basisFrom(predator.v);
  pushMesh(PRED, predator.p, pb, 2.0, 0.90, 0.85, 1.5, true, false);
  pushPoint(predator.p, 2.6, 0.75, true, false);
}

const dust=[]; for(let i=0;i<90;i++) dust.push([rnd(-BND,BND),rnd(-BND,BND),rnd(-BND,BND)]);

// ============================================================ neural overlay
const net=document.getElementById('net');
const nctx=net.getContext('2d');
let NW=300,NH=240;
function sizeNet(){
  NW=Math.min(340,Math.round(W*0.42)); NH=Math.min(280,Math.round(H*0.42));
  net.width=NW*DPR; net.height=NH*DPR;
  net.style.width=NW+'px'; net.style.height=NH+'px';
  nctx.setTransform(DPR,0,0,DPR,0,0);
  layoutNet();
}
const LAYERS=[6,8,8,3];
let nodes=[],edges=[];
function layoutNet(){
  nodes=[]; edges=[];
  const padX=34,padY=26;
  const gw=(NW-padX*2)/(LAYERS.length-1);
  for(let l=0;l<LAYERS.length;l++){
    const col=[];
    const gh=(NH-padY*2)/Math.max(1,LAYERS[l]-1);
    for(let i=0;i<LAYERS[l];i++){
      col.push({x:padX+l*gw, y:LAYERS[l]===1?NH/2:padY+i*gh, a:0});
    }
    nodes.push(col);
  }
  for(let l=1;l<LAYERS.length;l++){
    for(let i=0;i<LAYERS[l-1];i++) for(let j=0;j<LAYERS[l];j++)
      edges.push({l,i,j,w:rnd(-1,1),pulses:[]});
  }
}
function sig(x){return 1/(1+Math.exp(-x));}
function netForward(){
  const s=boids[selected].state;
  const inp=[s.density,s.speed,s.threat,s.sep,s.ali,s.coh];
  for(let i=0;i<LAYERS[0];i++) nodes[0][i].a=lerp(nodes[0][i].a,inp[i],0.2);
  for(let l=1;l<LAYERS.length;l++){
    for(let j=0;j<LAYERS[l];j++){
      let sum=-0.4;
      for(const e of edges) if(e.l===l && e.j===j) sum+=nodes[l-1][e.i].a*e.w*0.9;
      const tgt=sig(sum*2.2);
      nodes[l][j].a=lerp(nodes[l][j].a,tgt,0.18);
    }
  }
  // Stochastic pulse emission from active nodes
  for(const e of edges){
    const src=nodes[e.l-1][e.i];
    if(src.a>0.4 && Math.random()<src.a*0.10){
      e.pulses.push({t:0,sp:rnd(0.02,0.05)});
    }
  }
}

// Net ink colors — monochrome, matching the main ink palette
const NET_INK = `rgba(${STYLE.inkR},${STYLE.inkG},${STYLE.inkB},`;
const NET_VER = `rgba(${STYLE.predR},${STYLE.predG},${STYLE.predB},`;  // vermilion for hot output nodes

function drawNet(){
  nctx.clearRect(0,0,NW,NH);
  // Normal blend — sits like ink on the scene (not screen/lighter)
  nctx.globalCompositeOperation='source-over';

  // Hairline edges — monochrome ink
  for(const e of edges){
    const A=nodes[e.l-1][e.i], B=nodes[e.l][e.j];
    const act=(A.a+B.a)*0.5;
    nctx.strokeStyle=NET_INK+(0.04+act*0.20)+')';
    nctx.lineWidth=0.5+act*0.8;        // thin hairlines
    nctx.beginPath(); nctx.moveTo(A.x,A.y); nctx.lineTo(B.x,B.y); nctx.stroke();

    // Pulses: small ink dots traveling along edges
    for(let k=e.pulses.length-1;k>=0;k--){
      const p=e.pulses[k]; p.t+=p.sp;
      if(p.t>=1){ B.a=Math.min(1,B.a+0.12); e.pulses.splice(k,1); continue; }
      const x=lerp(A.x,B.x,p.t), y=lerp(A.y,B.y,p.t);
      // Hot output layer gets a vermilion pulse dot; rest are ink-white
      const isHot = (e.l===LAYERS.length-1) && B.a>0.6;
      nctx.fillStyle = isHot ? NET_VER+'0.75)' : NET_INK+'0.70)';
      nctx.beginPath(); nctx.arc(x,y,1.5,0,TAU); nctx.fill();
    }
  }

  // Nodes: hollow ring (stroke circle) — no gradient blobs, no glow
  for(let l=0;l<nodes.length;l++){
    const isOut = l===LAYERS.length-1;
    for(const nd of nodes[l]){
      const r=3.5+nd.a*7;
      // Thin outer ring
      nctx.lineWidth=0.8+nd.a*0.8;
      const hot = isOut && nd.a>0.55;
      nctx.strokeStyle = hot ? NET_VER+(0.30+nd.a*0.65)+')' : NET_INK+(0.22+nd.a*0.60)+')';
      nctx.beginPath(); nctx.arc(nd.x,nd.y,r,0,TAU); nctx.stroke();
      // Tiny solid center dot — activation indicator
      nctx.fillStyle = hot ? NET_VER+(0.45+nd.a*0.50)+')' : NET_INK+(0.30+nd.a*0.55)+')';
      nctx.beginPath(); nctx.arc(nd.x,nd.y,1.2+nd.a*1.0,0,TAU); nctx.fill();
    }
  }

  // Labels — monochrome ink at low opacity
  nctx.fillStyle=NET_INK+'0.45)';
  nctx.font="9px 'Courier New', monospace";
  const labs=['density','speed','threat','sep','align','cohere'];
  for(let i=0;i<LAYERS[0];i++) nctx.fillText(labs[i],4,nodes[0][i].y+3);
  const out=['turn','flee','throttle'];
  for(let i=0;i<LAYERS[3];i++){ const nd=nodes[3][i]; nctx.fillText(out[i],nd.x+8,nd.y+3); }
}

// ============================================================ interaction
let dragging=false,lastX=0,lastY=0;
cnv.addEventListener('pointerdown',e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; pokeIdle(); pickStart=[e.clientX,e.clientY]; });
addEventListener('pointermove',e=>{
  pokeIdle();
  if(dragging){ yawV+= -(e.clientX-lastX)*0.0010; pitchV+= (e.clientY-lastY)*0.0010; lastX=e.clientX; lastY=e.clientY; }
});
let pickStart=null;
addEventListener('pointerup',e=>{
  dragging=false;
  if(pickStart && Math.hypot(e.clientX-pickStart[0],e.clientY-pickStart[1])<6) pick(e.clientX,e.clientY);
  pickStart=null;
});
cnv.addEventListener('wheel',e=>{ e.preventDefault(); camDist=clamp(camDist*(1+Math.sign(e.deltaY)*0.08),22,110); pokeIdle(); },{passive:false});
function pick(mx,my){
  let best=-1,bd=1e9;
  for(let i=0;i<N;i++){ const b=boids[i]; if(b.sz>1e8) continue;
    const d=Math.hypot(b.sx-mx,b.sy-my); if(d<26 && d<bd){bd=d;best=i;} }
  if(best>=0){ selected=best; document.getElementById('selId').textContent='#'+best; }
}
let idleTimer=null;
function pokeIdle(){ document.body.classList.remove('idle'); clearTimeout(idleTimer); idleTimer=setTimeout(()=>document.body.classList.add('idle'),4000); }
addEventListener('keydown',e=>{ if(e.key==='h'||e.key==='H') document.body.classList.toggle('idle'); });
pokeIdle();

// ============================================================ main loop
let last=performance.now();
function frame(now){
  const t=now;
  updateCamera(t);
  stepBoids();
  // Ghost-ink fade trail: lower alpha = longer, softer ghosting brush-trails
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=`rgba(${STYLE.bg[0]},${STYLE.bg[1]},${STYLE.bg[2]},0.16)`;
  ctx.fillRect(0,0,W,H);
  drawWorld(t);
  flush();
  // Paper-grain vignette overlay
  if(grain){
    ctx.globalAlpha=0.55;
    ctx.drawImage(grain,0,0,W,H);
    ctx.globalAlpha=1.0;
  }
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  netForward(); drawNet();
  requestAnimationFrame(frame);
}
resize();
requestAnimationFrame(frame);
</script>
