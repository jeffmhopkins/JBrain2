<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#05080a">
<title>JBrain — Microscope / Dark-Field (advanced)</title>
<style>
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; background:#05080a;
    touch-action:manipulation; -webkit-user-select:none; user-select:none; }
  #c{ display:block; position:fixed; inset:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
/* ============ JBrain — advanced microscope amoeba ============
   Real-ish amoeboid locomotion: 2-3 pseudopod lobes that compete and
   retract, fountain-flow cytoplasmic streaming, area conservation, cup
   phagocytosis, a contractile vacuole. Driven by a 17-node controller
   brain (8 in -> 4 hidden -> 5 out) shown as a calm full-width dock.
   Tap a neuron to fire it (it acts on the amoeba); tap the slide to drop
   food. Vanilla canvas 2D, no libraries. Dark-field aesthetic. */

const S = {
  bg:'#05080a',
  gelInner:'rgba(60,150,128,0.26)', gelOuter:'rgba(30,90,80,0.08)',
  granule:'#9ff0d2', membrane:'#9ff0d2', glow:'#3fe7c4',
  nucleus:'#bafff0', vacuole:'rgba(180,255,235,0.5)',
  food:'#7fe0d8', foodGlow:'#3ad6c8',
  vignette:0.40,
  inInk:'#5fbfe6', hidInk:'#5fe6c8', outInk:'#ffd27f',
  netHot:'#ffe6a8', netDim:'rgba(120,230,205,0.10)', netPanel:'rgba(4,12,12,0.34)',
};

const cnv=document.getElementById('c'), ctx=cnv.getContext('2d');
let W=0,H=0,DPR=1;
let furniture=null, gelSpr=null, glowAmoeba=null, glowFood=null, glowInk=null, glowHot=null, foodSpr=null;

function mkCanvas(w,h){ const c=document.createElement('canvas'); c.width=Math.max(1,Math.ceil(w)); c.height=Math.max(1,Math.ceil(h)); return c; }
function hexA(hex,a){ if(hex[0]!=='#') return hex; const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function mkGlow(color,size){ const c=mkCanvas(size,size),g=c.getContext('2d'),r=size/2;
  const grd=g.createRadialGradient(r,r,0,r,r,r);
  grd.addColorStop(0,hexA(color,0.9)); grd.addColorStop(0.5,hexA(color,0.32)); grd.addColorStop(1,hexA(color,0));
  g.fillStyle=grd; g.beginPath(); g.arc(r,r,r,0,7); g.fill(); return c; }

const TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const sig=x=>1/(1+Math.exp(-x));
const angDiff=(a,b)=>{ let d=Math.abs(a-b); return Math.min(d,TAU-d); };

// ---------------- amoeba state ----------------
const NP=16, MAXR=120;
const AMO={ x:0,y:0, r:62, hunger:0.5, energy:0.7, vacFill:0.2, dir:0, drift:0,
  pseudo:new Float32Array(NP), rOff:new Float32Array(NP), phase:[], nucX:0,nucY:0,
  inject:[0,0,0,0], injDX:0, injDY:0, lunge:0, commitBoost:0, eatForce:0 };
for(let i=0;i<NP;i++) AMO.phase[i]=Math.random()*1000;

// candidate pseudopod lobes anchored at 4 cardinal arcs (match chemo sensors)
const ARCS=[ {ang:-Math.PI/2}, {ang:0}, {ang:Math.PI/2}, {ang:Math.PI} ]; // N,E,S,W
const lobes=ARCS.map(a=>({ang:a.ang, base:a.ang, score:0, win:0, ext:0, noise:Math.random()*1000}));
let vacuoles=[];

// streaming granules (live, in amoeba-local coords)
const GRAN=[]; const GRAN_N=80;
for(let i=0;i<GRAN_N;i++){ const a=Math.random()*TAU, rr=Math.sqrt(Math.random())*AMO.r*0.8;
  GRAN.push({x:Math.cos(a)*rr,y:Math.sin(a)*rr,s:0.6+Math.random()*1.5,al:0.10+Math.random()*0.26}); }

// ---------------- food ----------------
let food=[]; const SENSE=250; let respawn=0;
function spawnFood(x,y){
  if(food.length>=4) food.shift();
  const m=20+Math.random()*20;
  if(x===undefined){ const a=Math.random()*TAU, rad=Math.min(W,H)*(0.18+Math.random()*0.16); x=W/2+Math.cos(a)*rad; y=fieldCY()+Math.sin(a)*rad; }
  food.push({x,y,r:m*0.5,scale:m/30,jx:Math.random()*9,jy:Math.random()*9,eat:0});
}
function fieldCY(){ return H*0.40; }

// ---------------- 17-node brain ----------------
function mkN(id,band){ return {id,band,a:0,hold:0,pulse:0,x:0,y:0}; }
const IN =[mkN('chemoN','in'),mkN('chemoE','in'),mkN('chemoS','in'),mkN('chemoW','in'),
           mkN('hunger','in'),mkN('energy','in'),mkN('vacFill','in'),mkN('edgeProx','in')];
const HID=[mkN('dirX','hid'),mkN('dirY','hid'),mkN('arousal','hid'),mkN('visceral','hid')];
const OUT=[mkN('driveX','out'),mkN('driveY','out'),mkN('commit','out'),mkN('engulf','out'),mkN('expel','out')];
const ALL=[...IN,...HID,...OUT];
const byId={}; for(const n of ALL) byId[n.id]=n;
function E(a,b){ return {A:byId[a],B:byId[b],p:[]}; }
const EDGES=[ E('chemoE','dirX'),E('chemoW','dirX'),E('chemoN','dirY'),E('chemoS','dirY'),
  E('hunger','arousal'),E('energy','arousal'),E('vacFill','visceral'),E('edgeProx','visceral'),
  E('dirX','driveX'),E('dirY','driveY'),E('arousal','driveX'),E('arousal','commit'),
  E('commit','engulf'),E('visceral','expel') ];

let netBox={x:0,y:0,w:0,h:0};
function layoutNet(){
  const PH=Math.min(300,H*0.42), pad=8;
  netBox={x:pad,y:H-PH-pad,w:W-pad*2,h:PH};
  const x=netBox.x,y=netBox.y,w=netBox.w,h=netBox.h;
  const inX=x+34, hidX=x+w*0.5, outX=x+w-34;
  const colY=(n,c,top,bot)=>c<2?(top+bot)/2:top+(bot-top)*(n/(c-1));
  for(let i=0;i<8;i++){ IN[i].x=inX;  IN[i].y=colY(i,8,y+24,y+h-24); }
  for(let i=0;i<4;i++){ HID[i].x=hidX; HID[i].y=colY(i,4,y+h*0.30,y+h*0.70); }
  for(let i=0;i<5;i++){ OUT[i].x=outX; OUT[i].y=colY(i,5,y+30,y+h-30); }
}

function chemo(arcAng){
  let s=0; for(const fd of food){ if(fd.eat>0) continue;
    const a=Math.atan2(fd.y-AMO.y,fd.x-AMO.x); const lobe=Math.max(0,Math.cos(angDiff(a,arcAng)));
    const dist=Math.hypot(fd.x-AMO.x,fd.y-AMO.y); s+=lobe*lobe*(1-Math.min(1,dist/SENSE)); }
  return Math.min(1,s);
}
function ease(n,v,dt){ if(n.hold>0){ n.a=1; n.hold-=dt; } else n.a+=(v-n.a)*Math.min(1,dt*5); }

let sig_dirX=0, sig_dirY=0;
function netStep(dt){
  // inputs (+ tap injections that decay)
  const cN=clamp(chemo(-Math.PI/2)+AMO.inject[0],0,1), cE=clamp(chemo(0)+AMO.inject[1],0,1),
        cS=clamp(chemo(Math.PI/2)+AMO.inject[2],0,1), cW=clamp(chemo(Math.PI)+AMO.inject[3],0,1);
  for(let i=0;i<4;i++) AMO.inject[i]*=Math.max(0,1-dt*1.2);
  const dc=Math.hypot(AMO.x-W/2,AMO.y-fieldCY()), fr=Math.min(W,H)*0.40;
  const edgeProx=clamp((dc-(fr-60))/60,0,1);
  ease(IN[0],cN,dt); ease(IN[1],cE,dt); ease(IN[2],cS,dt); ease(IN[3],cW,dt);
  ease(IN[4],AMO.hunger,dt); ease(IN[5],AMO.energy,dt); ease(IN[6],AMO.vacFill,dt); ease(IN[7],edgeProx,dt);
  // hidden
  sig_dirX=Math.tanh((IN[1].a-IN[3].a)*2.2); sig_dirY=Math.tanh((IN[2].a-IN[0].a)*2.2);
  const maxChemo=Math.max(IN[0].a,IN[1].a,IN[2].a,IN[3].a);
  ease(HID[0],0.5+0.5*sig_dirX,dt); ease(HID[1],0.5+0.5*sig_dirY,dt);
  ease(HID[2],sig((IN[4].a*1.2+maxChemo*1.5-IN[5].a*0.7-0.5)*2.4),dt);
  ease(HID[3],sig((IN[6].a*1.6+IN[7].a*1.5-0.9)*2.6),dt);
  const arousal=HID[2].a, visceral=HID[3].a;
  // outputs
  ease(OUT[0],0.5+0.5*Math.tanh((sig_dirX+AMO.injDX)*(0.4+arousal*1.7)),dt);
  ease(OUT[1],0.5+0.5*Math.tanh((sig_dirY+AMO.injDY)*(0.4+arousal*1.7)),dt);
  ease(OUT[2],clamp(sig((arousal*1.4+maxChemo-0.7)*2.5)+AMO.commitBoost,0,1),dt);
  ease(OUT[3],sig((OUT[2].a*1.3+maxChemo-1.0)*3),dt);
  ease(OUT[4],sig((visceral*1.5+IN[6].a*1.4-1.4)*3),dt);
  AMO.injDX*=Math.max(0,1-dt*0.8); AMO.injDY*=Math.max(0,1-dt*0.8); AMO.commitBoost*=Math.max(0,1-dt*1.5);
  // sparse pulses (cap 6)
  let live=0; for(const e of EDGES) live+=e.p.length;
  for(const e of EDGES){ if(e.A.a>0.5 && live<6 && Math.random()<e.A.a*0.02*dt*60){ e.p.push(0); live++; }
    for(let k=e.p.length-1;k>=0;k--){ e.p[k]+=dt*2.4;
      if(e.p[k]>=1){ e.B.a=Math.min(1,e.B.a+0.12); if(e.B.hold<0.08)e.B.hold=0.08; e.p.splice(k,1); } } }
}

function fireNode(n){
  n.a=1; n.hold=0.5; n.pulse=1;
  for(const e of EDGES) if(e.A===n && e.p.length<6) e.p.push(0);
  switch(n.id){
    case 'chemoN': AMO.inject[0]=1; break; case 'chemoE': AMO.inject[1]=1; break;
    case 'chemoS': AMO.inject[2]=1; break; case 'chemoW': AMO.inject[3]=1; break;
    case 'hunger': AMO.hunger=1; break;
    case 'energy': AMO.energy=1; AMO.lunge=1; break;
    case 'vacFill': AMO.vacFill=1; break;
    case 'driveX': AMO.injDX=(sig_dirX>=0?1:-1)*1.4; AMO.lunge=0.6; break;
    case 'driveY': AMO.injDY=1.4; AMO.lunge=0.6; break;
    case 'commit': AMO.commitBoost=1; break;
    case 'engulf': AMO.eatForce=1; break;
    case 'expel': forceExpel(); break;
  }
}
function forceExpel(){
  vacuoles.push({ax:Math.cos(AMO.dir+Math.PI)*AMO.r*0.6, ay:Math.sin(AMO.dir+Math.PI)*AMO.r*0.6,
    r:11, color:S.vacuole, life:1, expel:Math.cos(AMO.dir+Math.PI), expey:Math.sin(AMO.dir+Math.PI)});
  AMO.vacFill=0;
}

// ---------------- membrane ----------------
function membranePts(t){
  const pts=[];
  for(let i=0;i<NP;i++){ const a=(i/NP)*TAU;
    const n=0.6*Math.sin(a*2+t*0.20+AMO.phase[i])+0.3*Math.sin(a*3-t*0.13+AMO.phase[i]*1.7)+0.1*Math.sin(a*5+t*0.31);
    // leading-edge ruffle only where extended
    const ruffle=AMO.pseudo[i]>4 ? 0.04*AMO.r*Math.sin(a*9+t*4) : 0;
    const r=AMO.r*(1+0.06*n)+AMO.pseudo[i]+AMO.rOff[i]+ruffle;
    pts.push({x:AMO.x+Math.cos(a)*r, y:AMO.y+Math.sin(a)*r}); }
  return pts;
}
function pathClosed(c,p){ const n=p.length; c.beginPath(); c.moveTo(p[0].x,p[0].y);
  for(let i=0;i<n;i++){ const p0=p[(i-1+n)%n],p1=p[i],p2=p[(i+1)%n],p3=p[(i+2)%n];
    c.bezierCurveTo(p1.x+(p2.x-p0.x)/6,p1.y+(p2.y-p0.y)/6,p2.x-(p3.x-p1.x)/6,p2.y-(p3.y-p1.y)/6,p2.x,p2.y); }
  c.closePath(); }

// ---------------- simulation ----------------
let winAng=0, winMag=0, winLobe=null, nearest=null, nearD=1e9, nearAng=0;
function step(dt){
  AMO.hunger=Math.min(1,AMO.hunger+dt*0.022);
  AMO.lunge=Math.max(0,AMO.lunge-dt*0.7);
  AMO.vacFill=Math.min(1,AMO.vacFill+dt*0.05);
  respawn-=dt; if(food.length<2 && respawn<=0){ spawnFood(); respawn=5+Math.random()*3; }

  // nearest food
  nearest=null; nearD=1e9;
  for(const fd of food){ if(fd.eat>0) continue; const d=Math.hypot(fd.x-AMO.x,fd.y-AMO.y); if(d<nearD){nearD=d;nearest=fd;} }
  if(nearest) nearAng=Math.atan2(nearest.y-AMO.y,nearest.x-AMO.x);

  netStep(dt);

  // drive vector from net outputs
  const dvx=OUT[0].a*2-1, dvy=OUT[1].a*2-1;
  const driveAng=Math.atan2(dvy,dvx), driveMag=Math.min(1.2,Math.hypot(dvx,dvy));
  const maxChemo=Math.max(IN[0].a,IN[1].a,IN[2].a,IN[3].a);
  const sensing = !!nearest && nearD<SENSE;
  AMO.drift+=dt;

  // competing lobes — each STEERS its heading: the winner swings to face food,
  // the others wander from their base angle. Winner reaches a long finger.
  for(const lb of lobes){
    const aim = sensing ? nearAng : lb.base + Math.sin(AMO.drift*0.3+lb.noise)*1.0;
    let da=aim-lb.ang; da=Math.atan2(Math.sin(da),Math.cos(da));
    lb.ang += da*Math.min(1, dt*(lb.win>0.4?2.0:0.5));
    let tgt = chemo(lb.ang)*1.4;
    if(sensing){ const al=Math.max(0,Math.cos(angDiff(lb.ang,nearAng))); tgt += al*al*1.4; }
    else tgt += 0.35*(0.5+0.5*Math.sin(AMO.drift*0.22+lb.noise));   // exploratory drive
    lb.score += (tgt-lb.score)*Math.min(1,dt*2);
  }
  const sharp=2.6+OUT[2].a*5;
  let tot=0; for(const lb of lobes) tot+=Math.exp(lb.score*sharp);
  winMag=0; winLobe=lobes[0];
  for(const lb of lobes){ lb.win=Math.exp(lb.score*sharp)/tot;
    // LONG tendrils: the winner stretches a finger toward prey (longer when farther)
    const reach = sensing ? clamp(nearD*0.95, AMO.r*1.0, AMO.r*2.4) : AMO.r*0.85;
    const target=(lb.win>0.2? (lb.win-0.2)/0.8:0)*reach;
    const k=target>lb.ext? dt*2.2:dt*0.9;            // extend faster, retract slow
    lb.ext+=(target-lb.ext)*Math.min(1,k);
    if(lb.win>winMag){ winMag=lb.win; winAng=lb.ang; winLobe=lb; } }

  // write lobes -> pseudo[] as NARROW fingers (tendrils, not bulges)
  for(let i=0;i<NP;i++){ const a=(i/NP)*TAU; let v=0;
    for(const lb of lobes){ const w=Math.max(0,1-angDiff(a,lb.ang)/0.55); v+=lb.ext*w*w; }
    AMO.pseudo[i]+=(v-AMO.pseudo[i])*Math.min(1,dt*1.8); }
  // neighbor tension (Laplacian) — shoulders, propagation
  const src=AMO.pseudo.slice();
  for(let i=0;i<NP;i++){ const a=src[(i-1+NP)%NP],b=src[(i+1)%NP]; AMO.pseudo[i]+=((a+b)/2-src[i])*0.08; }
  // area conservation: deflate where no pseudopod
  let totP=0; for(let i=0;i<NP;i++) totP+=AMO.pseudo[i]; const per=totP/NP;
  for(let i=0;i<NP;i++){ const want=AMO.pseudo[i]<per*0.3? -per*0.5:0; AMO.rOff[i]+=(want-AMO.rOff[i])*Math.min(1,dt*1.0); }

  // locomotion: pursue food steadily when sensing, roam otherwise (+ lunge bursts)
  const moveAng = sensing ? nearAng : winAng;
  const moveSpeed = (sensing ? 28 + AMO.hunger*30 : 16) + AMO.lunge*80;
  AMO.x += Math.cos(moveAng)*moveSpeed*dt;
  AMO.y += Math.sin(moveAng)*moveSpeed*dt;
  AMO.dir=winAng;
  // soft field containment
  const fcx=W/2,fcy=fieldCY(),fr=Math.min(W,H)*0.46, dcx=Math.hypot(AMO.x-fcx,AMO.y-fcy);
  if(dcx>fr){ AMO.x+=(fcx-AMO.x)*dt*0.6; AMO.y+=(fcy-AMO.y)*dt*0.6; }
  // energy: spend on motion, calm
  AMO.energy=clamp(AMO.energy-winMag*dt*0.02,0,1);

  // streaming granules toward winner tip
  const fx=Math.cos(winAng),fy=Math.sin(winAng), fm=0.3+winMag;
  for(const g of GRAN){ g.x+=fx*fm*dt*12; g.y+=fy*fm*dt*12; g.x+=-g.y*0.03*dt; g.y+=g.x*0.03*dt;
    if(Math.hypot(g.x,g.y)>AMO.r*0.9){ const back=winAng+Math.PI+(Math.random()-0.5)*0.9, rr=AMO.r*(0.2+Math.random()*0.3);
      g.x=Math.cos(back)*rr; g.y=Math.sin(back)*rr; } }
  // nucleus carried + lagging
  AMO.nucX+=(Math.cos(winAng)*AMO.r*0.12-AMO.nucX)*Math.min(1,dt*0.5);
  AMO.nucY+=(Math.sin(winAng)*AMO.r*0.12-AMO.nucY)*Math.min(1,dt*0.5);

  // engulf: body overlap, a tendril reaching out and grabbing it, or forced
  const grab = sensing && winLobe && angDiff(winLobe.ang,nearAng)<0.5 && nearD < AMO.r*0.7 + winLobe.ext*0.7;
  if(nearest && (nearD<AMO.r*0.95 || grab || (AMO.eatForce>0 && nearD<SENSE) || (OUT[3].a>0.6 && nearD<AMO.r*1.3)))
    nearest.eat=Math.max(nearest.eat,0.001);
  AMO.eatForce=Math.max(0,AMO.eatForce-dt);
  for(const fd of food){ if(fd.eat>0){ fd.eat+=dt/0.8;
    fd.x+=(AMO.x-fd.x)*Math.min(1,dt*2.5); fd.y+=(AMO.y-fd.y)*Math.min(1,dt*2.5);
    if(fd.eat>=1){ vacuoles.push({ax:fd.x-AMO.x,ay:fd.y-AMO.y,r:fd.r*1.1,color:S.vacuole,life:1,expel:0});
      AMO.hunger=Math.max(0,AMO.hunger-0.25); AMO.energy=Math.min(1,AMO.energy+0.3); AMO.r=Math.min(MAXR*0.7,AMO.r*1.01); } } }
  food=food.filter(fd=>fd.eat<1);
  for(const fd of food){ if(fd.eat>0) continue; fd.jx+=dt*1.2; fd.jy+=dt*1.0;
    fd.x+=Math.sin(fd.jx)*7*dt; fd.y+=Math.cos(fd.jy)*7*dt; }

  // auto contractile expel near full
  if(AMO.vacFill>=1) forceExpel();
  for(const v of vacuoles){ if(v.expel){ v.ax+=v.expel*40*dt; v.ay+=(v.expey||0)*40*dt; v.life-=dt*0.7; }
    else { v.life-=dt*0.05; v.r*=(1-dt*0.05); } }
  vacuoles=vacuoles.filter(v=>v.life>0 && v.r>1);

  // first-load hint
  if(!hinted){ hintTimer-=dt; if(hintTimer<=0){ OUT[0].pulse=1; const e=EDGES.find(e=>e.A.id==='dirX'); if(e)e.p.push(0); hinted=true; } }
}

// ---------------- render ----------------
function drawAmoeba(t){
  const pts=membranePts(t);
  const gs=AMO.r*3.0,h=gs/2; ctx.globalAlpha=0.45; ctx.drawImage(glowAmoeba,AMO.x-h,AMO.y-h,gs,gs); ctx.globalAlpha=1;
  ctx.save(); pathClosed(ctx,pts); ctx.clip();
  // gel
  const isz=MAXR*2.4,hh=isz/2; ctx.drawImage(gelSpr,AMO.x-hh,AMO.y-hh,isz,isz);
  // live granules (streaming)
  for(const g of GRAN){ ctx.fillStyle=hexA(S.granule,g.al); ctx.beginPath(); ctx.arc(AMO.x+g.x,AMO.y+g.y,g.s,0,7); ctx.fill(); }
  // vacuoles
  for(const v of vacuoles){ ctx.fillStyle=hexA(S.nucleus,0.10*v.life); ctx.beginPath(); ctx.arc(AMO.x+v.ax,AMO.y+v.ay,v.r,0,7); ctx.fill();
    ctx.strokeStyle=hexA(S.membrane,0.4*v.life); ctx.lineWidth=1; ctx.beginPath(); ctx.arc(AMO.x+v.ax,AMO.y+v.ay,v.r,0,7); ctx.stroke(); }
  // contractile vacuole (rear, fills)
  const cvx=AMO.x+Math.cos(winAng+Math.PI)*AMO.r*0.5, cvy=AMO.y+Math.sin(winAng+Math.PI)*AMO.r*0.5, cvr=3+AMO.vacFill*10;
  ctx.strokeStyle=hexA(S.membrane,0.3); ctx.lineWidth=1; ctx.beginPath(); ctx.arc(cvx,cvy,cvr,0,7); ctx.stroke();
  // nucleus
  const nx=AMO.x+AMO.nucX, ny=AMO.y+AMO.nucY;
  const ng=ctx.createRadialGradient(nx,ny,1,nx,ny,AMO.r*0.32);
  ng.addColorStop(0,hexA(S.nucleus,0.55)); ng.addColorStop(1,hexA(S.nucleus,0));
  ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(nx,ny,AMO.r*0.32,0,7); ctx.fill();
  ctx.restore();
  pathClosed(ctx,pts); ctx.strokeStyle=hexA(S.membrane,0.9); ctx.lineWidth=1.6; ctx.stroke();
}
function drawFood(){
  for(const fd of food){ const sc=(fd.eat>0?(1-fd.eat):1)*fd.scale; if(sc<=0.02) continue;
    const sz=44*sc,h=sz/2, gsz=58*sc;
    ctx.globalAlpha=0.55*(fd.eat>0?(1-fd.eat):1); ctx.drawImage(glowFood,fd.x-gsz/2,fd.y-gsz/2,gsz,gsz);
    ctx.globalAlpha=(fd.eat>0?(1-fd.eat):1); ctx.drawImage(foodSpr,fd.x-h,fd.y-h,sz,sz); ctx.globalAlpha=1; }
}
function edgePath(c,A,B){ const mx=(A.x+B.x)/2,my=(A.y+B.y)/2;
  const bow=(B.x>A.x?-1:1)*Math.min(26,Math.abs(B.y-A.y)*0.18);
  c.beginPath(); c.moveTo(A.x,A.y); c.quadraticCurveTo(mx,my+bow,B.x,B.y); return {mx,my:my+bow}; }
function qpt(A,c,B,p){ const u=1-p; return {x:u*u*A.x+2*u*p*c.mx+p*p*B.x, y:u*u*A.y+2*u*p*c.my+p*p*B.y}; }
function inkOf(n){ return n.band==='in'?S.inInk : n.band==='hid'?S.hidInk : S.outInk; }
function drawNet(){
  ctx.fillStyle=S.netPanel; roundRect(ctx,netBox.x,netBox.y,netBox.w,netBox.h,14); ctx.fill();
  // body->brain tendril (single faint curve)
  ctx.strokeStyle=hexA(S.hidInk,0.08); ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(AMO.x,AMO.y+AMO.r*0.5);
  ctx.quadraticCurveTo(AMO.x,(AMO.y+netBox.y)/2, IN[0].x, IN[0].y-10); ctx.stroke();
  // edges
  for(const e of EDGES){ const act=(e.A.a+e.B.a)*0.5;
    ctx.strokeStyle= act>0.12? hexA(S.hidInk,0.10+act*0.6):S.netDim; ctx.lineWidth=0.8+act*1.4;
    const c=edgePath(ctx,e.A,e.B); ctx.stroke();
    for(const p of e.p){ const q=qpt(e.A,c,e.B,p); ctx.fillStyle=hexA(S.netHot,0.95); ctx.beginPath(); ctx.arc(q.x,q.y,2,0,7); ctx.fill(); } }
  // nodes
  for(const n of ALL){ const col=n.a>0.55? S.netHot:inkOf(n); const spr=n.a>0.55?glowHot:glowInk;
    const gl=26+n.a*20; ctx.globalAlpha=0.25+n.a*0.6; ctx.drawImage(spr,n.x-gl/2,n.y-gl/2,gl,gl); ctx.globalAlpha=1;
    if(n.band==='in'){ ctx.fillStyle=hexA(col,0.5+n.a*0.5); ctx.beginPath(); ctx.arc(n.x,n.y,4+n.a*2,0,7); ctx.fill(); }
    else { ctx.strokeStyle=hexA(col,0.5+n.a*0.5); ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(n.x,n.y,6+n.a*3,0,7); ctx.stroke();
      ctx.fillStyle=hexA(col,0.3+n.a*0.6); ctx.beginPath(); ctx.arc(n.x,n.y,2,0,7); ctx.fill(); }
    if(n.pulse>0.01){ ctx.strokeStyle=hexA(S.netHot,n.pulse*0.8); ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(n.x,n.y,10+(1-n.pulse)*18,0,7); ctx.stroke(); n.pulse*=0.92; } }
}
function roundRect(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

// ---------------- interaction ----------------
let hinted=false, hintTimer=2.0;
cnv.addEventListener('pointerdown',e=>{ const x=e.clientX,y=e.clientY; hinted=true;
  for(const n of ALL){ if(Math.hypot(n.x-x,n.y-y)<24){ fireNode(n); return; } }
  if(x>netBox.x-4&&x<netBox.x+netBox.w+4&&y>netBox.y-4&&y<netBox.y+netBox.h+4) return;
  spawnFood(x,y);
},{passive:true});

// ---------------- sprites / resize ----------------
function buildSprites(){
  furniture=mkCanvas(W,H); const f=furniture.getContext('2d');
  const vg=f.createRadialGradient(W/2,fieldCY(),Math.min(W,H)*0.14, W/2,fieldCY(),Math.max(W,H)*0.62);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(0.7,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(0,0,0,${S.vignette})`);
  f.fillStyle=vg; f.fillRect(0,0,W,H);
  for(let i=0;i<6;i++){ const x=Math.random()*W,y=Math.random()*fieldCY()*1.6,r=6+Math.random()*16;
    const dg=f.createRadialGradient(x,y,0,x,y,r); dg.addColorStop(0,'rgba(200,230,225,0.05)'); dg.addColorStop(1,'rgba(0,0,0,0)');
    f.fillStyle=dg; f.beginPath(); f.arc(x,y,r,0,7); f.fill(); }

  const isz=MAXR*2.4; gelSpr=mkCanvas(isz,isz); const g=gelSpr.getContext('2d'); const c0=isz/2;
  const gg=g.createRadialGradient(c0,c0*0.9,2,c0,c0,MAXR*1.15); gg.addColorStop(0,S.gelInner); gg.addColorStop(1,S.gelOuter);
  g.fillStyle=gg; g.beginPath(); g.arc(c0,c0,MAXR*1.15,0,7); g.fill();

  glowAmoeba=mkGlow(S.glow,MAXR*3.0); glowFood=mkGlow(S.foodGlow,64); glowInk=mkGlow(S.hidInk,52); glowHot=mkGlow(S.netHot,52);
  foodSpr=mkCanvas(44,44); const fs=foodSpr.getContext('2d'); const fr=22;
  const fgrd=fs.createRadialGradient(fr,fr*0.85,1,fr,fr,fr*0.9);
  fgrd.addColorStop(0,hexA(S.food,0.7)); fgrd.addColorStop(0.7,hexA(S.food,0.3)); fgrd.addColorStop(1,hexA(S.food,0));
  fs.fillStyle=fgrd; fs.beginPath(); fs.arc(fr,fr,fr*0.9,0,7); fs.fill();
  fs.strokeStyle=hexA(S.membrane,0.7); fs.lineWidth=1; fs.beginPath(); fs.arc(fr,fr,fr*0.55,0,7); fs.stroke();
  fs.fillStyle=hexA(S.nucleus,0.5); fs.beginPath(); fs.arc(fr+2,fr+1,fr*0.18,0,7); fs.fill();
}
function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=innerWidth; H=innerHeight;
  cnv.width=W*DPR; cnv.height=H*DPR; cnv.style.width=W+'px'; cnv.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0);
  AMO.x=W/2; AMO.y=fieldCY(); buildSprites(); layoutNet(); }
addEventListener('resize',resize);

// ---------------- loop ----------------
let last=performance.now();
function frame(now){ let dt=(now-last)/1000; last=now; if(dt>0.1) dt=0.1; const t=now/1000;
  step(dt);
  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.fillStyle=S.bg; ctx.fillRect(0,0,W,H);
  drawFood(); drawAmoeba(t); ctx.drawImage(furniture,0,0,W,H); drawNet();
  requestAnimationFrame(frame); }
resize();
spawnFood(W*0.5+90,fieldCY()-30); spawnFood(W*0.5-110,fieldCY()+40); spawnFood(W*0.5+30,fieldCY()+90);
lobes[1].ext=24; lobes[1].score=1;   // start mid-movement
requestAnimationFrame(frame);
</script>
</body>
