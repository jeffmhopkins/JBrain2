# Production stack, built from the local source tree (/opt/jbrain2/src) —
# no registry pulls except public base images. The project name fixes compose
# labels to com.docker.compose.project=jbrain, which is how the supervisor
# scopes its view of the Docker daemon.
name: jbrain

services:
  proxy:
    image: jbrain2-proxy:local
    build:
      context: ./src
      dockerfile: deploy/Dockerfile.proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # Direct mode: the bare domain (Caddy fetches Let's Encrypt). Tunnel mode:
      # http://<domain> (plain HTTP behind Cloudflare). Defaults to JBRAIN_DOMAIN
      # so installs that predate tunnel support keep their auto-TLS behaviour.
      JBRAIN_SITE_ADDR: ${JBRAIN_SITE_ADDR:-${JBRAIN_DOMAIN}}
      # Local-network access, ON by default: serves the app over HTTPS for
      # jbrain.local (Caddy's internal CA) so owner login works on the LAN even
      # when the tunnel/internet is down (the Secure cookie needs HTTPS). The
      # host advertises the name over mDNS via an avahi CNAME alias — see
      # deploy/lan-setup.sh. Blank JBRAIN_LAN_ADDR in .env to turn it off.
      # See docs/LOCAL_ACCESS.md.
      JBRAIN_LAN_ADDR: ${JBRAIN_LAN_ADDR:-https://jbrain.local}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]
    depends_on: [api]

  # OPT-IN Cloudflare Tunnel: a dial-OUT connector that publishes the stack on
  # your own domain with NO static IP, NO port-forwarding, and NO inbound
  # reachability — it works behind CGNAT. Guarded by the `tunnel` profile so a
  # stock deploy never starts it; install.sh flips TUNNEL_ENABLED on (and the
  # `jbrain` helper adds --profile tunnel to match) when you choose tunnel mode.
  # In tunnel mode Caddy serves plain HTTP (see JBRAIN_SITE_ADDR) and the
  # connector reaches it at http://proxy:80 over the `edge` network; configure
  # that origin and the public hostname in the Cloudflare dashboard. The token
  # carries the tunnel's identity and routing — see docs/CLOUDFLARE_TUNNEL.md.
  cloudflared:
    profiles: [tunnel]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:-}"]
    networks: [edge]
    depends_on: [proxy]

  api:
    image: jbrain2-api:local
    build:
      context: ./src/backend
    restart: unless-stopped
    environment: &api_env
      JBRAIN_DATABASE_URL: postgresql+asyncpg://jbrain_app:${APP_DB_PASSWORD}@db:5432/jbrain
      JBRAIN_SUPERVISOR_URL: http://supervisor:9000
      JBRAIN_SUPERVISOR_TOKEN: ${SUPERVISOR_TOKEN}
      JBRAIN_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JBRAIN_XAI_API_KEY: ${XAI_API_KEY:-}
      JBRAIN_BLOB_DIR: /data/blobs
      JBRAIN_BACKUPS_DIR: /data/backups
      JBRAIN_EMBED_URL: http://embed:80
      # Self-hosted local models — OFF unless the operator opted in at install.
      # When enabled, points at the local-llm gateway (below) and lists the
      # provisioned catalog ids the settings screen may route to.
      JBRAIN_LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-false}
      JBRAIN_LOCAL_LLM_URL: ${LOCAL_LLM_URL:-http://local-llm:8080/v1}
      JBRAIN_LOCAL_MODELS: ${LOCAL_MODELS:-[]}
      # Mirrors the install-time resident-group choice so a runtime config
      # regeneration (after a context-window edit) reproduces the same llama-swap
      # group the setup script wrote.
      JBRAIN_LOCAL_LLM_RESIDENT_GROUP: ${LOCAL_LLM_RESIDENT_GROUP:-false}
      # On-box image generation — OFF unless the operator opted in at install. When
      # enabled, points at the `comfyui` gateway (below) and lists the provisioned
      # catalog ids the settings screen may offer. Empty URL = feature off.
      JBRAIN_COMFYUI_URL: ${COMFYUI_URL:-}
      JBRAIN_COMFYUI_ENABLED: ${COMFYUI_ENABLED:-false}
      JBRAIN_COMFYUI_MODELS: ${COMFYUI_MODELS:-[]}
      # On-box fish identification — OFF unless the operator opted in at install. When
      # enabled, points at the `fish-id` service (below). Empty URL = feature off.
      JBRAIN_FISH_ID_URL: ${FISH_ID_URL:-}
      JBRAIN_FISH_ID_ENABLED: ${FISH_ID_ENABLED:-false}
      JBRAIN_FISH_ID_MODELS: ${FISH_ID_MODELS:-[]}
      # Shared secret for the MQTT ingest service identity (JBrain360 M1): the API
      # validates it in /internal/mqtt-auth and the consumer connects with it. Empty
      # disables the identity (fail-closed). Only meaningful with the `mqtt` profile.
      JBRAIN_MQTT_INGEST_SECRET: ${MQTT_INGEST_SECRET:-}
    volumes:
      - blobs:/data/blobs
      # Server-side basemap tile cache (location map proxy) — public map data, so
      # a plain named volume, kept out of backups.
      - tiles:/data/tiles
      # Export downloads stream from here; import uploads land here for the
      # supervisor's one-shot to pick up. Host path, shared with backup.sh.
      - ./backups:/data/backups
      # The provisioned local-model weights (same host dir the local-llm gateway
      # serves) so the settings drawer can report each model's real on-disk
      # footprint. WRITABLE: a context-window edit re-stamps llama-swap.yaml here
      # (atomically), which the gateway hot-reloads via --watch-config. Empty/absent
      # on a stock deploy — the read fails closed to the catalog estimate.
      - ./local-models:/data/local-models
      # Read-only view of the provisioned image weights so the settings drawer can
      # report each image model's real on-disk footprint (the shared RAM meter).
      - ./comfyui-models:/data/comfyui-models:ro
      # Read-only view of the provisioned fish weights, same rationale.
      - ./fish-id-models:/data/fish-id-models:ro
    networks: [edge, internal]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Slim image has no curl; stdlib does the job.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-shot migration runner (docker compose run --rm migrate): migrations
  # need DDL rights, so only this short-lived container sees the superuser
  # URL — the api/worker stay on the RLS-bound app role.
  migrate:
    image: jbrain2-api:local
    profiles: [tools]
    command: ["alembic", "upgrade", "head"]
    environment:
      JBRAIN_MIGRATION_DATABASE_URL: postgresql+asyncpg://jbrain:${POSTGRES_PASSWORD}@db:5432/jbrain
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy

  # One-time DESTRUCTIVE install reset (docker compose run --rm wipe), run ONCE
  # on a fresh install before bringing the stack up: drops + rebuilds the schema,
  # clears blob/backup storage, and enables the v3 pipeline. Guarded by
  # JBRAIN_WIPE_ON_FIRST_DEPLOY (off here by default) AND a sentinel on the blob
  # volume, so it can never run twice or fire by accident. Needs the superuser
  # URL like migrate; mounts the same storage volumes it clears.
  wipe:
    image: jbrain2-api:local
    profiles: [tools]
    command: ["python", "-m", "jbrain.install_wipe"]
    environment:
      JBRAIN_MIGRATION_DATABASE_URL: postgresql+asyncpg://jbrain:${POSTGRES_PASSWORD}@db:5432/jbrain
      JBRAIN_WIPE_ON_FIRST_DEPLOY: ${WIPE_ON_FIRST_DEPLOY:-}
      JBRAIN_BLOB_DIR: /data/blobs
      JBRAIN_BACKUPS_DIR: /data/backups
    volumes:
      - blobs:/data/blobs
      - ./backups:/data/backups
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: jbrain2-api:local
    restart: unless-stopped
    command: ["python", "-m", "jbrain.worker"]
    environment: *api_env
    volumes:
      - blobs:/data/blobs
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy

  db:
    # TimescaleDB + PostGIS in one image; pgvector arrives with Phase 2.
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: jbrain
      POSTGRES_USER: jbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jbrain -d jbrain"]
      interval: 10s
      timeout: 5s
      retries: 10

  supervisor:
    image: jbrain2-supervisor:local
    build:
      context: ./src/supervisor
    restart: unless-stopped
    environment:
      SUPERVISOR_TOKEN: ${SUPERVISOR_TOKEN}
      COMPOSE_PROJECT: jbrain
      SELF_SERVICE: supervisor
      PROJECT_DIR: /opt/jbrain2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [internal]

  # OPT-IN local model gateway: llama-swap fronting llama.cpp (Vulkan) so several
  # GGUF models share one OpenAI-compatible endpoint, loaded/swapped on demand.
  # Guarded by the `local-llm` compose profile so it NEVER starts on a stock
  # deploy — `jbrain enable-local-models` (scripts/local-llm-setup.sh) provisions
  # weights + config and flips the profile on. Vulkan needs only /dev/dri (not
  # /dev/kfd); weights and the generated config bind-mount from the host.
  local-llm:
    profiles: [local-llm]
    image: jbrain2-local-llm:local
    build:
      context: ./src
      dockerfile: deploy/Dockerfile.local-llm
      args:
        # Selectable gfx1151 base (default Vulkan/RADV). Set LOCAL_LLM_BASE to a
        # rocm-* tag — or pin a @sha256 digest — to switch the backend.
        LOCAL_LLM_BASE: ${LOCAL_LLM_BASE:-docker.io/kyuz0/amd-strix-halo-toolboxes:vulkan-radv}
    restart: unless-stopped
    # Read the config from the /models mount — no separate single-file bind mount
    # (a missing file would make Docker create a directory and wedge the gateway).
    # --watch-config hot-reloads the file when the API re-stamps it after a
    # context-window edit (the new -c applies on the model's next load).
    command:
      ["llama-swap", "--listen", ":8080", "--config", "/models/llama-swap.yaml", "--watch-config"]
    devices:
      - /dev/dri:/dev/dri
    # seccomp=unconfined is what the kyuz0 toolbox guide runs for the Vulkan path
    # too (not only ROCm) — it lists it as required for gfx1151 stability. The
    # ROCm base additionally needs `- /dev/kfd:/dev/kfd` here.
    security_opt:
      - seccomp=unconfined
    # The container must join the HOST's video/render group GIDs to open
    # /dev/dri/renderD128 — group *names* rarely line up across host/container.
    # The setup script writes the numeric host GIDs; names are the fallback.
    group_add:
      - "${VIDEO_GID:-video}"
      - "${RENDER_GID:-render}"
    volumes:
      - ./local-models:/models:ro
    networks: [internal]

  # OPT-IN on-box image generation: a ROCm ComfyUI serving Qwen-Image, the sibling
  # of the local-llm gateway. Guarded by the `comfyui` compose profile so it NEVER
  # starts on a stock deploy — `scripts/comfyui-setup.sh` provisions the weights and
  # flips the profile on. Validated on a Strix Halo (gfx1151) box: unlike the
  # Vulkan local-llm path, ComfyUI's ROCm stack needs BOTH /dev/kfd and /dev/dri,
  # and HSA_OVERRIDE_GFX_VERSION so ROCm treats the iGPU as gfx1151 (without it the
  # stack CPU-falls-back). The api reaches it at http://comfyui:8188 (internal
  # only, no host port). Weights bind-mount read-only from the host.
  comfyui:
    profiles: [comfyui]
    image: ${COMFYUI_IMAGE:-docker.io/kyuz0/amd-strix-halo-comfyui:latest}
    restart: unless-stopped
    # --preview-method auto emits b_preview frames over /ws during sampling, which
    # the live-generation pipeline relays to the chat as a progressive preview
    # (docs/IMAGE_GEN_LIVE_PLAN.md). Cheap/low-fidelity; taesd is sharper but loads
    # a small decoder.
    command:
      ["python", "/opt/ComfyUI/main.py", "--listen", "0.0.0.0", "--port", "8188",
       "--preview-method", "auto"]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.5.1"
    # Join the HOST's video/render GIDs to open /dev/dri/renderD128 — the setup
    # script writes the numeric host GIDs (shared with the local-llm gateway).
    group_add:
      - "${VIDEO_GID:-video}"
      - "${RENDER_GID:-render}"
    volumes:
      - ./comfyui-models:/opt/ComfyUI/models:ro
    networks: [internal]

  # OPT-IN on-box fish identification: a ROCm service running the MIT-licensed fishial
  # models (DINOv2+ViT classifier over ~866 species, segment→detect→embed→nearest),
  # the sibling of the comfyui profile. Guarded by the `fish-id` compose profile so it
  # NEVER starts on a stock deploy — scripts/fish-id-setup.sh provisions the weights and
  # flips the profile on. The service image (a thin HTTP wrapper over the fishial model
  # pipeline, so the api never imports torch) is built/validated by the F0 on-box spike
  # (docs/FISH_ID_PLAN.md); FISH_ID_IMAGE points at it. It exposes POST /identify and
  # POST /free; the model is loaded per request and freed after (load→use→unload), so it
  # holds no steady-state memory. The api reaches it at http://fish-id:8200 (internal
  # only, no host port). Weights bind-mount read-only from the host.
  fish-id:
    profiles: [fish-id]
    image: ${FISH_ID_IMAGE:-ghcr.io/jeffmhopkins/jbrain2-fish-id:latest}
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
    environment:
      HSA_OVERRIDE_GFX_VERSION: "11.5.1"
    # Join the HOST's video/render GIDs to open /dev/dri/renderD128 — the setup script
    # writes the numeric host GIDs (shared with the local-llm + comfyui services).
    group_add:
      - "${VIDEO_GID:-video}"
      - "${RENDER_GID:-render}"
    volumes:
      - ./fish-id-models:/data/fish-id-models:ro
    networks: [internal]

  embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    restart: unless-stopped
    command: ["--model-id", "${EMBED_MODEL:-BAAI/bge-small-en-v1.5}"]
    # 4GB host: cap the model server so a bad query can't starve Postgres.
    mem_limit: 1g
    volumes:
      - embed_models:/data
    networks: [internal]

  # Self-hosted web search (docs/ASSISTANT.md "Agent selection"): a SearXNG
  # metasearch instance backing the jerv chatbot's web_search/web_fetch tools.
  # Part of the stock stack (no profile) so it comes up with every deploy and is
  # recreated by `jbrain update` — the deploy tooling has no per-service enable
  # flag for it, and the api's JBRAIN_SEARXNG_URL points here by default, so a
  # gated service would just leave jerv reporting "unavailable". It needs its own
  # egress to query upstream engines, so it sits on `internal` (api/worker reach it
  # there at http://searxng:8080). Only jerv — which holds no knowledge-base tools
  # and reads no owner data — can call it, so no personal context ever rides a query.
  searxng:
    image: ${SEARXNG_IMAGE:-docker.io/searxng/searxng:latest}
    restart: unless-stopped
    mem_limit: 512m
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      # SearXNG refuses to start without a secret; set SEARXNG_SECRET in your .env.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
      # The image (now granian-based, post the uwsgi→granian migration) defaults to
      # GRANIAN_HOST=:: — an IPv6 bind that crashes at boot on an IPv6-disabled Docker
      # host ("Address family not supported"), leaving searxng:8080 unreachable so the
      # jerv tool reports the service as unavailable. Pin an explicit IPv4 bind: the
      # service publishes no host port and lives only on `internal`, so 0.0.0.0 is
      # reachable by api/worker yet exposed to nothing else.
      GRANIAN_HOST: 0.0.0.0
    volumes:
      # Mount the whole /etc/searxng DIRECTORY, never the settings.yml file alone.
      # The image entrypoint runs check_directory on /etc/searxng and manages
      # settings.yml inside it (creating from template + chowning to searxng). A
      # single-file bind is a footgun: if the host file is missing the moment
      # compose runs, Docker creates an empty DIRECTORY at that path, the
      # entrypoint then sees settings.yml as a directory, and the container
      # crash-loops ("not a valid file"). A directory bind can only ever be a
      # directory, so a missing host dir just boots from the image template.
      - ./searxng:/etc/searxng
    networks: [internal]

  # OPT-IN MQTT broker (JBrain360 M0 secure spine): Mosquitto + mosquitto-go-auth
  # in HTTP-backend mode, delegating every connect/publish/subscribe to the API's
  # /internal/mqtt-* endpoints (it reuses the shipped device_key model; the plugin
  # holds no credential logic). Guarded by the `mqtt` profile so a stock deploy
  # never starts it. M0 runs a plain listener on the `internal` network ONLY — the
  # device-facing TLS :8883 listener and the MQTT->location_fixes ingest consumer
  # arrive in M1. PIN ${MQTT_IMAGE} by digest before any real deploy (go-auth is
  # archived; only the Mosquitto 2.0.x plugin ABI is supported). The mounted conf
  # path and the go-auth .so path inside the image are image-specific — verify
  # against the pinned image.
  mqtt:
    profiles: [mqtt]
    image: ${MQTT_IMAGE:-iegomez/mosquitto-go-auth:latest}
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro
    networks: [internal]
    depends_on: [api]

  # The MQTT->location_fixes ingest consumer (JBrain360 M1): a server-side
  # subscriber (the same api image) that streams published OwnTracks fixes into the
  # shipped hypertable under device_context (geofence-at-ingest, L5a). Same opt-in
  # `mqtt` profile; connects to the broker as the ingest identity. Fails closed when
  # MQTT_INGEST_SECRET is unset (it logs and exits).
  mqtt-ingest:
    profiles: [mqtt]
    image: jbrain2-api:local
    restart: unless-stopped
    command: ["python", "-m", "jbrain.mqtt_consumer"]
    environment: *api_env
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy

networks:
  edge:
  internal:

volumes:
  blobs:
  db_data:
  caddy_data:
  caddy_config:
  embed_models:
  tiles:
