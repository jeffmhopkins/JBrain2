# Anthropic<->OpenAI shim for code mode (jcode). The Claude Agent SDK speaks the
# Anthropic Messages API (/v1/messages); the on-box llama-swap gateway speaks OpenAI
# (/v1/chat/completions). LiteLLM serves /v1/messages and translates to the gateway.
#
# The two coder quants are listed explicitly (the documented per-model form); the
# trailing wildcard passes any OTHER served model (gpt-oss-120b, etc.) through too, so
# whatever JCODE_MODEL names, the shim routes it. The model name after `openai/` is
# what's sent to llama-swap, so it must match the gateway's route (the catalog
# served_model). api_key is a placeholder — llama-swap needs no auth.
model_list:
  - model_name: qwen3-coder-next
    litellm_params:
      model: openai/qwen3-coder-next
      api_base: http://local-llm:8080/v1
      api_key: noauth
  - model_name: qwen3-coder-next-q8
    litellm_params:
      model: openai/qwen3-coder-next-q8
      api_base: http://local-llm:8080/v1
      api_key: noauth
  - model_name: "*"
    litellm_params:
      model: openai/*
      api_base: http://local-llm:8080/v1
      api_key: noauth

litellm_settings:
  # The local backend doesn't accept every Anthropic/OpenAI param the SDK may send;
  # drop the unsupported ones instead of erroring the turn.
  drop_params: true
