# Mosquitto + mosquitto-go-auth — JBrain360 M0 secure spine.
#
# go-auth runs in its HTTP backend: every connect/publish/subscribe is delegated
# to the JBrain API on the internal network, which decides allow/deny by reusing
# the shipped device_key model and the M0 own-namespace ACL (jbrain.api.mqtt).
# The plugin holds NO credential logic (plan T2/B2).
#
# SCOPE: this is the M0 floor. The device-facing TLS listener (:8883), the
# MQTT->location_fixes ingest consumer, and the view-scope ACL widening are M1+.
# Paths below (the .so location) are image-specific — VERIFY against the pinned
# go-auth image and pin it by digest before any real deployment.

per_listener_settings true

# M0: a plain listener on the internal docker network only (the broker is not yet
# published off-box; TLS :8883 with a Let's Encrypt cert arrives with the first
# real client in M1). Anonymous is OFF — every client must pass go-auth.
listener 1883
allow_anonymous false

# --- mosquitto-go-auth: HTTP backend -> JBrain API ---------------------------
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http

# The API service on the `internal` docker network. go-auth POSTs JSON and reads
# the HTTP status: 2xx = allow, anything else = deny (fail-closed).
auth_opt_http_host api
auth_opt_http_port 8000
auth_opt_http_getuser_uri /internal/mqtt-auth
auth_opt_http_aclcheck_uri /internal/mqtt-acl
# No superuser URI on purpose: there are no MQTT superusers, so every publish and
# subscribe is ACL-checked (no bypass).
auth_opt_http_response_mode status
auth_opt_http_params_mode json
# M0 keeps no ACL cache so a revoked/relocated device stops being authorized on
# its next operation (plan T5 — the live-path force-disconnect mechanism is M3).
auth_opt_http_response_timeout_ms 2000
auth_opt_acl_cache_seconds 0
auth_opt_auth_cache_seconds 0
