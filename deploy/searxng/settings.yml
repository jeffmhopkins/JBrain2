# SearXNG settings for the jerv chatbot's web search (docs/reference/ASSISTANT.md "Agent
# selection"). The JSON format MUST be enabled
# (the default ships HTML only) — the SearxngClient speaks /search?format=json.
# The rate limiter is off because the only caller is the on-box API, not the public
# internet. Set SEARXNG_SECRET in your .env before starting the profile.
use_default_settings: true

server:
  # The official image's entrypoint replaces this placeholder with $SEARXNG_SECRET
  # at boot (an in-place edit, so the bind mount must NOT be read-only). Set
  # SEARXNG_SECRET in your .env before enabling the profile.
  secret_key: "ultrasecretkey"
  limiter: false
  image_proxy: false

search:
  # JSON is required by the JBrain web_search tool; HTML stays for manual debugging.
  formats:
    - html
    - json
  # jerv asks in English and wants substance over breadth — bias results to English
  # and skip the SafeSearch filtering that drops legitimate results.
  default_lang: en
  safe_search: 0

outgoing:
  # The stock 3s per-engine timeout is the main reason a self-hosted instance returns
  # thin results: upstreams (Google/Bing/DDG) are slower to a non-browser caller, time
  # out, and get dropped — which is what pushes the model toward a third-party search.
  # A more patient timeout + a real connection pool lets more engines actually answer.
  request_timeout: 6.0
  max_request_timeout: 10.0
  pool_connections: 100
  pool_maxsize: 20

# Spread each query across several independent-index engines so one engine's rate-limit
# cooldown can't blank a search. SearXNG blends + de-dupes results across every enabled
# engine, so more sources = redundancy: when DuckDuckGo/Brave hit a 429 (`suspended_time`)
# from a deep-research fan's volume, the others still answer — THIS (enabling the spread),
# not the weight below, is what fixes the blanked-search failure. Mojeek runs its own
# crawler, so it is the most throttle-resistant backup. `use_default_settings: true` merges
# this list onto the built-in engine defs BY NAME, so each entry only overrides the fields
# below (the rest of the default definition stands). `weight: 0.6` de-emphasizes DDG's
# results in the blended RANKING only — it does NOT reduce how often DDG is queried (it is
# still hit every search), so DDG can still get rate-limited; the point is just that its
# results no longer dominate now that there are five other sources.
engines:
  - name: duckduckgo
    disabled: false
    weight: 0.6
  - name: brave
    disabled: false
  - name: bing
    disabled: false
  - name: mojeek
    disabled: false
  - name: qwant
    disabled: false
  - name: startpage
    disabled: false
