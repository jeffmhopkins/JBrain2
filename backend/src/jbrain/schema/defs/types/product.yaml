# Product / possession — an owned item (appliance, furniture, valuable) that is
# not a Vehicle or Device. schema.org Product; owner/insurer are Role edges.
# For inventory, warranties, and insurance. [proposed]
id: product
name: Product
schema_org_ref: schema:Product
description: A possession/asset. Owner is a Role edge; price/value via Monetary 🔒.
vehicle: graph
facets: [Named, ExternalIdentified, Temporal, Related, Lifecycle, Monetary]
default_fact_kind: attribute

# Only `location` stays tier-1 (presence-revealing — firewall + ref-edge
# traversal). brand/manufacturer/model/category/purchaseDate/warrantyExpiration
# are tier-2, consistent with the vehicle/device rows.
predicates:
  - canonical_name: location             # 🔒 where it is kept — presence-revealing
    value_shape: ref
    range_type: place
    kind: state
    functional: true

# Monetary.amount 🔒 carries purchase price / appraised value. identifier.serial
# from ExternalIdentified. owner/insurer are Role edges (Related).
status_values: [owned, sold, lost, discarded, gifted]
display_name: [name]
