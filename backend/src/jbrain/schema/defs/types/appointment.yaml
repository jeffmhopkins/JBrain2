# Appointment / Event — a time-bound entity. [proposed]
# Graph entity from Phase 3; typed `appointments` projection + ICS feed in Phase 4.
# Time is a supersedable BINDING to a temporal token, not identity (ANALYSIS).
id: appointment
name: Event
schema_org_ref: schema:Event
description: A scheduled event; reschedule supersedes the time binding.
vehicle: typed_record(P4)          # catalog now; typed table + ICS feed in Phase 4
facets: [Named, Temporal, Recurrence, Located, Lifecycle, Related]
default_fact_kind: state
allow_open_predicates: false

predicates:
  - canonical_name: scheduledTime  # schedule supersession: newest instruction wins (ANALYSIS)
    value_shape: date              # binds a point/range temporal token
    kind: state
    functional: true
    renamed_from: [scheduled_time, appointmentTime]
    schema_org_ref: schema:startDate
  - canonical_name: attendee
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:attendee
    # The ref names WHO attends; an optional value_json carries the iCalendar
    # ATTENDEE params for that person — {role, status, required} (CHAIR/…,
    # ACCEPTED/…, true/false). Absent ⇒ a plain invitee.
  - canonical_name: organizer      # who runs/hosts it — an org or a person
    value_shape: ref               # polymorphic, like document.issuer (no range_type)
    kind: relationship
    functional: true
    renamed_from: [host, hostOrganization]
    schema_org_ref: schema:organizer
  - canonical_name: location       # WHERE it is — a referenceable venue
    value_shape: ref
    range_type: place
    kind: relationship
    functional: true
    schema_org_ref: schema:location
  - canonical_name: attendanceMode # in-person / online / both
    value_shape: enum
    enum_values: [in_person, online, hybrid]
    kind: state
    functional: true
    renamed_from: [eventAttendanceMode]
    schema_org_ref: schema:eventAttendanceMode
  - canonical_name: onlineUrl      # the join link for a virtual meeting
    value_shape: scalar
    kind: attribute
    renamed_from: [meetingUrl, joinUrl, conferenceUrl, videoLink]
    schema_org_ref: schema:url
  - canonical_name: description    # the event's notes / agenda
    value_shape: text
    kind: state
    schema_org_ref: schema:description
  - canonical_name: appointmentType  # the kind of appointment; genuinely open vocabulary -> text
    value_shape: text                # e.g. checkup, consult, meeting, call, social, service
    kind: state
    schema_org_ref: schema:keywords

# Lifecycle.status enum for this type:
status_values: [tentative, confirmed, cancelled, occurred]

display_name: [name]
# Identity: the entity itself; (uid, recurrenceId) distinguishes a series occurrence.
# Recurrence is a token (Recurrence facet) — instances computed at read time for ICS.
