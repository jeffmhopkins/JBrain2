# Person — a human; the owner ("Me") and everyone mentioned. [proposed]
id: person
name: Person
schema_org_ref: schema:Person
description: A human. Names are structured edges; display name is a projection.
vehicle: graph
facets: [Named, Contactable, Located, Temporal, Related]
default_fact_kind: attribute

predicates:
  - canonical_name: birthDate
    value_shape: date
    kind: attribute                # two birthdays = collision -> review, never supersede
    schema_org_ref: schema:birthDate
  - canonical_name: deathDate
    value_shape: date
    kind: event
    functional: true
  - canonical_name: gender
    value_shape: enum              # closed set; non-members route to review, never silently stored; 🔒
    enum_values: [male, female, unknown]
    kind: state
    functional: true
    schema_org_ref: schema:gender
  - canonical_name: spouse         # functional relationship (ANALYSIS allowlist); symmetric
    value_shape: ref
    range_type: person
    kind: relationship
    functional: true
    schema_org_ref: schema:spouse
  - canonical_name: worksFor       # functional relationship (ANALYSIS allowlist); employer
    value_shape: ref
    range_type: organization       # usual object; a ref edge never gates on range at runtime
    kind: relationship
    functional: true               # one CURRENT employer; former jobs are closed history
    schema_org_ref: schema:worksFor
    # Drift SPELLINGS of worksFor only. `employer` stays its own spelling: the
    # residual supersession allowlist already makes it functional, and folding it
    # here would silently rewrite existing `employer`-keyed history onto worksFor.
    renamed_from: [works_for, worksAt, works_at]
  # Family / kinship edges — high-traffic in a personal KB. Accumulating (a person
  # has many relatives), so NONE are functional; directionality is per-edge
  # (parent: this person's parent is the object; child: the inverse).
  - canonical_name: parent
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:parent
    renamed_from: [mother, father]
  - canonical_name: children          # schema.org spelling (plural); the pipeline's canonical
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:children
    renamed_from: [child, son, daughter]
  - canonical_name: sibling
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:sibling
    renamed_from: [brother, sister]
  - canonical_name: relative          # any other kin (cousin, aunt, in-law); qualifier = relation
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:relatedTo
  # Social / work / ownership edges — high-traffic in a personal KB and previously
  # coined many ways (buddy, coworker, possesses); canonicalize the synonyms so the
  # graph addresses one edge, not five. All accumulating (a person has many), so none
  # functional. range_type is the usual object; a ref edge never gates on range.
  - canonical_name: friend
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:knows
    renamed_from: [buddy, pal, friends, bestie, bestFriend]
  - canonical_name: colleague
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:colleague
    renamed_from: [worksWith, coworker, workmate, colleagues]
  - canonical_name: owns               # owned thing (vehicle/device/product/place); polymorphic object
    value_shape: ref
    kind: relationship
    schema_org_ref: schema:owns
    renamed_from: [possesses, owned, ownsVehicle]
  # Where a person lives — the current residence, a Place ref. 🔒 location. One
  # CURRENT home (functional); former residences are closed history. Reserve the
  # generic `location` for an event/org/thing's venue — NOT a person's home — so
  # `location` is intentionally ABSENT from renamed_from (it is canonical elsewhere
  # and a global rename would mis-fold appointment/org locations onto it).
  # `residence` is ALSO absent: the residual supersession allowlist already makes
  # it functional and existing `residence`-keyed history would be silently rewritten
  # onto homeLocation if folded here (same reasoning as worksFor/employer above).
  - canonical_name: homeLocation
    value_shape: ref
    range_type: place
    kind: state
    functional: true
    schema_org_ref: schema:homeLocation
    renamed_from: [livesIn, livesAt, resides, residesIn, home_location, homeAddress]
  - canonical_name: birthPlace         # 🔒 location — where born; timeless
    value_shape: ref
    range_type: place
    kind: attribute
    schema_org_ref: schema:birthPlace
    renamed_from: [bornIn, placeOfBirth]
  # The care edge the extraction prompt MANDATES (patient -> provider); declaring
  # it ends the unknown-predicate treatment every treatedBy fact used to eat.
  # Accumulating (a person keeps many providers), so NOT functional. The inverse
  # hasTreated stays reciprocity-map-only (analysis/supersession.py) — declaring
  # both would invite the model to emit the wrong-direction edge.
  - canonical_name: treatedBy          # 🔒🔒 health (also floored in analysis/extraction.py)
    value_shape: ref
    range_type: person
    kind: relationship
    renamed_from: [treated_by, seenBy, caredForBy]

# Fed to the existing declared-name -> exact-alias machinery (NOT an identity key).
alias_seeding_predicates: [name.full, name.preferred, name.aka, name.maiden]

# canonical_name projection, in precedence order (first present wins).
display_name: [name.preferred, name.given+name.family, name.full, name]

# NOTE: subjecthood (subject_id) is set per-entity when hard-linked to a subject
# row (ANALYSIS), never by this type. The owner "Me" keeps an explicit display
# override and is not subject to the projection above.
