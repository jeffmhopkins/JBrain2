# Person — a human; the owner ("Me") and everyone mentioned. [proposed]
id: person
name: Person
schema_org_ref: schema:Person
description: A human. Names are structured edges; display name is a projection.
vehicle: graph
facets: [Named, Contactable, Located, Temporal, Related]
default_fact_kind: attribute
allow_open_predicates: true        # long-tail facts about people are the norm

predicates:
  - canonical_name: birthDate
    value_shape: date
    kind: attribute                # two birthdays = collision -> review, never supersede
    schema_org_ref: schema:birthDate
  - canonical_name: deathDate
    value_shape: date
    kind: event
    functional: true
  - canonical_name: gender
    value_shape: enum              # closed set; non-members route to review, never silently stored; 🔒
    enum_values: [male, female, unknown]
    kind: state
    functional: true
    schema_org_ref: schema:gender
  - canonical_name: spouse         # functional relationship (ANALYSIS allowlist); symmetric
    value_shape: ref
    range_type: person
    kind: relationship
    functional: true
    schema_org_ref: schema:spouse
  - canonical_name: worksFor       # functional relationship (ANALYSIS allowlist); employer
    value_shape: ref
    range_type: organization       # usual object; a ref edge never gates on range at runtime
    kind: relationship
    functional: true               # one CURRENT employer; former jobs are closed history
    schema_org_ref: schema:worksFor
    # Drift SPELLINGS of worksFor only. `employer` stays its own spelling: the
    # residual supersession allowlist already makes it functional, and folding it
    # here would silently rewrite existing `employer`-keyed history onto worksFor.
    renamed_from: [works_for, worksAt, works_at]
  # Family / kinship edges — high-traffic in a personal KB. Accumulating (a person
  # has many relatives), so NONE are functional; directionality is per-edge
  # (parent: this person's parent is the object; child: the inverse).
  - canonical_name: parent
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:parent
    renamed_from: [mother, father]
  - canonical_name: child
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:children
    renamed_from: [children, son, daughter]
  - canonical_name: sibling
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:sibling
    renamed_from: [brother, sister]
  - canonical_name: relative          # any other kin (cousin, aunt, in-law); qualifier = relation
    value_shape: ref
    range_type: person
    kind: relationship
    schema_org_ref: schema:relatedTo
  - canonical_name: knowsLanguage     # BCP 47 tag preferred; vCard LANG. Accumulating.
    value_shape: text
    kind: attribute
    schema_org_ref: schema:knowsLanguage
    renamed_from: [language, languages, speaksLanguage]
  - canonical_name: nationality       # ISO 3166 country; can change (naturalization)
    value_shape: text
    kind: state
    schema_org_ref: schema:nationality

# Fed to the existing declared-name -> exact-alias machinery (NOT an identity key).
alias_seeding_predicates: [name.full, name.preferred, name.aka, name.maiden]

# canonical_name projection, in precedence order (first present wins).
display_name: [name.preferred, name.given+name.family, name.full, name]

# NOTE: subjecthood (subject_id) is set per-entity when hard-linked to a subject
# row (ANALYSIS), never by this type. The owner "Me" keeps an explicit display
# override and is not subject to the projection above.
