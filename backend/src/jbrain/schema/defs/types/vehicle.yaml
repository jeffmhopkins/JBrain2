# Vehicle — a car/truck/etc. [proposed]
id: vehicle
name: Vehicle
schema_org_ref: schema:Vehicle
description: A vehicle. VIN is the strong resolution signal; owner is a Role edge.
vehicle: graph
facets: [Named, ExternalIdentified, Related, Lifecycle]
default_fact_kind: attribute

# fuelType/bodyType/color/mileage are tier-2: resolution hints live in prose +
# mentions; only the display-composition trio + the 🔒 plate stay declared.
predicates:
  - canonical_name: manufacturer       # make
    value_shape: text
    kind: attribute
    functional: true
    schema_org_ref: schema:manufacturer
  - canonical_name: model
    value_shape: text
    kind: attribute
    functional: true
    schema_org_ref: schema:model
  - canonical_name: modelDate          # year
    value_shape: scalar
    kind: attribute
    functional: true
    schema_org_ref: schema:vehicleModelDate
    renamed_from: [vehicleModelDate, modelYear, year]
  - canonical_name: licensePlate       # 🔒 not stable (transfers/renewals)
    value_shape: structured
    shape: license_plate
    kind: state

# identifier.vin (🔒) from ExternalIdentified — globally unique, the resolution key signal.
# owner is a Role edge (Related).
status_values: [active, sold, totaled, retired]
display_name: [name, modelDate+manufacturer+model]
