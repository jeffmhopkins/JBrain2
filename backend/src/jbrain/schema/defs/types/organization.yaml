# Organization — a company, institution, or group. [proposed]
id: organization
name: Organization
schema_org_ref: schema:Organization
description: An org. Locations are Place refs, never inlined onto the org.
vehicle: graph
facets: [Named, Contactable, ExternalIdentified, Related]
default_fact_kind: state

# foundingDate/numberOfEmployees are tier-2: encyclopedia trivia, not spine.
predicates:
  - canonical_name: parentOrganization
    value_shape: ref
    range_type: organization
    kind: relationship
    schema_org_ref: schema:parentOrganization
  - canonical_name: location          # an org can have many locations
    value_shape: ref
    range_type: place
    kind: relationship
    schema_org_ref: schema:location

# identifier.ein / identifier.duns / identifier.lei / identifier.vatid come from
# ExternalIdentified. legalName folds to name.full via the Named facet (not redeclared).
alias_seeding_predicates: [name.full, name.aka]
display_name: [name, name.full]
