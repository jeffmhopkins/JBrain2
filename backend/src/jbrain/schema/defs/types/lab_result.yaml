# Lab result / clinical Observation. 🔒🔒 health — strictest firewall. [proposed]
# DEFERRED: populated by the Phase-7 typed parser, NOT free-extracted into facts
# (ANALYSIS routes structured medical docs to typed parsers). Cataloged here so
# the typed table and the graph speak the same facet vocabulary.
id: lab_result
name: Observation                  # FHIR Observation shape
schema_org_ref: schema:MedicalTest
description: A clinical lab observation; FHIR/LOINC/UCUM-shaped typed record.
vehicle: typed_record(P7)
facets: [Named, ExternalIdentified, Temporal, Related, Lifecycle]   # Named -> display; Lifecycle.status carries status_values
default_fact_kind: measurement

predicates:
  - canonical_name: identifier     # identifier.loinc — the LOINC code (CodeableConcept)
    qualifier_vocab: id_scheme
    value_shape: scalar
    kind: attribute
  - canonical_name: category       # FHIR Observation.category: lab vs vital-sign vs imaging
    value_shape: enum
    enum_values: [laboratory, vital-signs, imaging, procedure, exam, survey, social-history, therapy, activity]
    kind: attribute
  - canonical_name: value          # the reading
    value_shape: quantity          # {value, unit: UCUM}
    kind: measurement
  - canonical_name: component      # multi-part result (BP systolic/diastolic); qualifier = component LOINC
    value_shape: quantity
    kind: measurement
  - canonical_name: referenceRange
    value_shape: structured
    shape: reference_range
    kind: attribute
  - canonical_name: interpretation
    value_shape: enum
    enum_values: [normal, high, low, abnormal, critical, borderline, indeterminate]
    kind: attribute
  - canonical_name: effectiveDate  # clinically relevant time
    value_shape: date
    kind: event
  - canonical_name: performer      # ordering / performing provider
    value_shape: ref
    range_type: organization
    kind: relationship
  - canonical_name: specimen
    value_shape: text
    kind: attribute

# Lifecycle.status (FHIR): an amended/corrected result supersedes the prior value.
status_values: [registered, preliminary, final, amended, corrected, cancelled, entered-in-error]

display_name: [name]               # the LOINC long name; value rendered "<value> <unit>"
