# Subscription / recurring service — the agreement; its charges are Bills. 🔒 finance. [proposed]
id: subscription
name: Service
schema_org_ref: schema:Service
description: A recurring service agreement. Renewal is a recurrence token, not rows.
vehicle: graph                          # 🔒 finance-scoped
facets: [Named, Monetary, Temporal, Recurrence, Related, Lifecycle]
default_fact_kind: state

# plan/serviceType are tier-2 (prose-grade labels).
predicates:
  - canonical_name: provider
    value_shape: ref
    range_type: organization
    kind: relationship
  - canonical_name: renewalDate
    value_shape: date
    kind: state
    functional: true
  - canonical_name: paymentMethod       # 🔒
    value_shape: ref
    range_type: financial_account
    kind: relationship
  - canonical_name: billingCycle        # the period unit; the RRULE freq in plain terms
    value_shape: enum
    enum_values: [daily, weekly, monthly, quarterly, semiannual, annual]
    kind: state
    functional: true
    schema_org_ref: schema:billingDuration

# Monetary.amount (🔒) is the price; Recurrence.recurrence carries the billing cycle.
status_values: [active, paused, cancelled]
display_name: [name]                    # else "<provider>"
